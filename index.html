        <canvas class="picn" data-petal="${petal}" data-tier="${bestTier}" width="40" height="40"></canvas>
        <div class="pname ${longNameCls(def.name)}">${def.name}</div>
      </div>`;
    }).join('');
    body = `<div class="inv-grid">${cards || '<div class="inv-empty">No petals match.</div>'}</div>`;
  } else {
    const sections = [...RARITIES].reverse().map(rarity=>{
      const keys = Object.keys(inventory).filter(k=>{
        if (inventory[k]<=0) return false;
        const [petal] = k.split('|');
        return PETAL_RARITY[petal]===rarity && matches(petal);
      }).sort((a,b)=>{
        const [pa,ta]=a.split('|'), [pb,tb]=b.split('|');
        return pa===pb ? (+ta)-(+tb) : pa.localeCompare(pb);
      });
      if (!keys.length) return '';
      const rc = RARITY_INFO[rarity].color;
      const cards = keys.map(k=>{
        const [petal,tierStr] = k.split('|'); const tier = +tierStr; const def = PETAL_DEFS[petal];
        return `<div class="istack" draggable="true" ondragstart="dragPetalStart(event,'${petal}',${tier})" style="--rc:${rc}">
          <div class="pcount">x${inventory[k]}</div>
          <div class="ptier">${toRoman(tier)}</div>
          <canvas class="picn" data-petal="${petal}" data-tier="${tier}" width="40" height="40"></canvas>
          <div class="pname ${longNameCls(def.name)}">${def.name}</div>
        </div>`;
      }).join('');
      return `<div class="inv-section-head" style="--rc:${rc}">${RARITY_INFO[rarity].name}</div><div class="inv-grid">${cards}</div>`;
    }).join('');
    body = sections || '<div class="inv-empty">No petals collected yet — go defeat some mobs!</div>';
  }

  return `
    <div class="panel-head"><h2>Inventory</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="panel-body">
      <div class="inv-sub">Drag a petal to equip it</div>
      <div class="inv-toolbar">
        <label><input type="checkbox" ${invStackMode?'checked':''} onchange="setInvStack(this)"> Stack</label>
        <input class="inv-search" type="text" placeholder="Search petals..." value="${invSearch}" oninput="setInvSearch(this)">
      </div>
      ${body}
    </div>`;
}

function essenceRateCard(rarity, pct, zoneNum, subTier){

/* ── Craft — combine CRAFT_COST of one petal+tier for a chance at the next tier up.
     Rendered as a pentagon of the 5 petals; attempting spins+pulses them, then either
     converges them into the upgraded petal (success) or scatters back with 1-4 destroyed (fail). ── */
// shift-click queues every full batch of CRAFT_COST you own at once instead of just one
function selectCraftItem(petal, tier, bulk){
  if (craftPhase!=='idle' || PETAL_RARITY[petal]==='mythic') return; // no mid-animation swaps, and mythics can't be crafted at all
  craftSelection = { petal, tier };
  craftBulk = !!bulk;
  renderPanel();
}
function attemptCraft(){
  if (!craftSelection || craftPhase!=='idle') return;
  const { petal, tier } = craftSelection;
  if (tier >= MAX_TIER) return; // tier 6 — nothing higher to craft into
  const k = invKey(petal, tier);
  if ((inventory[k]||0) < CRAFT_COST) return;
  const bulk = craftBulk;
  const rc = RARITY_INFO[PETAL_RARITY[petal]].color;

  craftPhase = 'spinning';
  // update the existing DOM in place instead of a full re-render — the pentagon should just
  // start spinning where it already sits, not have the whole panel flash/rebuild under it
  const root = document.getElementById('panelRoot');
  root.querySelector('.craft-pentagon')?.classList.add('spinning');
  const btn = root.querySelector('.craft-btn');
  if (btn) btn.disabled = true;
  const chanceEl = root.querySelector('.craft-chance');
  if (chanceEl) chanceEl.textContent = 'Crafting…';
  root.querySelector('.craft-grid')?.classList.add('busy');

  setTimeout(()=>{
    // a single craft is always exactly one attempt. A stack craft keeps re-attempting with
    // whatever's left — including petals refunded from a failed attempt — until fewer than
    // CRAFT_COST remain, instead of stopping after a fixed number of batches and leaving leftovers.
    let remaining = inventory[k]||0;
    let successCount = 0, failCount = 0, totalLost = 0, singleBatchDestroyedCount = 0;
    do {
      if (Math.random()*100 < CRAFT_CHANCE[tier]){
        successCount++;
        remaining -= CRAFT_COST;
      } else {
        const destroyedCount = 1 + Math.floor(Math.random()*4); // 1-4, not all 5 are lost
        remaining -= destroyedCount;
        totalLost += destroyedCount;
        singleBatchDestroyedCount = destroyedCount;
        failCount++;
      }
    } while (bulk && remaining >= CRAFT_COST);
    const batches = successCount + failCount;
    inventory[k] = remaining;
    if (successCount>0){
      const nk = invKey(petal, tier+1);
      inventory[nk] = (inventory[nk]||0) + successCount;
      discoveredPetals.add(nk);
    }
    // the pentagon only has 5 slots regardless of how many attempts ran — for a single craft use
    // its own exact 1-4 roll; for a stack craft fall back to a proportional representative subset
    let destroyedSlots = new Set();
    if (failCount>0){
      const showCount = batches===1 ? singleBatchDestroyedCount
        : Math.min(4, Math.max(1, Math.round((successCount===0?4:5)*failCount/batches)));
      const idxs = [0,1,2,3,4];
      for (let x=idxs.length-1; x>0; x--){ const j=Math.floor(Math.random()*(x+1)); [idxs[x],idxs[j]]=[idxs[j],idxs[x]]; }
      destroyedSlots = new Set(idxs.slice(0, showCount));
    }
    craftResult = { success: successCount>0, petal, tier, nextTier: successCount>0?tier+1:null, destroyedSlots, successCount, failCount, batches, totalLost };
    craftPhase = 'result';
    renderPanel();
    saveProgress();

    setTimeout(()=>{
      craftPhase = 'idle';
      craftResult = null;
      renderPanel();
    }, CRAFT_RESULT_HOLD*1000);
  }, CRAFT_SPIN_DUR*1000);
}
const CRAFT_ARM_ANGLES = [0,72,144,216,288];
function renderCraftPanel(){
  const sel = craftSelection;
  const isMax = sel && sel.tier >= MAX_TIER;
  const have = sel ? (inventory[invKey(sel.petal,sel.tier)]||0) : 0;
  // an estimate only — a stack craft's real attempt count depends on how the rolls land, since
  // a failed attempt can refund petals back into the pool for another try
  const batches = craftBulk ? Math.max(1, Math.floor(have/CRAFT_COST)) : 1;
  const canCraft = !!sel && craftPhase==='idle' && !isMax && have>=CRAFT_COST;
  const res = craftResult;
  const rc = sel ? RARITY_INFO[PETAL_RARITY[sel.petal]].color : '#8d8256';
  const resRc = res ? RARITY_INFO[PETAL_RARITY[res.petal]].color : rc;

  // each pentagon slot stands in for a whole batch — e.g. 100 petals / 5 slots = ×20 each
  const qtyBadge = batches>1 ? `<div class="craft-slot-badge">×${batches}</div>` : '';
  const arms = CRAFT_ARM_ANGLES.map((ang,i)=>{
    let slotHtml;
    if (craftPhase==='result'){
      if (res.success){
        // still shown normally — the CSS merge animation is what slides & shrinks it into the center
        slotHtml = `<div class="craftslot filled" style="--rc:${resRc}"><canvas class="picn" data-petal="${res.petal}" data-tier="${res.tier}" width="44" height="44"></canvas></div>`;
      } else if (res.destroyedSlots.has(i)){
        slotHtml = `<div class="craftslot filled destroyed" style="--rc:${resRc}"><canvas class="picn" data-petal="${res.petal}" data-tier="${res.tier}" width="44" height="44"></canvas></div>`;
      } else {
        slotHtml = `<div class="craftslot filled" style="--rc:${resRc}"><canvas class="picn" data-petal="${res.petal}" data-tier="${res.tier}" width="44" height="44"></canvas></div>`;
      }
    } else if (craftPhase==='spinning'){
      slotHtml = `<div class="craftslot filled" style="--rc:${rc}"><canvas class="picn" data-petal="${sel.petal}" data-tier="${sel.tier}" width="44" height="44"></canvas>${qtyBadge}</div>`;
    } else {
      const filled = sel && i<Math.min(have, CRAFT_COST);
      slotHtml = filled
        ? `<div class="craftslot filled" style="--rc:${rc}"><canvas class="picn" data-petal="${sel.petal}" data-tier="${sel.tier}" width="44" height="44"></canvas>${qtyBadge}</div>`
        : `<div class="craftslot"></div>`;
    }
    return `<div class="craft-arm" style="transform:rotate(${ang}deg)"><div class="craft-radius"><div class="craft-counter" style="transform:rotate(${-ang}deg)"><div class="craft-spin">${slotHtml}</div></div></div></div>`;
  }).join('');

  const centerShow = craftPhase==='result' && res.success;
  const center = `<div class="craft-center"><div class="craft-center-inner ${centerShow?'show':''}" ${centerShow?`style="--rc:${resRc};background:${resRc}"`:''}>
    ${centerShow?`<canvas class="picn" data-petal="${res.petal}" data-tier="${res.nextTier}" width="60" height="60"></canvas>`:''}
    ${centerShow && res.successCount>1?`<div class="craft-center-badge">×${res.successCount}</div>`:''}
  </div></div>`;

  const pentagonState = craftPhase==='spinning' ? 'spinning'
    : craftPhase==='result' ? (res.success ? 'result-success' : 'result-fail')
    : '';

  let chanceText = 'Select a petal';
  if (craftPhase==='result'){
    const petalName = PETAL_DEFS[res.petal].name;
    if (res.successCount>0 && res.failCount===0){
      chanceText = res.successCount>1
        ? `Crafted ${res.successCount}x Tier ${res.nextTier} ${petalName}!`
        : `Crafted ${petalName} (Tier ${res.nextTier})!`;
    } else if (res.successCount>0){
      chanceText = `Crafted ${res.successCount}x Tier ${res.nextTier} ${petalName} — ${res.failCount} failed`;
    } else {
      chanceText = `Failed — lost ${res.totalLost} ${petalName}`;
    }
  } else if (craftPhase==='spinning'){
    chanceText = batches>1 ? `Crafting ${batches}x…` : 'Crafting…';
  } else if (sel){
    chanceText = isMax ? 'Already max tier' : `${CRAFT_CHANCE[sel.tier]}% success chance`;
  }

  const rows = Object.keys(PETAL_DEFS).filter(k=>k!=='basic' && PETAL_RARITY[k]!=='mythic').sort(byRarityThenNameAsc).map(petalKey=>{
    const rowRc = RARITY_INFO[PETAL_RARITY[petalKey]].color;
    const cells = TIERS.map(t=>{
      const k = invKey(petalKey, t);
      const cnt = inventory[k]||0;
      if (!tierPossible(petalKey, t)) return `<div class="gcell impossible"></div>`;
      if (!discoveredPetals.has(k)) return `<div class="gcell locked" style="--rc:${rowRc}">❓</div>`;
      const isMax = t===MAX_TIER; // nothing to craft tier 6 into
      const short = cnt < CRAFT_COST;
      const disabled = isMax || short;
      const isSel = sel && sel.petal===petalKey && sel.tier===t;
      const cntText = cnt>999 ? (cnt/1000).toFixed(1)+'k' : cnt;
      return `<div class="gcell ${isMax?'maxed':short?'short':''} ${isSel?'sel':''}" style="--rc:${rowRc}" ${disabled?'':`onclick="selectCraftItem('${petalKey}',${t},event.shiftKey)" title="Shift-click to queue all ${Math.floor(cnt/CRAFT_COST)} batches"`}>
        <canvas class="picn" data-petal="${petalKey}" data-tier="${t}" width="40" height="40"></canvas>
        <div class="gc-tier">${toRoman(t)}</div>
        <div class="gc-count">x${cntText}</div>
      </div>`;
    }).join('');
    return `<div class="grow">${cells}</div>`;
  }).join('');

  return `
    <div class="panel-head"><h2>Craft</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="craft-fixed">
      <div class="craft-top">
        <div class="craft-pentagon ${pentagonState}">${arms}${center}</div>
        <div class="craft-action">
          <button class="craft-btn" ${canCraft?'':'disabled'} onclick="attemptCraft()">Craft</button>
          <div class="craft-chance">${chanceText}</div>
        </div>
      </div>
      <div class="craft-hint">Combine ${CRAFT_COST} of the same petal+tier to craft the next tier — shift-click to queue every batch you own. Mythic petals can't be tiered.</div>
    </div>
    <div class="panel-body">
      <div class="craft-grid ${craftPhase!=='idle'?'busy':''}">${rows}</div>
    </div>`;
}

/* ── Forge — guaranteed-success way to obtain ANY petal at tier 1, spending essence of that
     petal's rarity. List of all petals (rarity-sorted); click one to view its recipe. ── */
function selectForgeItem(petal, bulk){
  if (forgePhase!=='idle') return; // no mid-animation swaps
  forgeSelection = petal;
  forgeBulk = !!bulk;
  renderPanel();
}
function attemptForge(){
  if (!forgeSelection || forgePhase!=='idle') return;
  const rarity = PETAL_RARITY[forgeSelection];
  const cost = forgeCost(rarity);
  const k = essenceKey(rarity);
  const have = essence[k]||0;
  if (have < cost) return;
  const batches = forgeBulk ? Math.max(1, Math.floor(have/cost)) : 1;

  forgePhase = 'spinning';
  const root = document.getElementById('panelRoot');
  root.querySelector('.craft-pentagon')?.classList.add('spinning');
  const btn = root.querySelector('.craft-btn');
  if (btn) btn.disabled = true;
  const chanceEl = root.querySelector('.craft-chance');
  if (chanceEl) chanceEl.textContent = 'Forging…';

  setTimeout(()=>{
    essence[k] -= cost*batches;
    const startTier = RARITY_START_TIER[rarity];
    const nk = invKey(forgeSelection, startTier);
    inventory[nk] = (inventory[nk]||0) + batches;
    discoveredPetals.add(nk);
    forgeResult = { petal: forgeSelection, tier: startTier, count: batches };
    forgePhase = 'result';
    renderPanel();
    saveProgress();

    setTimeout(()=>{
      forgePhase = 'idle';
      forgeResult = null;
      renderPanel();
    }, CRAFT_RESULT_HOLD*1000);
  }, CRAFT_SPIN_DUR*1000);
}
function renderForgePanel(){
  if (!forgeSelection){
    // the forge always shows what you're picking — discovery only hides a petal's stats,
    // which live in the Petal Gallery instead
    const petalsSorted = Object.keys(PETAL_DEFS).filter(k=>k!=='basic').sort(byRarityThenNameAsc);
    const cells = petalsSorted.map(petalKey=>{
      const rc = RARITY_INFO[PETAL_RARITY[petalKey]].color;
      const rarity = PETAL_RARITY[petalKey], cost = forgeCost(rarity);
      const have = essence[essenceKey(rarity)]||0;
      return `<div class="gcell" style="--rc:${rc}" onclick="selectForgeItem('${petalKey}',event.shiftKey)" title="Shift-click to queue all ${Math.floor(have/cost)} batches">
        <canvas class="picn" data-petal="${petalKey}" width="40" height="40"></canvas>
      </div>`;
    }).join('');
    return `
      <div class="panel-head"><h2>Forge</h2><button class="x" onclick="closePanel()">✕</button></div>
      <div class="panel-body">
        <div class="inv-sub">Click a petal to view its forge recipe — shift-click to queue every batch you own</div>
        <div class="grow">${cells}</div>
      </div>`;
  }

  const target = forgeSelection;
  const rarity = PETAL_RARITY[target];
  const cost = forgeCost(rarity);
  const startTier = RARITY_START_TIER[rarity];
  const perSlot = cost/5;
  const have = essence[essenceKey(rarity)]||0;
  const canForge = forgePhase==='idle' && have>=cost;
  const rc = RARITY_INFO[rarity].color;
  // an estimate only while idle — mirrors the craft menu's batch estimate
  const batches = forgeBulk ? Math.max(1, Math.floor(have/cost)) : 1;
  const res = forgeResult;

  const slotCount = perSlot * (forgePhase==='result' ? res.count : batches);
  const qtyBadge = slotCount>1 ? `<div class="craft-slot-badge">×${slotCount}</div>` : '';
  const arms = CRAFT_ARM_ANGLES.map(ang=>{
    const cls = have>=cost ? 'filled' : 'filled missing';
    return `<div class="craft-arm" style="transform:rotate(${ang}deg)"><div class="craft-radius"><div class="craft-counter" style="transform:rotate(${-ang}deg)"><div class="craft-spin"><div class="craftslot ${cls}" style="--rc:${rc}"><canvas class="eicon" data-rarity="${rarity}" width="44" height="44"></canvas>${qtyBadge}</div></div></div></div></div>`;
  }).join('');

  // the center stays hidden (no petal spoiler, no idle placeholder) until a forge actually
  // succeeds, then reveals the result exactly like the craft menu's center reveal
  const centerShow = forgePhase==='result';
  const center = `<div class="craft-center"><div class="craft-center-inner ${centerShow?'show':''}" ${centerShow?`style="--rc:${rc};background:${rc}"`:''}>
    ${centerShow?`<canvas class="picn" data-petal="${target}" data-tier="${startTier}" width="60" height="60"></canvas>`:''}
    ${centerShow && res.count>1?`<div class="craft-center-badge">×${res.count}</div>`:''}
  </div></div>`;

  const pentagonState = forgePhase==='spinning' ? 'spinning' : forgePhase==='result' ? 'result-success' : '';

  let statusText;
  if (forgePhase==='spinning') statusText = batches>1 ? `Forging ${batches}x…` : 'Forging…';
  else if (forgePhase==='result') statusText = res.count>1 ? `Forged ${res.count}x ${PETAL_DEFS[target].name}!` : `Forged ${PETAL_DEFS[target].name}!`;
  else statusText = canForge ? 'Ready to forge' : `Need ${cost}x ${RARITY_INFO[rarity].name} Essence`;

  return `
    <div class="panel-head"><h2>Forge — ${PETAL_DEFS[target].name}</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="craft-fixed">
      <div class="craft-top">
        <div class="craft-pentagon ${pentagonState}">${arms}${center}</div>
        <div class="craft-action">
          <button class="craft-btn" ${canForge?'':'disabled'} onclick="attemptForge()">Forge</button>
          <div class="craft-chance">${statusText}</div>
        </div>
      </div>
      <div class="craft-hint">Requires ${cost}x ${RARITY_INFO[rarity].name} Essence (have ${have}) — outputs a fresh Tier ${startTier} petal${batches>1?` · queued ${batches}x`:''}</div>
    </div>
    <div class="panel-body">
      <div class="inv-sub"><span style="cursor:pointer;text-decoration:underline" onclick="selectForgeItem(null)">← back to list</span></div>
    </div>`;
}

/* ══════════════════════════════════════════
   ACCOUNTS + SAVE  ·  local/dev auth — see .server.cjs for the API
   ══════════════════════════════════════════ */
let authed = true; // sign-in disabled for now (was failing to fetch) — game just runs unauthenticated
let authToken = null;

function authHeaders(){ return authToken ? {'Authorization':'Bearer '+authToken} : {}; }
async function apiPost(path, body){
  const res = await fetch(path, { method:'POST', headers:{'Content-Type':'application/json', ...authHeaders()}, body: JSON.stringify(body||{}) });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || 'request failed');
  return data;
}
async function apiGet(path){
  const res = await fetch(path, { headers: authHeaders() });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(data.error || 'request failed');
  return data;
}
// only true progress is saved — not ephemeral world/session state like position, live mobs,
// pickups, or which panel is open
function buildSavePayload(){
  return {
    playerLevel, playerXp, inventory,
    discoveredPetals: Array.from(discoveredPetals),
    killedMobs: Array.from(killedMobs),
    loadouts, activeLoadout, essence,
  };
}
function applySave(save){
  if (!save) return;
  if (save.playerLevel!=null) playerLevel = save.playerLevel;
  if (save.playerXp!=null) playerXp = save.playerXp;
  if (save.inventory) inventory = save.inventory;
  if (save.discoveredPetals) discoveredPetals = new Set(save.discoveredPetals);
  if (save.killedMobs) killedMobs = new Set(save.killedMobs);
  if (save.loadouts) loadouts = save.loadouts;
  if (save.activeLoadout!=null) activeLoadout = save.activeLoadout;
  if (save.essence) essence = save.essence;
  player = makePlayer();
  rebuildInstances();
}
let saveInFlight = false;
function saveProgress(){
  if (!authed || !authToken || saveInFlight) return; // no-op while sign-in is disabled (no token)
  saveInFlight = true;
  apiPost('/api/save', buildSavePayload()).catch(()=>{}).finally(()=>{ saveInFlight = false; });
}
function setAuthError(msg){ document.getElementById('authError').textContent = msg || ''; }
// isResume: true when restoring a stored session on page load (vs a fresh login/signup click) —
// only then do we bounce back to the login screen if the token turns out to be stale
async function enterGame(token, username, isResume){
  authToken = token;
  try {
    const { save } = await apiGet('/api/load');
    applySave(save);
  } catch(e){
    if (isResume){
      localStorage.removeItem('florrToken'); localStorage.removeItem('florrUser');
      document.getElementById('authScreen').classList.add('show');
      return;
    }
  }
  localStorage.setItem('florrToken', token);
  localStorage.setItem('florrUser', username);
  authed = true;
  document.getElementById('authScreen').classList.remove('show');
  document.getElementById('logoutBtn').style.display = '';
}
function doLogin(){
  const username = document.getElementById('authUser').value.trim();
  const password = document.getElementById('authPass').value;
  setAuthError('');
  apiPost('/api/login', {username, password}).then(({token})=>enterGame(token, username)).catch(e=>setAuthError(e.message));
}
function doSignup(){
  const username = document.getElementById('authUser').value.trim();
  const password = document.getElementById('authPass').value;
  setAuthError('');
  apiPost('/api/signup', {username, password}).then(({token})=>enterGame(token, username)).catch(e=>setAuthError(e.message));
}
function logout(){
  saveProgress();
  localStorage.removeItem('florrToken'); localStorage.removeItem('florrUser');
  location.reload();
}
window.doLogin = doLogin; window.doSignup = doSignup; window.logout = logout;

setInterval(saveProgress, 15000);
addEventListener('visibilitychange', ()=>{ if (document.visibilityState==='hidden') saveProgress(); });
addEventListener('beforeunload', saveProgress);

/* ══════════════════════════════════════════
   INIT + MAIN LOOP
   ══════════════════════════════════════════ */
loadouts = [defaultLoadout(), defaultLoadout()];
rebuildInstances();
seedMobs();

let last = performance.now();
function loop(now){
  let dt = (now - last)/1000; last = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// sign-in is disabled for now — skip showing the login screen and skip session resume/auto-save
// entirely (re-enable by restoring the block this replaced)
</script>
