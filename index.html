<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florr Clone — Base Engine</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#1b7a3a;font-family:'Segoe UI',system-ui,sans-serif;}
  canvas{display:block;cursor:crosshair;}
  #hud{position:fixed;top:12px;left:12px;color:#fff;font-size:13px;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.5);line-height:1.5;pointer-events:none;}
  #hud b{color:#ffe27a;}
  #dead{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0);color:#fff;opacity:0;pointer-events:none;transition:opacity .5s ease,background .5s ease;}
  #dead.show{opacity:1;background:rgba(0,0,0,.55);pointer-events:auto;}
  #dead h1{font-size:44px;margin-bottom:14px;transform:translateY(14px) scale(.96);transition:transform .5s cubic-bezier(.2,.8,.3,1);}
  #dead.show h1{transform:translateY(0) scale(1);}
  #dead button{margin-top:10px;padding:10px 22px;border:none;border-radius:10px;background:#ffe27a;color:#222;font-weight:800;font-size:16px;cursor:pointer;opacity:0;transform:translateY(14px);transition:opacity .5s ease .15s,transform .5s cubic-bezier(.2,.8,.3,1) .15s;}
  #dead.show button{opacity:1;transform:translateY(0);}

  /* ── loadout bar ── */
  #loadoutBar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20;}
  .lbslot{position:relative;width:54px;height:54px;border-radius:12px;background:var(--rc,#7eef6d);border:2px solid color-mix(in srgb, var(--rc,#7eef6d) 55%, black);overflow:hidden;box-shadow:0 3px 0 rgba(0,0,0,.35);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .lbslot .lbicon{width:30px;height:30px;position:relative;z-index:2;}
  .lbslot .lbname{position:relative;z-index:2;font-size:8px;font-weight:800;color:#fff;text-shadow:0 1px 2px #000;}
  .lbslot .lbcover{position:absolute;top:0;left:0;right:0;height:0%;background:rgba(4,10,18,.75);transition:height .12s linear;z-index:1;}

  /* ── toasts ── */
  #toasts{position:fixed;top:60px;right:14px;display:flex;flex-direction:column;gap:6px;z-index:30;pointer-events:none;}
  .toast{background:#0b2035;border:1px solid #1d4368;border-left:4px solid var(--rc,#8bd94a);color:#fff;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px;opacity:1;transition:opacity .4s,transform .4s;box-shadow:0 4px 14px rgba(0,0,0,.4);}
  .toast.out{opacity:0;transform:translateX(20px);}

  /* ── panels · small, corner-anchored, never block the game ── */
  #panelBackdrop{position:fixed;inset:0;display:none;z-index:50;pointer-events:none;}
  #panelBackdrop.show{display:block;}
  .panel{position:fixed;top:64px;left:12px;pointer-events:auto;
    display:flex;flex-direction:column;max-height:64vh;
    border-radius:14px;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;box-shadow:0 14px 32px rgba(0,0,0,.45);}
  .panel-head{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:8px 10px;z-index:5;}
  .panel-head h2{font-size:16px;font-weight:900;color:#fff;letter-spacing:.02em;
    text-shadow:-1.5px -1.5px 0 rgba(0,0,0,.5),1.5px -1.5px 0 rgba(0,0,0,.5),-1.5px 1.5px 0 rgba(0,0,0,.5),1.5px 1.5px 0 rgba(0,0,0,.5);}
  .panel-head .x{background:#e04b4b;border:2px solid #7a1414;color:#fff;border-radius:8px;width:24px;height:24px;font-weight:900;cursor:pointer;font-size:12px;box-shadow:0 2px 0 #7a1414;}
  .panel-head .x:hover{filter:brightness(1.12);}
  .panel-body{overflow:auto;flex:1;min-height:0;padding:6px;}

  /* ── Mob / Petal Gallery — olive, textured, tight grid, no labels ── */
  .panel.gallery{
    width:300px;
    background-color:#c7ba3c;
    background-image:
      radial-gradient(circle at 12% 22%, rgba(0,0,0,.07) 0 26px, transparent 27px),
      radial-gradient(circle at 68% 55%, rgba(0,0,0,.06) 0 34px, transparent 35px),
      radial-gradient(circle at 38% 82%, rgba(0,0,0,.05) 0 22px, transparent 23px),
      radial-gradient(circle at 88% 14%, rgba(0,0,0,.05) 0 18px, transparent 19px),
      radial-gradient(circle at 6% 78%, rgba(255,255,255,.06) 0 20px, transparent 21px);
    border:5px solid #7d7328;
  }
  .panel.gallery .panel-head{background:#b3a635;border-bottom:3px solid #7d7328;}
  .grow{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;margin-bottom:2px;}
  .gcell{aspect-ratio:1;border-radius:5px;border:4px solid color-mix(in srgb, var(--rc) 55%, black);background:color-mix(in srgb, var(--rc) 32%, #fffef2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s;}
  .gcell:hover{transform:scale(1.08);z-index:2;}
  .gcell.locked{background:rgba(0,0,0,.15);border-color:rgba(0,0,0,.35);cursor:default;font-size:14px;opacity:.6;}
  .gcell.locked:hover{transform:none;}
  .gicon{width:70%;height:70%;}

  /* click-triggered detail tooltip, shared by both galleries */
  .galtip{position:fixed;display:none;z-index:90;width:250px;background:#1c2410;border:3px solid #7d7328;border-radius:12px;padding:12px 14px;color:#f2edcf;box-shadow:0 12px 28px rgba(0,0,0,.5);}
  .galtip.show{display:block;}
  .galtip .tip-name{font-size:16px;font-weight:900;margin-bottom:2px;}
  .galtip .tip-rar{font-size:11px;font-weight:800;text-transform:uppercase;margin-bottom:8px;}
  .galtip .tip-desc{font-size:12px;color:#c9c397;margin-bottom:8px;line-height:1.4;}
  .galtip .tip-stats{font-size:12px;font-weight:800;color:#ffd24d;margin-bottom:8px;}
  .ratecard-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .ratecard{width:60px;background:var(--rc,#8d8256);border:2px solid color-mix(in srgb, var(--rc,#8d8256) 55%, black);border-radius:10px;padding:5px 3px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2px;}
  .ratecard .picn,.ratecard .gicon{width:24px;height:24px;}
  .ratecard .rc-name{font-size:9px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.45);line-height:1.1;}
  .ratecard .rc-pct{font-size:10px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.45);}
  .ratecard.locked{background:rgba(0,0,0,.32);border-color:rgba(0,0,0,.45);font-size:16px;}
  .ratecard.mobcard{background:#8d8256;border-color:#5c5430;}

  /* ── Inventory — blue/green, drag-and-drop ── */
  .panel.inventory{width:320px;background:#4f93d6;border:5px solid #2f6b23;}
  .panel.inventory .panel-head{background:transparent;}
  .inv-sub{text-align:center;color:#eaf3ff;font-weight:800;font-size:11px;margin:-2px 0 6px;text-shadow:0 1px 2px rgba(0,0,0,.3);}
  .inv-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#3f7dbd;border-radius:8px;padding:6px 8px;}
  .inv-toolbar label{display:flex;align-items:center;gap:4px;font-weight:800;color:#fff;font-size:11px;flex-shrink:0;cursor:pointer;}
  .inv-search{flex:1;padding:5px 8px;border-radius:6px;border:2px solid #2a5c1f;font-size:12px;min-width:0;}
  .loadout-slots{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;background:#3f7dbd;border-radius:8px;padding:6px;}
  .lslot{width:56px;height:56px;background:#fff;border:3px dashed #2a5c1f;border-radius:8px;padding:4px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;}
  .lslot.sel{border-style:solid;border-color:#ffb020;box-shadow:0 0 0 3px rgba(255,176,32,.3);}
  .lslot.dragover{border-style:solid;border-color:#ffe27a;background:#fff9e0;}
  .lslot .picn{width:26px;height:26px;border-radius:6px;background:#f4f0de;box-shadow:inset 0 0 0 3px var(--rc,#7eef6d);}
  .lslot .pname{font-size:8px;font-weight:800;color:#2a2a2a;}
  .inv-section-head{color:var(--rc);font-weight:900;font-size:11px;text-align:center;margin:8px 0 4px;display:flex;align-items:center;gap:6px;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .inv-section-head::before,.inv-section-head::after{content:'';flex:1;height:2px;background:var(--rc);opacity:.7;}
  .inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(56px,1fr));gap:4px;}
  .istack{background:#fff;border:4px solid color-mix(in srgb, var(--rc) 55%, black);border-radius:8px;padding:4px;cursor:grab;position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:60px;}
  .istack:active{cursor:grabbing;}
  .istack:hover{transform:translateY(-1px);}
  .istack .picn{width:24px;height:24px;}
  .istack .pname{font-size:8px;font-weight:800;color:#2a2a2a;}
  .istack .pcount{position:absolute;top:2px;right:3px;font-size:8px;font-weight:900;color:#fff;background:rgba(0,0,0,.65);padding:0 3px;border-radius:6px;}
  .inv-empty{color:#eaf3ff;font-size:13px;grid-column:1/-1;font-weight:600;text-align:center;padding:20px;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div>WASD move · Hold Left-Click expand/attack · Space/Right-Click contract</div>
  <div>E inventory · M mobs · P petals</div>
  <div id="stats"></div>
</div>
<div id="loadoutBar"></div>
<div id="toasts"></div>
<div id="dead"><h1>You Died</h1><button onclick="respawn()">Respawn</button></div>

<div id="panelBackdrop">
  <div class="panel" id="panelRoot"></div>
</div>
<div id="galTip" class="galtip"></div>

<script>
const canvas = document.getElementById('c');
let ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
addEventListener('resize', resize); resize();

const TAU = Math.PI * 2;
const rand = (a,b)=> a + Math.random()*(b-a);
const clamp = (v,a,b)=> v<a?a : v>b?b : v;
const len = (x,y)=> Math.hypot(x,y);
function pickWeighted(list){
  let total=0; for(const it of list) total += it.weight;
  let r = Math.random()*total;
  for(const it of list){ r -= it.weight; if(r<=0) return it; }
  return list[list.length-1];
}

const ARENA = { w: 6400, h: 1500 };

/* ── difficulty zones — left to right, each unlocking a higher rarity band.
      Weights within a zone are the SAME per-rarity weights used globally, so the
      relative rarity ordering (mythic rarer than legendary rarer than epic, etc.)
      is preserved inside each zone, not just across the whole map. ── */
const ZONES = [
  { name:'Easy',   bg:'#1e8a42', rarities:['common','unusual','rare'] },
  { name:'Medium', bg:'#a68a1e', rarities:['unusual','rare','epic','legendary'] },
  { name:'Hard',   bg:'#8a2e1e', rarities:['epic','legendary','mythic'] },
];
function zoneAt(x){
  if (x < ARENA.w/3) return ZONES[0];
  if (x < ARENA.w*2/3) return ZONES[1];
  return ZONES[2];
}
const cam = { x: 0, y: 0 };

/* ══════════════════════════════════════════
   INPUT
   ══════════════════════════════════════════ */
const keys = {};
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (e.code === 'Space') { keys[' '] = true; e.preventDefault(); }
  if (k==='e') togglePanel('inventory');
  else if (k==='m') togglePanel('mob');
  else if (k==='p') togglePanel('petal');
  else if (k==='escape') closePanel();
});
addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.code === 'Space') keys[' '] = false;
});
let mouseDownL = false, mouseDownR = false;
addEventListener('mousedown', e => { if(e.button===0) mouseDownL=true; if(e.button===2) mouseDownR=true; });
addEventListener('mouseup',   e => { if(e.button===0) mouseDownL=false; if(e.button===2) mouseDownR=false; });
addEventListener('contextmenu', e => e.preventDefault());

/* ══════════════════════════════════════════
   RARITY & SCALING
   ══════════════════════════════════════════ */
const RARITIES = ['common','unusual','rare','epic','legendary','mythic'];
const RARITY_INFO = {
  common:    { name:'Common',    color:'#7eef6d', mobStep:1,  petalStep:1,  weight:8000 },
  unusual:   { name:'Unusual',   color:'#ffe65d', mobStep:3,  petalStep:3,  weight:1700 },
  rare:      { name:'Rare',      color:'#4d52e3', mobStep:3,  petalStep:3,  weight:270 },
  epic:      { name:'Epic',      color:'#861fde', mobStep:5,  petalStep:3,  weight:25 },
  legendary: { name:'Legendary', color:'#de1f1f', mobStep:7,  petalStep:5,  weight:4 },
  mythic:    { name:'Mythic',    color:'#1fdbde', mobStep:20, petalStep:20, weight:1 },
};
function buildScale(stepKey){
  const scale = {}; let acc = 1;
  RARITIES.forEach(r => { acc *= RARITY_INFO[r][stepKey]; scale[r] = acc; });
  return scale;
}
const MOB_SCALE = buildScale('mobStep');
const PETAL_SCALE = buildScale('petalStep');
const SIZE_SCALE = { common:1, unusual:1.1, rare:1.22, epic:1.4, legendary:1.65, mythic:2.1 };
function pscale(def, key, rarity){ return (def[key]||0) * PETAL_SCALE[rarity]; }

/* ══════════════════════════════════════════
   DROP TABLES  ·  {mobRarity: {tier: [{r:petalRarity, p:percent}, ...]}}
   ══════════════════════════════════════════ */
const DROP_TABLES = {
  common:    { extra:[{r:'common',p:25}],  base:[{r:'common',p:10}] },
  unusual:   { extra:[{r:'unusual',p:10},{r:'common',p:50}], base:[{r:'unusual',p:5},{r:'common',p:25}] },
  rare:      { extra:[{r:'rare',p:3},{r:'unusual',p:15},{r:'common',p:82}],
               base:[{r:'rare',p:1},{r:'unusual',p:5},{r:'common',p:94}],
               subbase:[{r:'rare',p:2.5}] },
  epic:      { extra:[{r:'epic',p:3},{r:'rare',p:15},{r:'unusual',p:82}],
               base:[{r:'epic',p:1},{r:'rare',p:5},{r:'unusual',p:94}],
               subbase:[{r:'rare',p:10},{r:'epic',p:0.5}],
               abyssmal:[{r:'epic',p:1.5}] },
  legendary: { extra:[{r:'legendary',p:3},{r:'epic',p:15},{r:'rare',p:82}],
               base:[{r:'legendary',p:1},{r:'epic',p:5},{r:'rare',p:94}],
               subbase:[{r:'rare',p:80},{r:'epic',p:20}],
               abyssmal:[{r:'legendary',p:0.1},{r:'epic',p:39.9}] },
  mythic:    { extra:[{r:'legendary',p:100}], base:[{r:'legendary',p:100}],
               subbase:[{r:'legendary',p:10},{r:'epic',p:90}],
               abyssmal:[{r:'legendary',p:10},{r:'epic',p:90}],
               hidden:[{r:'legendary',p:1}] },
};
function rollDrop(mobRarity, tier){
  const table = DROP_TABLES[mobRarity] && DROP_TABLES[mobRarity][tier];
  if (!table) return null;
  let roll = Math.random()*100;
  for (const entry of table){ if (roll < entry.p) return entry.r; roll -= entry.p; }
  return null;
}

/* ══════════════════════════════════════════
   PETAL DEFINITIONS
   ══════════════════════════════════════════ */
const PETAL_DEFS = {
  basic:    { name:'Basic',    color:'#f2f2f2', shape:'circle', health:10, damage:10, reload:2.5, desc:'A balanced starting petal.' },
  wing:     { name:'Wing',     color:'#eaeaea', shape:'drop',   health:10, damage:10, reload:2.1, reach:24, desc:"Extends a little further when attacking and reloads a bit faster." },
  leaf:     { name:'Leaf',     color:'#4ade80', shape:'leaf',   health:10, damage:10, reload:2.5, healPerSec:1, desc:'Passively heals the flower a little while equipped.' },
  rose:     { name:'Rose',     color:'#f472b6', shape:'circle', health:50, damage:0,  reload:2.5, armTime:0.5, healBurst:30, desc:'Deals no damage but has hugely improved HP. Once fully healed it arms for 0.5s, then self-destructs for a big heal.' },
  light:    { name:'Light',    color:'#fff27a', shape:'ring',   health:10, damage:10, reload:1.0, desc:'Reloads significantly faster than a basic petal.' },
  stinger:  { name:'Stinger',  color:'#f5c542', shape:'spike',  health:1,  damage:60, reload:4.0, desc:'Extremely fragile with a slow reload, but deals ridiculous damage.' },
  honey:    { name:'Honey',    color:'#e8a916', shape:'drop',   health:10, damage:1,  reload:2.5, slowMult:0.5, slowDur:2, desc:"Deals 10x less damage, but halves a mob's movement speed on hit." },
  faster:   { name:'Faster',   color:'#7dd3fc', shape:'chevron',health:10, damage:10, reload:2.1, rotBonus:0.35, desc:'Reloads a little faster and speeds up your whole petal ring while active.' },
  web:      { name:'Web',      color:'#d1d5db', shape:'web',    health:10, damage:10, reload:2.5, projectile:true, projSpeed:520, projLife:3, fireRange:300, desc:'Fires at a nearby mob, flying fast in a straight line until it hits or expires after 3s.' },
  mandible: { name:'Mandible', color:'#a8763e', shape:'pincer', health:10, damage:10, reload:2.5, slowMult:0.75, slowDur:2, desc:"Basic stats, but slows a mob's movement to 0.75x on hit." },
  dahlia:   { name:'Dahlia',   color:'#f472b6', shape:'cluster',health:50, damage:0,  reload:1.875, armTime:0.5, healBurst:7.5, parts:3, desc:'Three miniature Roses — faster reload, but a much smaller heal each.' },
  pollen:   { name:'Pollen',   color:'#fff27a', shape:'dust',   health:10, damage:4,  reload:1.0, parts:3, desc:'Three miniature Lights, each hitting for 0.4x damage.' },
  thirdEye: { name:'Third Eye',color:'#a855f7', shape:'eye',    health:10, damage:10, reload:2.5, rangeBonus:0.8, desc:'Drastically extends the reach of your whole petal ring while attacking.' },
  tulip:    { name:'Tulip',    color:'#f472b6', shape:'tulipflower', health:50, damage:0, reload:2.5, armTime:0.5, healBurst:30, parts:2, desc:'Spawns two full Roses.' },
  rock:     { name:'Rock',     color:'#9c9c9c', shape:'rock',   health:30, damage:10, reload:2.5, desc:'Higher HP than a basic petal.' },
  heavy:    { name:'Heavy',    color:'#6b6b6b', shape:'rock',   health:60, damage:10, reload:4.0, desc:'Significantly higher HP than normal, at the cost of a slow reload.' },
  moon:     { name:'Moon',     color:'#dfe7ff', shape:'crescent',health:500,damage:10, reload:10.0, desc:'Ridiculous amounts of HP, but an extremely slow reload.' },
};
const ORBIT = { restR:60, expandR:118, contractR:26, rotSpeed:2.3 };
const PETAL_HIT_CD = 0.35;
const LOADOUT_SIZE = 5;
const SPAWN_DUR = 0.32;   // time for a petal to emerge from the flower into orbit
const EAT_DUR = 0.38;     // time for a self-destructing petal (Rose family) to be drawn into the flower
const HP_EASE = 6;        // health-bar catch-up rate (higher = snappier)
function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }
function easeInCubic(t){ return t*t*t; }

/* ══════════════════════════════════════════
   MOB DEFINITIONS
   ══════════════════════════════════════════ */
const MOB_KNOCKBACK = 155; // uniform for every mob unless a gimmick overrides it
const MOB_DEFS = {
  ant: {
    name:'Ant', r:20, health:55, contactDmg:14, petalDmg:10, mass:3, friction:7,
    speed:200, behavior:'neutral', color:'#6b3f1d', weight:25,
    drops:[ {petal:'wing',tier:'base'}, {petal:'leaf',tier:'subbase'}, {petal:'mandible',tier:'abyssmal'} ],
  },
  ladybug: {
    name:'Ladybug', r:22, health:45, contactDmg:8, petalDmg:6, mass:1.3, friction:6,
    speed:60, behavior:'passive', color:'#e6352b', weight:30,
    drops:[ {petal:'rose',tier:'base'}, {petal:'light',tier:'subbase'}, {petal:'dahlia',tier:'abyssmal'}, {petal:'tulip',tier:'hidden'} ],
  },
  bee: {
    name:'Bee', r:16, health:30, contactDmg:24, petalDmg:14, mass:1.2, friction:5,
    speed:200, behavior:'neutral-swerve', color:'#ffcf33', weight:20,
    drops:[ {petal:'stinger',tier:'base'}, {petal:'honey',tier:'subbase'}, {petal:'pollen',tier:'abyssmal'} ],
  },
  spider: {
    name:'Spider', r:24, health:32, contactDmg:14, petalDmg:9, mass:8, friction:8,
    speed:240, behavior:'hostile', aggroRange:420, color:'#2b2b33', weight:15,
    drops:[ {petal:'faster',tier:'base'}, {petal:'web',tier:'subbase'}, {petal:'thirdEye',tier:'abyssmal'} ],
  },
  rock: {
    name:'Rock', r:30, health:130, contactDmg:4, petalDmg:9, mass:45, friction:12,
    speed:0, behavior:'stationary', color:'#8d8d94', weight:10,
    drops:[ {petal:'rock',tier:'base'}, {petal:'heavy',tier:'subbase'}, {petal:'moon',tier:'hidden'} ],
  },
};
function behaviorText(def, mobKey, rarity){
  if (mobKey==='ladybug'){
    const fightsBack = rarity && RARITIES.indexOf(rarity) >= RARITIES.indexOf('rare');
    return fightsBack
      ? `Passive — but rare+ ladybugs fight back and chase at ${def.speed} spd once attacked.`
      : 'Passive — drifts around, pauses, drifts again. Never fights back, even if attacked.';
  }
  if (mobKey==='bee'){
    const fightsBack = rarity && rarity!=='common' && rarity!=='unusual';
    return fightsBack
      ? 'Neutral — ignores you until attacked, then runs at you while swerving side to side.'
      : "Passive — common/unusual bees won't fight back, even if attacked.";
  }
  switch(def.behavior){
    case 'passive': return 'Passive — drifts around, pauses, drifts again. Never attacks.';
    case 'neutral': return "Neutral — ignores you until attacked, then chases at " + def.speed + " spd.";
    case 'neutral-swerve': return "Neutral — ignores you until attacked, then runs at you while swerving side to side.";
    case 'hostile': return `Hostile — chases you on sight within ${def.aggroRange}px, faster than you.`;
    case 'stationary': return "Stationary — never moves.";
  }
  return '';
}
function petalSource(petalId){
  for (const k in MOB_DEFS) for (const d of MOB_DEFS[k].drops) if (d.petal===petalId) return { mobKey:k, mob:MOB_DEFS[k].name, tier:d.tier };
  return null;
}

/* ══════════════════════════════════════════
   PLAYER
   ══════════════════════════════════════════ */
function makePlayer(){
  return {
    x: ARENA.w/6, y: ARENA.h/2, r: 26,   // spawn inside the Easy zone, not the Medium zone at map-center
    mvx:0, mvy:0, kvx:0, kvy:0,
    maxSpeed:200, accel:12, decel:10, kFriction:9, knockback:0,
    maxHealth:260, health:260, dispHealth:260,
    iframe:0, hurtFlash:0, kbLock:0,
    petalAngle:0, orbitR: ORBIT.restR,
    instances:[],
  };
}
let player = makePlayer();
const KB_LOCK = 0.08;
function iframeFor(knockback){
  const dist = knockback / player.kFriction;
  return KB_LOCK + dist / player.maxSpeed;
}

/* ── inventory / loadout ── */
let inventory = {};         // "petal|rarity" -> count
let discovered = new Set(); // petal ids ever obtained
let loadout = [];
let selectedSlot = null;
function invKey(petal,rarity){ return petal+'|'+rarity; }
function defaultLoadout(){ return Array.from({length:LOADOUT_SIZE}, ()=>({petal:'basic',rarity:'common'})); }

function rebuildInstances(){
  player.instances = [];
  loadout.forEach((slot,i)=>{
    const def = PETAL_DEFS[slot.petal];
    const parts = def.parts||1;
    for (let p=0;p<parts;p++){
      player.instances.push({
        slot:i, petal:slot.petal, rarity:slot.rarity, parts, partIndex:p,
        health: pscale(def,'health',slot.rarity), broken:false, regenT:0, hitCd:0,
        armT: def.armTime||0, flying:false, vx:0, vy:0, life:0, x:player.x, y:player.y,
        spawnT:0, eating:false, eatT:0, eatFromX:player.x, eatFromY:player.y, pendingHeal:0,
      });
    }
  });
}
function equipFromInventory(petal, rarity){
  const target = selectedSlot!==null ? selectedSlot : 0; // fallback for click-to-equip; drag-drop targets a slot directly
  const k = invKey(petal,rarity);
  if (!inventory[k] || inventory[k]<=0) return;
  const old = loadout[target];
  if (old.petal!=='basic'){ const ok=invKey(old.petal,old.rarity); inventory[ok]=(inventory[ok]||0)+1; }
  inventory[k]--;
  loadout[target] = { petal, rarity };
  selectedSlot = null;
  rebuildInstances();
  renderPanel();
}
function selectSlot(i){
  if (selectedSlot===i){ unequipSlot(i); selectedSlot=null; }
  else selectedSlot = i;
  renderPanel();
}
function unequipSlot(i){
  const old = loadout[i];
  if (old.petal!=='basic'){ const k=invKey(old.petal,old.rarity); inventory[k]=(inventory[k]||0)+1; }
  loadout[i] = { petal:'basic', rarity:'common' };
  rebuildInstances();
}

/* ── pickups ── */
const pickups = [];
function spawnPickup(x,y,petal,rarity){
  pickups.push({ x, y, petal, rarity, vx:rand(-40,40), vy:rand(-40,40), born:performance.now()/1000 });
}
function collectPickup(p){
  const k = invKey(p.petal,p.rarity);
  inventory[k] = (inventory[k]||0)+1;
  discovered.add(p.petal);
  pushToast(`+1 ${PETAL_DEFS[p.petal].name} (${RARITY_INFO[p.rarity].name})`, RARITY_INFO[p.rarity].color);
  if (openPanelName==='inventory') renderPanel();
}
function pushToast(text, color){
  const el = document.createElement('div');
  el.className = 'toast'; el.style.setProperty('--rc', color); el.textContent = text;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{ el.classList.add('out'); setTimeout(()=>el.remove(), 450); }, 2200);
}

/* ══════════════════════════════════════════
   MOB SPAWNING  ·  chunk-based density + rarity
   ══════════════════════════════════════════ */
const mobs = [];
function rockShape(){ const n=7,out=[]; for(let i=0;i<n;i++) out.push(rand(0.78,1.12)); return out; }

function spawnMob(typeKey, rarity, x, y){
  const b = MOB_DEFS[typeKey], size = SIZE_SCALE[rarity];
  const m = {
    type:typeKey, rarity, rarityName:RARITY_INFO[rarity].name, rarityColor:RARITY_INFO[rarity].color,
    x, y, vx:0, vy:0,
    r: b.r*(1+(size-1)*0.5),
    health: b.health*MOB_SCALE[rarity], maxHealth: b.health*MOB_SCALE[rarity], dispHealth: b.health*MOB_SCALE[rarity],
    contactDmg: b.contactDmg*MOB_SCALE[rarity],
    petalDmg:   b.petalDmg*MOB_SCALE[rarity],
    knockback:  MOB_KNOCKBACK,
    mass:       b.mass*size,
    friction:   b.friction, speed:b.speed, color:b.color,
    aggro:false, slowT:0, slowMult:1, hurtFlash:0, legPhase:0, facing:0,
    wanderAng: rand(0,TAU), wanderT: rand(0.5,2),
  };
  if (typeKey==='rock'){ m.spin=rand(0,TAU); m.verts=rockShape(); }
  mobs.push(m); return m;
}
function spawnRandomMob(x,y){
  const type   = pickWeighted(Object.keys(MOB_DEFS).map(k=>({ key:k, weight:MOB_DEFS[k].weight })));
  const zone   = zoneAt(x);
  const rarity = pickWeighted(zone.rarities.map(r=>({ key:r, weight:RARITY_INFO[r].weight })));
  return spawnMob(type.key, rarity.key, x, y);
}

const CHUNK = 650, CHUNK_CAP = 3, SPAWN_TICK = 0.4, SPAWN_SAFE = 360;
let spawnTimer = 0;
function chunkCounts(){
  const c = {};
  for (const m of mobs){ const k = Math.floor(m.x/CHUNK)+','+Math.floor(m.y/CHUNK); c[k]=(c[k]||0)+1; }
  return c;
}
function randInChunk(cx, cy){
  return { x: clamp(cx*CHUNK + rand(50, CHUNK-50), 60, ARENA.w-60), y: clamp(cy*CHUNK + rand(50, CHUNK-50), 60, ARENA.h-60) };
}
function updateSpawns(dt){
  spawnTimer -= dt; if (spawnTimer>0) return; spawnTimer = SPAWN_TICK;
  const counts = chunkCounts();
  const cols = Math.ceil(ARENA.w/CHUNK), rows = Math.ceil(ARENA.h/CHUNK);
  for (let cx=0;cx<cols;cx++) for (let cy=0;cy<rows;cy++){
    if ((counts[cx+','+cy]||0) >= CHUNK_CAP) continue;
    if (Math.random() < 0.5){
      const p = randInChunk(cx,cy);
      if (len(p.x-player.x, p.y-player.y) < SPAWN_SAFE) continue;
      spawnRandomMob(p.x, p.y);
    }
  }
}
function seedMobs(){
  mobs.length = 0;
  const cols = Math.ceil(ARENA.w/CHUNK), rows = Math.ceil(ARENA.h/CHUNK);
  for (let cx=0;cx<cols;cx++) for (let cy=0;cy<rows;cy++){
    for (let n=0;n<CHUNK_CAP;n++){
      const p = randInChunk(cx,cy);
      if (len(p.x-player.x, p.y-player.y) < SPAWN_SAFE) continue;
      spawnRandomMob(p.x, p.y);
    }
  }
}

/* ══════════════════════════════════════════
   COLLISION HELPERS
   ══════════════════════════════════════════ */
function resolveOverlap(a, b, aMass, bMass){
  const dx = b.x-a.x, dy = b.y-a.y;
  let d = len(dx,dy);
  const min = a.r + b.r;
  if (d >= min || d === 0) { if(d===0){ b.x+=0.1; } return null; }
  const nx = dx/d, ny = dy/d;
  const overlap = min - d;
  const total = aMass + bMass;
  a.x -= nx * overlap * (bMass/total);
  a.y -= ny * overlap * (bMass/total);
  b.x += nx * overlap * (aMass/total);
  b.y += ny * overlap * (aMass/total);
  return { nx, ny, overlap };
}
function nearestMobWithin(x,y,range){
  let best=null, bestD=range;
  for (const m of mobs){ const d=len(m.x-x,m.y-y); if(d<bestD){ bestD=d; best=m; } }
  return best;
}
const PETAL_MASS = 1;
function damageMob(m, dmg, dx, dy, d, push){
  m.health -= dmg;
  m.hurtFlash = 0.12;
  if (push){
    const nx = d?dx/d:1, ny = d?dy/d:0;
    const kb = push * (PETAL_MASS / m.mass);
    m.vx += nx*kb; m.vy += ny*kb;
  }
}

/* ══════════════════════════════════════════
   MOB AI
   ══════════════════════════════════════════ */
function wanderStep(m, dt){
  const spd = m.speed * (m.slowT>0 ? m.slowMult : 1);
  m.wanderT -= dt;
  if (m.wanderT<=0){ m.wanderAng = rand(0,TAU); m.wanderT = rand(0.8,2.4); }
  const tx = Math.cos(m.wanderAng)*spd*0.3, ty = Math.sin(m.wanderAng)*spd*0.3;
  m.vx += (tx - m.vx) * clamp(3*dt,0,1);
  m.vy += (ty - m.vy) * clamp(3*dt,0,1);
}
function chaseStep(m, dt, swerve){
  const spd = m.speed * (m.slowT>0 ? m.slowMult : 1);
  const dx = player.x-m.x, dy = player.y-m.y, d = len(dx,dy)||1;
  let ang = Math.atan2(dy,dx);
  if (swerve) ang += Math.sin(performance.now()/1000*5 + m.wanderAng)*0.5;
  const tx = Math.cos(ang)*spd, ty = Math.sin(ang)*spd;
  m.vx += (tx - m.vx) * clamp(4*dt,0,1);
  m.vy += (ty - m.vy) * clamp(4*dt,0,1);
}
function updateMob(m, dt){
  const def = MOB_DEFS[m.type];
  m.dispHealth += (m.health - m.dispHealth) * clamp(HP_EASE*dt, 0, 1);
  if (m.slowT>0) m.slowT -= dt;
  if (m.type==='spider'){
    const speed = len(m.vx,m.vy);
    if (speed>8) m.facing = Math.atan2(m.vy,m.vx);
    m.legPhase += dt * (2 + speed*0.045);
  }
  switch(def.behavior){
    case 'passive': m.aggro ? chaseStep(m, dt, false) : wanderStep(m, dt); break;
    case 'stationary': break;
    case 'neutral': m.aggro ? chaseStep(m, dt, false) : wanderStep(m, dt); break;
    case 'neutral-swerve': m.aggro ? chaseStep(m, dt, true) : wanderStep(m, dt); break;
    case 'hostile': {
      const d = len(player.x-m.x, player.y-m.y);
      d < def.aggroRange ? chaseStep(m, dt, false) : wanderStep(m, dt);
      break;
    }
  }
  const mf = Math.exp(-m.friction*dt);
  m.vx *= mf; m.vy *= mf;
  m.x += m.vx*dt; m.y += m.vy*dt;
  m.x = clamp(m.x, m.r, ARENA.w-m.r);
  m.y = clamp(m.y, m.r, ARENA.h-m.r);
}
function rollMobDrops(m){
  for (const entry of MOB_DEFS[m.type].drops){
    const rarity = rollDrop(m.rarity, entry.tier);
    if (rarity) spawnPickup(m.x, m.y, entry.petal, rarity);
  }
}

/* ══════════════════════════════════════════
   PETAL INSTANCES  ·  position, reload, specials
   ══════════════════════════════════════════ */
function breakInstance(inst, def){
  inst.broken = true; inst.regenT = def.reload; inst.flying = false; inst.health = 0;
}
function orbitTarget(inst){
  const def = PETAL_DEFS[inst.petal];
  const baseAngle = player.petalAngle + (inst.slot/LOADOUT_SIZE)*TAU;
  const partOffset = inst.parts>1 ? (inst.partIndex - (inst.parts-1)/2) * 0.26 : 0;
  const ang = baseAngle + partOffset;
  let radius = player.orbitR;
  if (mouseDownL && def.reach) radius += def.reach;
  return { x: player.x + Math.cos(ang)*radius, y: player.y + Math.sin(ang)*radius };
}
function positionInstance(inst, dt){
  if (inst.flying){ inst.x += inst.vx*dt; inst.y += inst.vy*dt; inst.life -= dt; return; }
  const t = orbitTarget(inst);
  if (inst.spawnT < 1){
    // emerging from the flower: blend from the flower's center out to the orbit spot
    const e = easeOutCubic(inst.spawnT);
    inst.x = player.x + (t.x - player.x) * e;
    inst.y = player.y + (t.y - player.y) * e;
  } else {
    inst.x = t.x; inst.y = t.y;
  }
}
function updateInstances(dt){
  let rotBonus=0, rangeBonus=0;
  for (const inst of player.instances){
    const def = PETAL_DEFS[inst.petal];
    if (inst.broken || inst.flying) continue;
    if (def.rotBonus) rotBonus += def.rotBonus;
    if (def.rangeBonus) rangeBonus += def.rangeBonus;
  }
  player.auraRot = rotBonus; player.auraRange = rangeBonus;

  for (const inst of player.instances){
    const def = PETAL_DEFS[inst.petal], rarity = inst.rarity;
    if (inst.hitCd>0) inst.hitCd -= dt;

    if (inst.broken){
      inst.regenT -= dt;
      if (inst.regenT<=0){
        inst.broken=false; inst.health = pscale(def,'health',rarity); inst.flying=false;
        inst.spawnT = 0; inst.eating = false;
        if (def.armTime) inst.armT = def.armTime;
      }
      continue;
    }

    // being drawn into the flower (Rose-family self-destruct) — animate, then heal + reload
    if (inst.eating){
      inst.eatT += dt/EAT_DUR;
      if (inst.eatT >= 1){
        player.health = Math.min(player.maxHealth, player.health + inst.pendingHeal);
        inst.eating = false;
        breakInstance(inst, def);
      } else {
        const e = easeInCubic(inst.eatT);
        inst.x = inst.eatFromX + (player.x - inst.eatFromX) * e;
        inst.y = inst.eatFromY + (player.y - inst.eatFromY) * e;
      }
      continue;
    }

    if (inst.spawnT < 1) inst.spawnT = Math.min(1, inst.spawnT + dt/SPAWN_DUR);

    if (def.projectile){
      if (!inst.flying){
        const target = nearestMobWithin(inst.x, inst.y, def.fireRange);
        if (mouseDownL && target){
          const dx=target.x-inst.x, dy=target.y-inst.y, d=len(dx,dy)||1;
          inst.flying=true; inst.vx=dx/d*def.projSpeed; inst.vy=dy/d*def.projSpeed; inst.life=def.projLife;
        }
      } else if (inst.life<=0){ breakInstance(inst, def); continue; }
    }

    if (def.healPerSec) player.health = Math.min(player.maxHealth, player.health + pscale(def,'healPerSec',rarity)*dt);

    if (def.armTime && inst.armT>0){
      inst.armT -= dt;
      if (inst.armT<=0){
        // arm complete — get pulled into the flower instead of vanishing instantly
        inst.eating = true; inst.eatT = 0; inst.eatFromX = inst.x; inst.eatFromY = inst.y;
        inst.pendingHeal = pscale(def,'healBurst',rarity);
        continue;
      }
    }
    positionInstance(inst, dt);
  }
}
function shouldAggroOnHit(m){
  // Ladybugs are normally passive, but rare+ ones fight back once provoked.
  if (m.type === 'ladybug') return RARITIES.indexOf(m.rarity) >= RARITIES.indexOf('rare');
  // Common/unusual bees are all bark, no bite — only rare+ bees retaliate.
  if (m.type === 'bee') return m.rarity !== 'common' && m.rarity !== 'unusual';
  const beh = MOB_DEFS[m.type].behavior;
  return beh === 'neutral' || beh === 'neutral-swerve';
}
function dealPetalDamage(inst, def, m, dx, dy, d){
  const dmg = pscale(def,'damage',inst.rarity);
  if (dmg>0){
    damageMob(m, dmg, dx, dy, d, def.push||0);
    if (def.slowMult){ m.slowMult=def.slowMult; m.slowT=Math.max(m.slowT, def.slowDur||1.5); }
    if (shouldAggroOnHit(m)) m.aggro = true;
  }
  inst.health -= m.petalDmg;
  if (inst.health<=0) breakInstance(inst, def);
}
function updatePickups(dt){
  for (let i=pickups.length-1;i>=0;i--){
    const p = pickups[i];
    p.vx*=Math.exp(-6*dt); p.vy*=Math.exp(-6*dt);
    const dx=player.x-p.x, dy=player.y-p.y, d=len(dx,dy);
    if (d<110){ const pull=260*(1-d/110); p.vx+=dx/(d||1)*pull*dt*10; p.vy+=dy/(d||1)*pull*dt*10; }
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    if (d < player.r+10){ collectPickup(p); pickups.splice(i,1); }
  }
}

/* ══════════════════════════════════════════
   MAIN UPDATE
   ══════════════════════════════════════════ */
let dead = false;
let paused = false;

function update(dt){
  if (dead || paused) return;

  let locked = false;
  if (player.kbLock > 0){ player.kbLock -= dt; locked = true; }

  let ix=0, iy=0;
  if (!locked){
    if (keys['w']||keys['arrowup'])    iy-=1;
    if (keys['s']||keys['arrowdown'])  iy+=1;
    if (keys['a']||keys['arrowleft'])  ix-=1;
    if (keys['d']||keys['arrowright']) ix+=1;
  }
  const il = len(ix,iy);
  if (il>0){ ix/=il; iy/=il; }
  const tvx = ix*player.maxSpeed, tvy = iy*player.maxSpeed;
  const rate = clamp((il>0 ? player.accel : player.decel) * dt, 0, 1);
  player.mvx += (tvx - player.mvx) * rate;
  player.mvy += (tvy - player.mvy) * rate;
  const kf = Math.exp(-player.kFriction*dt);
  player.kvx *= kf; player.kvy *= kf;
  player.x += (player.mvx + player.kvx)*dt;
  player.y += (player.mvy + player.kvy)*dt;
  player.x = clamp(player.x, player.r, ARENA.w-player.r);
  player.y = clamp(player.y, player.r, ARENA.h-player.r);

  if (player.iframe>0) player.iframe -= dt;
  if (player.hurtFlash>0) player.hurtFlash -= dt;
  player.dispHealth += (player.health - player.dispHealth) * clamp(HP_EASE*dt, 0, 1);

  let targetR = ORBIT.restR;
  if (mouseDownL) targetR = ORBIT.expandR * (1 + (player.auraRange||0));
  else if (mouseDownR || keys[' ']) targetR = ORBIT.contractR;
  player.orbitR += (targetR - player.orbitR) * clamp(10*dt, 0, 1);
  player.petalAngle += (ORBIT.rotSpeed + (player.auraRot||0)) * dt;

  updateInstances(dt);

  for (const m of mobs) updateMob(m, dt);

  for (let i=0;i<mobs.length;i++)
    for (let j=i+1;j<mobs.length;j++)
      resolveOverlap(mobs[i], mobs[j], mobs[i].mass, mobs[j].mass);

  for (const inst of player.instances){
    if (inst.broken || inst.eating) continue;
    const def = PETAL_DEFS[inst.petal];
    const rad = inst.parts>1 ? 6 : 9;
    for (const m of mobs){
      const dx=m.x-inst.x, dy=m.y-inst.y, d=len(dx,dy);
      if (d < m.r+rad){
        if (inst.flying){ dealPetalDamage(inst, def, m, dx,dy,d); break; }
        else if (inst.hitCd<=0){ inst.hitCd = PETAL_HIT_CD; dealPetalDamage(inst, def, m, dx,dy,d); }
      }
    }
  }

  for (const m of mobs){
    const dx=player.x-m.x, dy=player.y-m.y;
    const d=len(dx,dy), min=m.r+player.r;
    if (d < min){
      const nx = d?dx/d:1, ny = d?dy/d:0;
      const overlap = min - d;
      player.x += nx*overlap; player.y += ny*overlap;
      if (player.iframe<=0){
        player.health -= m.contactDmg;
        player.iframe = iframeFor(m.knockback);
        player.hurtFlash = 0.2;
        player.kbLock = KB_LOCK;
        player.mvx = 0; player.mvy = 0;
        player.kvx = nx*m.knockback; player.kvy = ny*m.knockback;
        if (player.health<=0){ player.health=0; onDeath(); }
      }
    }
  }

  for (let i=mobs.length-1;i>=0;i--){
    if (mobs[i].health<=0){ rollMobDrops(mobs[i]); mobs.splice(i,1); }
  }
  updateSpawns(dt);
  updatePickups(dt);

  cam.x = clamp(player.x - W/2, 0, ARENA.w - W);
  cam.y = clamp(player.y - H/2, 0, ARENA.h - H);
  if (ARENA.w < W) cam.x = (ARENA.w - W)/2;
  if (ARENA.h < H) cam.y = (ARENA.h - H)/2;
}

function onDeath(){ dead = true; document.getElementById('dead').classList.add('show'); }
function respawn(){
  player = makePlayer(); rebuildInstances(); seedMobs(); pickups.length=0;
  dead = false; document.getElementById('dead').classList.remove('show');
}
window.respawn = respawn;

/* ══════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════ */
function draw(){
  ctx.fillStyle = '#1e8a42'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.translate(-cam.x, -cam.y);

  const zoneGrad = ctx.createLinearGradient(0,0,ARENA.w,0);
  zoneGrad.addColorStop(0,     ZONES[0].bg);
  zoneGrad.addColorStop(0.31,  ZONES[0].bg);
  zoneGrad.addColorStop(0.36,  ZONES[1].bg);
  zoneGrad.addColorStop(0.64,  ZONES[1].bg);
  zoneGrad.addColorStop(0.69,  ZONES[2].bg);
  zoneGrad.addColorStop(1,     ZONES[2].bg);
  ctx.fillStyle = zoneGrad; ctx.fillRect(0,0,ARENA.w,ARENA.h);

  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 2;
  const grid = 60;
  for (let x=0;x<=ARENA.w;x+=grid){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,ARENA.h); ctx.stroke(); }
  for (let y=0;y<=ARENA.h;y+=grid){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(ARENA.w,y); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 6;
  ctx.strokeRect(0,0,ARENA.w,ARENA.h);

  ctx.font = '900 34px "Segoe UI", sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  [0, ARENA.w/3, ARENA.w*2/3].forEach((x0,i)=>{
    const cx = x0 + ARENA.w/3/2;
    ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.strokeText(ZONES[i].name.toUpperCase()+' ZONE', cx, 16);
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fillText(ZONES[i].name.toUpperCase()+' ZONE', cx, 16);
  });

  drawPickups();
  for (const m of mobs){ drawMob(m); drawRarity(m); mobHealthBar(m); }
  if (!dead){
    for (const inst of player.instances) drawInstance(inst);
    drawPlayer();
  }

  ctx.restore();
  renderLoadoutBar();
  const nU=mobs.filter(m=>m.rarity==='unusual').length, nR=mobs.filter(m=>m.rarity==='rare').length,
        nE=mobs.filter(m=>m.rarity==='epic').length, nL=mobs.filter(m=>['legendary','mythic'].includes(m.rarity)).length;
  document.getElementById('stats').textContent =
    `HP ${Math.ceil(player.health)}/${player.maxHealth} · ${zoneAt(player.x).name} Zone · mobs ${mobs.length} (${nU}u ${nR}r ${nE}e ${nL}l+) · petals ${player.instances.filter(p=>!p.broken).length}/${player.instances.length}`;
}

function drawPickups(){
  const t = performance.now()/1000;
  for (const p of pickups){
    const bob = Math.sin(t*3 + p.born*7)*3;
    drawPetalIcon(ctx, p.petal, p.x, p.y+bob, 8);
    ctx.beginPath(); ctx.arc(p.x, p.y+bob, 9.5, 0, TAU);
    ctx.lineWidth=2; ctx.strokeStyle = RARITY_INFO[p.rarity].color; ctx.stroke();
  }
}

function drawInstance(inst){
  const def = PETAL_DEFS[inst.petal];
  let rad = inst.parts>1 ? 6 : 9;
  if (inst.broken) return; // reloading — shown on the hotbar slot instead, nothing drawn in-world
  if (inst.flying){
    ctx.save(); ctx.translate(inst.x, inst.y); ctx.rotate(Math.atan2(inst.vy,inst.vx));
    drawPetalIcon(ctx, inst.petal, 0, 0, rad);
    ctx.beginPath(); ctx.arc(0,0,rad+1.5,0,TAU); ctx.lineWidth=1.6; ctx.strokeStyle=RARITY_INFO[inst.rarity].color; ctx.stroke();
    ctx.restore();
    return;
  }
  // shrink while being eaten into the flower, grow while emerging out of it
  let scale = 1;
  if (inst.eating) scale = 1 - easeInCubic(clamp(inst.eatT,0,1));
  else if (inst.spawnT < 1) scale = easeOutCubic(clamp(inst.spawnT,0,1));
  rad *= Math.max(0.08, scale);
  drawPetalIcon(ctx, inst.petal, inst.x, inst.y, rad);
  ctx.beginPath(); ctx.arc(inst.x, inst.y, rad+1.5, 0, TAU);
  ctx.lineWidth = 1.6; ctx.strokeStyle = RARITY_INFO[inst.rarity].color; ctx.stroke();
}

function drawPlayer(){
  const flash = player.hurtFlash>0;
  ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, TAU);
  ctx.fillStyle = flash ? '#ff8a8a' : '#ffe25a';
  if (player.iframe>0 && Math.floor(player.iframe*20)%2===0) ctx.globalAlpha = 0.5;
  ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle='#d9b400'; ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#3a2e00';
  ctx.beginPath(); ctx.arc(player.x-8, player.y-4, 3.4, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(player.x+8, player.y-4, 3.4, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.lineWidth=2.4; ctx.strokeStyle='#3a2e00';
  ctx.arc(player.x, player.y+3, 7, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  entityHealthBar(player.x, player.y - player.r - 14, player.r*2, player.dispHealth/player.maxHealth, '#67e36a');
}

function drawMob(m){
  switch(m.type){
    case 'ladybug': return drawLadybug(m);
    case 'rock': return drawRock(m);
    case 'ant': return drawAnt(m);
    case 'bee': return drawBee(m);
    case 'spider': return drawSpider(m);
  }
}
function drawLadybug(m){
  ctx.save(); ctx.translate(m.x, m.y);
  const ang = Math.atan2(m.vy, m.vx); ctx.rotate(ang);
  ctx.beginPath(); ctx.arc(0,0,m.r,0,TAU);
  ctx.fillStyle = m.hurtFlash>0 ? '#ff9a9a' : m.color; ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle='#7a1109'; ctx.stroke();
  ctx.beginPath(); ctx.arc(m.r*0.72,0,m.r*0.42,0,TAU); ctx.fillStyle='#1a1a1a'; ctx.fill();
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(-m.r*0.5,0); ctx.lineTo(m.r*0.45,0); ctx.stroke();
  ctx.fillStyle='#1a1a1a';
  const sp=[[-0.35,-0.4],[-0.35,0.4],[0.1,-0.5],[0.1,0.5],[-0.65,0]];
  for(const [sx,sy] of sp){ ctx.beginPath(); ctx.arc(sx*m.r, sy*m.r, m.r*0.16, 0, TAU); ctx.fill(); }
  ctx.restore();
}
function drawRock(m){
  ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.spin);
  ctx.beginPath();
  const n=m.verts.length;
  for(let i=0;i<=n;i++){ const a=(i%n)/n*TAU, rr=m.r*m.verts[i%n];
    const px=Math.cos(a)*rr, py=Math.sin(a)*rr;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
  ctx.closePath();
  ctx.fillStyle = m.hurtFlash>0 ? '#b8b8b8' : m.color; ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle='#5c5c63'; ctx.stroke();
  ctx.restore();
}
function drawAnt(m){
  ctx.save(); ctx.translate(m.x,m.y);
  ctx.rotate(Math.atan2(m.vy,m.vx)||0);
  ctx.fillStyle = m.hurtFlash>0 ? '#c98a5a' : m.color; ctx.strokeStyle='#2a1808'; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.ellipse(-m.r*0.55,0,m.r*0.5,m.r*0.4,0,0,TAU); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,m.r*0.32,0,TAU); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(m.r*0.55,0,m.r*0.38,0,TAU); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='#1c1206'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(m.r*0.8,-0.05*m.r); ctx.lineTo(m.r*1.25,-0.35*m.r); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(m.r*0.8, 0.05*m.r); ctx.lineTo(m.r*1.25, 0.35*m.r); ctx.stroke();
  ctx.restore();
}
function drawBee(m){
  ctx.save(); ctx.translate(m.x,m.y);
  ctx.rotate(Math.atan2(m.vy,m.vx)||0);
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.ellipse(-2,-m.r*0.55,m.r*0.5,m.r*0.28,0.4,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-2, m.r*0.55,m.r*0.5,m.r*0.28,-0.4,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,0,m.r,m.r*0.72,0,0,TAU);
  ctx.fillStyle= m.hurtFlash>0?'#fff2a0':m.color; ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle='#8a6600'; ctx.stroke();
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=m.r*0.28;
  [-0.5,0,0.5].forEach(t=>{ ctx.beginPath(); ctx.moveTo(t*m.r, -m.r*0.65); ctx.lineTo(t*m.r, m.r*0.65); ctx.stroke(); });
  ctx.restore();
}
function drawSpider(m){
  ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.facing||0);
  ctx.strokeStyle='#15151a'; ctx.lineWidth=2.4; ctx.lineCap='round';
  for (let i=0;i<8;i++){
    const side = i<4 ? 1 : -1;
    const spread4 = ((i%4) - 1.5) * 0.42;              // -0.63,-0.21,0.21,0.63 rad
    const baseA = side*(Math.PI/2) + spread4;           // clustered to the left/right sides, not front/back
    const group = i%2;
    const phase = m.legPhase + group*Math.PI;
    const swing = Math.sin(phase);                    // -1..1 stride cycle
    const lift  = Math.max(0, Math.sin(phase));        // leg lifts while swinging forward
    const reach = m.r*(1.5 + swing*0.3);
    const spread = baseA + swing*0.24;
    const hipX = Math.cos(baseA)*m.r*0.62, hipY = Math.sin(baseA)*m.r*0.62;
    const footX = Math.cos(spread)*reach, footY = Math.sin(spread)*reach;
    const kneeX = (hipX+footX)/2 + Math.cos(baseA)*m.r*0.45*lift;
    const kneeY = (hipY+footY)/2 + Math.sin(baseA)*m.r*0.45*lift;
    ctx.beginPath(); ctx.moveTo(hipX,hipY); ctx.quadraticCurveTo(kneeX,kneeY,footX,footY); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(0,0,m.r,0,TAU);
  ctx.fillStyle = m.hurtFlash>0?'#55555f':m.color; ctx.fill();
  ctx.lineWidth=2.5; ctx.strokeStyle='#0c0c0f'; ctx.stroke();
  ctx.fillStyle='#ff3b3b';
  [[0.5,-0.15],[0.5,0.15],[0.36,-0.3],[0.36,0.3]].forEach(([ex,ey])=>{ ctx.beginPath(); ctx.arc(ex*m.r,ey*m.r,m.r*0.1,0,TAU); ctx.fill(); });
  ctx.restore();
}
function drawRarity(m){
  ctx.save();
  ctx.font = '700 11px "Segoe UI", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  const y = m.y + m.r + 5;
  ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.strokeText(m.rarityName, m.x, y);
  ctx.fillStyle = m.rarityColor;
  ctx.fillText(m.rarityName, m.x, y);
  ctx.restore();
}
function mobHealthBar(m){
  if (m.dispHealth >= m.maxHealth-0.5) return;
  entityHealthBar(m.x, m.y - m.r - 12, m.r*2, m.dispHealth/m.maxHealth, '#67e36a');
}
function entityHealthBar(cx, cy, w, frac, color){
  const h=6, x=cx-w/2;
  ctx.fillStyle='rgba(0,0,0,0.45)'; roundRect(x-2,cy-2,w+4,h+4,4); ctx.fill();
  ctx.fillStyle=color; roundRect(x,cy,w*clamp(frac,0,1),h,3); ctx.fill();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
/* ══════════════════════════════════════════
   PETAL ICONS  ·  one shared vector-shape renderer
   used both in-world (canvas) and in DOM panels (offscreen canvases)
   ══════════════════════════════════════════ */
function shadeColor(hex, pct){
  const n = parseInt(hex.slice(1),16);
  const amt = Math.round(255*pct/100);
  const r = clamp((n>>16)+amt,0,255), g = clamp(((n>>8)&255)+amt,0,255), b = clamp((n&255)+amt,0,255);
  return `rgb(${r},${g},${b})`;
}
function drawPetalIcon(ctx, id, cx, cy, r){
  const def = PETAL_DEFS[id];
  const shape = def.shape || 'circle';
  const col = def.color;
  ctx.save(); ctx.translate(cx,cy);
  ctx.lineWidth = Math.max(1.3, r*0.16);
  ctx.strokeStyle = shadeColor(col,-38);
  ctx.fillStyle = col;
  switch(shape){
    case 'circle':
      ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill(); ctx.stroke();
      break;
    case 'ring':
      ctx.beginPath(); ctx.arc(0,0,r*0.72,0,TAU); ctx.lineWidth=Math.max(1.6,r*0.3); ctx.stroke();
      break;
    case 'leaf':
      ctx.beginPath();
      ctx.moveTo(0,-r); ctx.quadraticCurveTo(r*0.95,0,0,r); ctx.quadraticCurveTo(-r*0.95,0,0,-r); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-r*0.65); ctx.lineTo(0,r*0.65);
      ctx.lineWidth=Math.max(1,r*0.11); ctx.strokeStyle=shadeColor(col,-42); ctx.stroke();
      break;
    case 'spike':
      ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(r*0.58,r*0.82); ctx.lineTo(-r*0.58,r*0.82); ctx.closePath();
      ctx.fill(); ctx.stroke();
      break;
    case 'drop':
      ctx.beginPath();
      ctx.moveTo(0,-r);
      ctx.quadraticCurveTo(r*0.75,-r*0.3, r*0.65,r*0.35);
      ctx.quadraticCurveTo(r*0.35,r, 0,r*0.92);
      ctx.quadraticCurveTo(-r*0.35,r, -r*0.65,r*0.35);
      ctx.quadraticCurveTo(-r*0.75,-r*0.3, 0,-r);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'chevron':
      ctx.lineWidth=Math.max(1.8,r*0.32); ctx.strokeStyle=col; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(-r*0.55,-r*0.75); ctx.lineTo(r*0.55,0); ctx.lineTo(-r*0.55,r*0.75); ctx.stroke();
      break;
    case 'web':
      ctx.lineWidth=Math.max(1.2,r*0.14); ctx.strokeStyle=shadeColor(col,-15);
      for(let i=0;i<6;i++){ const a=i/6*TAU; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); ctx.stroke(); }
      for(let k=1;k<=2;k++){ ctx.beginPath(); ctx.arc(0,0,r*k/2.4,0,TAU); ctx.stroke(); }
      break;
    case 'pincer':
      ctx.lineWidth=Math.max(1.8,r*0.3); ctx.strokeStyle=col; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(-r*0.05,0,r*0.72,-0.75,0.75); ctx.stroke();
      ctx.beginPath(); ctx.arc(r*0.05,0,r*0.72,Math.PI-0.75,Math.PI+0.75); ctx.stroke();
      break;
    case 'cluster':
      [[0,-r*0.5],[r*0.48,r*0.32],[-r*0.48,r*0.32]].forEach(([ox,oy])=>{
        ctx.beginPath(); ctx.arc(ox,oy,r*0.52,0,TAU); ctx.fill(); ctx.stroke();
      });
      break;
    case 'dust':
      [[0,0,0.5],[r*0.48,-r*0.32,0.3],[-r*0.48,-r*0.18,0.28],[r*0.12,r*0.48,0.26]].forEach(([ox,oy,rr])=>{
        ctx.beginPath(); ctx.arc(ox,oy,r*rr,0,TAU); ctx.fill(); ctx.stroke();
      });
      break;
    case 'tulipflower':
      ctx.beginPath();
      ctx.moveTo(0,r);
      ctx.quadraticCurveTo(-r*0.85,r*0.05,-r*0.5,-r*0.75);
      ctx.quadraticCurveTo(-r*0.05,-r*0.4,0,-r*0.78);
      ctx.quadraticCurveTo(r*0.05,-r*0.4,r*0.5,-r*0.75);
      ctx.quadraticCurveTo(r*0.85,r*0.05,0,r);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'rock': {
      const n=6; ctx.beginPath();
      for(let i=0;i<=n;i++){ const a=(i/n)*TAU; const rr=r*(0.8+0.2*Math.sin(i*2.3+1)); const px=Math.cos(a)*rr, py=Math.sin(a)*rr;
        i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    }
    case 'eye':
      ctx.beginPath(); ctx.ellipse(0,0,r,r*0.6,0,0,TAU); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#241033'; ctx.beginPath(); ctx.arc(0,0,r*0.34,0,TAU); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-r*0.1,-r*0.1,r*0.1,0,TAU); ctx.fill();
      break;
    case 'crescent':
      ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath(); ctx.arc(r*0.42,-r*0.12,r*0.82,0,TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.lineWidth=Math.max(1.3,r*0.16); ctx.strokeStyle=shadeColor(col,-38); ctx.stroke();
      break;
    default:
      ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}
function makeIconCanvas(id, size){
  const cv = document.createElement('canvas'); cv.width=size; cv.height=size;
  drawPetalIcon(cv.getContext('2d'), id, size/2, size/2, size*0.42);
  return cv;
}
// Reuses the real mob draw functions for gallery icons by briefly redirecting the
// global `ctx` to an offscreen canvas — avoids a second, drifting copy of each mob's art.
function drawMobIcon(mobKey, targetCtx, cx, cy, r){
  const def = MOB_DEFS[mobKey];
  const fake = { x:cx, y:cy, r, vx:0.6, vy:0.25, color:def.color, hurtFlash:0, legPhase:0.8, facing:0.35 };
  if (mobKey==='rock'){ fake.spin=0.25; fake.verts=[1,0.92,1.05,0.9,1.02,0.88,1.06]; }
  const saved = ctx; ctx = targetCtx;
  switch(mobKey){
    case 'ladybug': drawLadybug(fake); break;
    case 'rock': drawRock(fake); break;
    case 'ant': drawAnt(fake); break;
    case 'bee': drawBee(fake); break;
    case 'spider': drawSpider(fake); break;
  }
  ctx = saved;
}

const loadoutIconCache = {};
function renderLoadoutBar(){
  const bar = document.getElementById('loadoutBar');
  if (bar.children.length !== loadout.length) bar.innerHTML = loadout.map(()=>`
    <div class="lbslot"><canvas class="lbicon" width="30" height="30"></canvas><div class="lbcover"></div><div class="lbname"></div></div>
  `).join('');
  loadout.forEach((slot,i)=>{
    const el = bar.children[i];
    const def = PETAL_DEFS[slot.petal];
    const parts = def.parts||1;
    // slot fill = the least-ready part: reload progress while broken, current HP fraction while alive
    let readiness = 1;
    const maxH = pscale(def,'health',slot.rarity);
    for (let p=0;p<parts;p++){
      const inst = player.instances.find(x=>x.slot===i && x.partIndex===p);
      if (!inst) continue;
      const r = inst.broken ? clamp(1 - inst.regenT/def.reload, 0, 1) : (maxH>0 ? clamp(inst.health/maxH, 0, 1) : 1);
      readiness = Math.min(readiness, r);
    }
    const rc = RARITY_INFO[slot.rarity].color;
    el.style.setProperty('--rc', rc);
    el.querySelector('.lbname').textContent = def.name;
    el.querySelector('.lbcover').style.height = ((1-readiness)*100)+'%';
    const cacheKey = slot.petal;
    if (loadoutIconCache[cacheKey+'@'+i] !== cacheKey){
      const cv = el.querySelector('.lbicon'), c = cv.getContext('2d');
      c.clearRect(0,0,30,30); drawPetalIcon(c, slot.petal, 15, 15, 11);
      loadoutIconCache[cacheKey+'@'+i] = cacheKey;
    }
  });
}

/* ══════════════════════════════════════════
   UI PANELS
   ══════════════════════════════════════════ */
let openPanelName = null;
let invStackMode = false;
let invSearch = '';
let dragData = null;

function togglePanel(name){ openPanelName===name ? closePanel() : openPanel(name); }
function openPanel(name){
  openPanelName = name; paused = true; selectedSlot = null;
  document.getElementById('panelBackdrop').classList.add('show');
  renderPanel();
}
function closePanel(){
  openPanelName = null; paused = false;
  document.getElementById('panelBackdrop').classList.remove('show');
  hideTip();
}
function renderPanel(){
  const root = document.getElementById('panelRoot');
  hideTip();
  root.classList.remove('gallery','inventory');
  if (openPanelName==='inventory'){ root.classList.add('inventory'); root.innerHTML = renderInventoryPanel(); }
  else if (openPanelName==='mob'){ root.classList.add('gallery'); root.innerHTML = renderMobPanel(); }
  else if (openPanelName==='petal'){ root.classList.add('gallery'); root.innerHTML = renderPetalPanel(); }
  paintIcons(root);
}
function paintIcons(root){
  root.querySelectorAll('canvas.picn[data-petal]').forEach(cv=>{
    const ctx2 = cv.getContext('2d'), s = cv.width;
    ctx2.clearRect(0,0,s,s);
    drawPetalIcon(ctx2, cv.dataset.petal, s/2, s/2, s*0.4);
  });
  root.querySelectorAll('canvas.gicon[data-mob]').forEach(cv=>{
    const ctx2 = cv.getContext('2d'), s = cv.width;
    ctx2.clearRect(0,0,s,s);
    drawMobIcon(cv.dataset.mob, ctx2, s/2, s/2, s*0.32);
  });
}

/* ── floating detail tooltip shared by both galleries ── */
function hideTip(){ const t=document.getElementById('galTip'); if(t) t.classList.remove('show'); }
function positionTip(e, html){
  const tip = document.getElementById('galTip');
  tip.innerHTML = html;
  paintIcons(tip);
  tip.classList.add('show');
  const rect = e.currentTarget.getBoundingClientRect();
  tip.style.left = rect.left+'px'; tip.style.top = (rect.bottom+6)+'px';
  requestAnimationFrame(()=>{
    const left = Math.max(6, Math.min(rect.left, window.innerWidth - tip.offsetWidth - 10));
    const top = Math.max(6, Math.min(rect.bottom+6, window.innerHeight - tip.offsetHeight - 10));
    tip.style.left = left+'px'; tip.style.top = top+'px';
  });
}
document.addEventListener('click', e => {
  const tip = document.getElementById('galTip');
  if (!tip || !tip.classList.contains('show') || tip.contains(e.target)) return;
  hideTip();
});

/* ── Inventory ── */
function setInvStack(el){ invStackMode = el.checked; renderPanel(); }
function setInvSearch(el){ invSearch = el.value.toLowerCase(); renderPanel(); }
function dragPetalStart(e, petal, rarity){ dragData = {petal, rarity}; e.dataTransfer.effectAllowed = 'move'; }
function allowDrop(e){ e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function dragLeaveSlot(e){ e.currentTarget.classList.remove('dragover'); }
function dropOnSlot(e, i){
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  if (!dragData) return;
  const {petal, rarity} = dragData; dragData = null;
  const k = invKey(petal, rarity);
  if (!inventory[k] || inventory[k]<=0) return;
  const old = loadout[i];
  if (old.petal!=='basic'){ const ok=invKey(old.petal,old.rarity); inventory[ok]=(inventory[ok]||0)+1; }
  inventory[k]--;
  loadout[i] = { petal, rarity };
  rebuildInstances();
  renderPanel();
}
function renderInventoryPanel(){
  const slots = loadout.map((slot,i)=>{
    const def = PETAL_DEFS[slot.petal];
    return `<div class="lslot ${selectedSlot===i?'sel':''}" onclick="selectSlot(${i})"
      ondragover="allowDrop(event)" ondragleave="dragLeaveSlot(event)" ondrop="dropOnSlot(event,${i})">
      <canvas class="picn" data-petal="${slot.petal}" style="--rc:${RARITY_INFO[slot.rarity].color}" width="40" height="40"></canvas>
      <div class="pname">${def.name}</div>
    </div>`;
  }).join('');

  const matches = petal => PETAL_DEFS[petal].name.toLowerCase().includes(invSearch);
  let body;
  if (invStackMode){
    const merged = {};
    Object.keys(inventory).forEach(k=>{
      if (inventory[k]<=0) return;
      const [petal,rarity] = k.split('|');
      if (!matches(petal)) return;
      if (!merged[petal]) merged[petal] = { count:0, bestRarity:rarity };
      merged[petal].count += inventory[k];
      if (RARITIES.indexOf(rarity) > RARITIES.indexOf(merged[petal].bestRarity)) merged[petal].bestRarity = rarity;
    });
    const cards = Object.keys(merged).sort().map(petal=>{
      const {count,bestRarity} = merged[petal], def = PETAL_DEFS[petal];
      return `<div class="istack" draggable="true" ondragstart="dragPetalStart(event,'${petal}','${bestRarity}')" style="--rc:${RARITY_INFO[bestRarity].color}" onclick="equipFromInventory('${petal}','${bestRarity}')">
        <div class="pcount">x${count}</div>
        <canvas class="picn" data-petal="${petal}" width="40" height="40"></canvas>
        <div class="pname">${def.name}</div>
      </div>`;
    }).join('');
    body = `<div class="inv-grid">${cards || '<div class="inv-empty">No petals match.</div>'}</div>`;
  } else {
    const sections = [...RARITIES].reverse().map(rarity=>{
      const keys = Object.keys(inventory).filter(k=>{
        if (inventory[k]<=0) return false;
        const [petal,r] = k.split('|');
        return r===rarity && matches(petal);
      }).sort();
      if (!keys.length) return '';
      const cards = keys.map(k=>{
        const [petal,r] = k.split('|'); const def = PETAL_DEFS[petal];
        return `<div class="istack" draggable="true" ondragstart="dragPetalStart(event,'${petal}','${r}')" style="--rc:${RARITY_INFO[r].color}" onclick="equipFromInventory('${petal}','${r}')">
          <div class="pcount">x${inventory[k]}</div>
          <canvas class="picn" data-petal="${petal}" width="40" height="40"></canvas>
          <div class="pname">${def.name}</div>
        </div>`;
      }).join('');
      return `<div class="inv-section-head" style="--rc:${RARITY_INFO[rarity].color}">${RARITY_INFO[rarity].name}</div><div class="inv-grid">${cards}</div>`;
    }).join('');
    body = sections || '<div class="inv-empty">No petals collected yet — go defeat some mobs!</div>';
  }

  return `
    <div class="panel-head"><h2>Inventory</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="panel-body">
      <div class="inv-sub">Drag a petal to equip it</div>
      <div class="inv-toolbar">
        <label><input type="checkbox" ${invStackMode?'checked':''} onchange="setInvStack(this)"> Stack</label>
        <input class="inv-search" type="text" placeholder="Search petals..." value="${invSearch}" oninput="setInvSearch(this)">
      </div>
      <div class="loadout-slots">${slots}</div>
      ${body}
    </div>`;
}

/* ── Mob Gallery — grid of mob types × rarity columns ── */
function renderMobPanel(){
  const rows = Object.keys(MOB_DEFS).map(mobKey=>{
    const cells = RARITIES.map(r=>`
      <div class="gcell" style="--rc:${RARITY_INFO[r].color}" onclick="showMobTip(event,'${mobKey}','${r}')">
        <canvas class="gicon" data-mob="${mobKey}" width="40" height="40"></canvas>
      </div>`).join('');
    return `<div class="grow">${cells}</div>`;
  }).join('');
  return `
    <div class="panel-head"><h2>Mob Gallery</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="panel-body">${rows}</div>`;
}
function lockedCard(){ return `<div class="ratecard locked">🔒</div>`; }
function petalRateCard(petalId, rarity, pct){
  return `<div class="ratecard" style="--rc:${RARITY_INFO[rarity].color}">
    <canvas class="picn" data-petal="${petalId}" width="30" height="30"></canvas>
    <div class="rc-name">${PETAL_DEFS[petalId].name}</div>
    <div class="rc-pct">${pct}%</div>
  </div>`;
}
function mobRefCard(mobKey){
  return `<div class="ratecard mobcard">
    <canvas class="gicon" data-mob="${mobKey}" width="30" height="30"></canvas>
    <div class="rc-name">${MOB_DEFS[mobKey].name}</div>
  </div>`;
}
function showMobTip(e, mobKey, rarity){
  e.stopPropagation();
  const def = MOB_DEFS[mobKey], scale = MOB_SCALE[rarity];
  const tiers = ['extra','base','subbase','abyssmal','hidden'].map(tier=>{
    const table = DROP_TABLES[rarity] && DROP_TABLES[rarity][tier];
    const poolEntry = def.drops.find(d=>d.tier===tier);
    if (!poolEntry || !table) return '';
    const masked = (tier==='abyssmal'||tier==='hidden') && !discovered.has(poolEntry.petal);
    const cards = masked
      ? table.map(()=>lockedCard()).join('')
      : table.map(x=>petalRateCard(poolEntry.petal, x.r, x.p)).join('');
    return `<div class="ratecard-row">${cards}</div>`;
  }).join('');
  const html = `
    <div class="tip-name">${def.name}</div>
    <div class="tip-rar" style="color:${RARITY_INFO[rarity].color}">${RARITY_INFO[rarity].name}</div>
    <div class="tip-desc">${behaviorText(def, mobKey, rarity)}</div>
    <div class="tip-stats">HP ${Math.round(def.health*scale).toLocaleString()} · DMG ${Math.round(def.contactDmg*scale).toLocaleString()}</div>
    ${tiers || '<div class="tip-desc">No drops unlocked at this rarity.</div>'}`;
  positionTip(e, html);
}

/* ── Petal Gallery — grid of petal types × rarity columns ── */
function renderPetalPanel(){
  const rows = Object.keys(PETAL_DEFS).filter(k=>k!=='basic').map(petalKey=>{
    const src = petalSource(petalKey);
    const masked = src && (src.tier==='abyssmal'||src.tier==='hidden') && !discovered.has(petalKey);
    if (masked){
      const cells = RARITIES.map(()=>`<div class="gcell locked">🔒</div>`).join('');
      return `<div class="grow">${cells}</div>`;
    }
    const cells = RARITIES.map(r=>`
      <div class="gcell" style="--rc:${RARITY_INFO[r].color}" onclick="showPetalTip(event,'${petalKey}','${r}')">
        <canvas class="picn" data-petal="${petalKey}" width="40" height="40"></canvas>
      </div>`).join('');
    return `<div class="grow">${cells}</div>`;
  }).join('');
  return `
    <div class="panel-head"><h2>Petal Gallery</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="panel-body">
      ${rows}
    </div>`;
}
function showPetalTip(e, petalKey, rarity){
  e.stopPropagation();
  const def = PETAL_DEFS[petalKey];
  const src = petalSource(petalKey);
  const sourceBlock = src
    ? `<div class="ratecard-row">${mobRefCard(src.mobKey)}</div>`
    : '<div class="tip-desc">Starting petal.</div>';
  const parts = def.parts>1 ? `<div class="tip-stats">Spawns as ${def.parts} miniature copies</div>` : '';
  const html = `
    <div class="tip-name">${def.name}</div>
    <div class="tip-rar" style="color:${RARITY_INFO[rarity].color}">${RARITY_INFO[rarity].name}</div>
    <div class="tip-desc">${def.desc}</div>
    <div class="tip-stats">HP ${Math.round(pscale(def,'health',rarity)).toLocaleString()} · DMG ${Math.round(pscale(def,'damage',rarity)).toLocaleString()} · Reload ${def.reload}s</div>
    ${parts}
    ${sourceBlock}`;
  positionTip(e, html);
}

/* ══════════════════════════════════════════
   INIT + MAIN LOOP
   ══════════════════════════════════════════ */
loadout = defaultLoadout();
rebuildInstances();
seedMobs();

let last = performance.now();
function loop(now){
  let dt = (now - last)/1000; last = now;
  dt = Math.min(dt, 0.05);
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
