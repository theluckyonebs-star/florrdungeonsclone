  <div id="levelHudBar">
    <div id="levelHudFill"></div>
    <div id="levelHudLabel"></div>
  </div>
</div>
<div id="dead"><h1>You Died</h1><button onclick="respawn()">Respawn</button></div>

<div id="authScreen">
  <div class="auth-card">
    <h1>Florr Clone</h1>
    <input id="authUser" type="text" placeholder="Username" autocomplete="username">
    <input id="authPass" type="password" placeholder="Password" autocomplete="current-password">
    <div class="auth-actions">
      <button id="authLoginBtn" onclick="doLogin()">Log In</button>
      <button id="authSignupBtn" onclick="doSignup()">Sign Up</button>
    </div>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<div id="panelBackdrop">
  <div class="panel" id="panelRoot"></div>
</div>
<div id="galTip" class="galtip"></div>

<script src="balance.js"></script>
<script type="module" src="multiplayer.js"></script>
<script>
const canvas = document.getElementById('c');
let ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
addEventListener('resize', resize); resize();

const TAU = Math.PI * 2;
const rand = (a,b)=> a + Math.random()*(b-a);
const clamp = (v,a,b)=> v<a?a : v>b?b : v;
const len = (x,y)=> Math.hypot(x,y);
function pickWeighted(list){
  let total=0; for(const it of list) total += it.weight;
  let r = Math.random()*total;
  for(const it of list){ r -= it.weight; if(r<=0) return it; }
  return list[list.length-1];
}

const ARENA = { w: 19200, h: 3000 }; // 3x width; height doubled (1500 -> 3000) for a bigger, roomier map

/* ── difficulty zones — ZONES itself now lives in balance.js ── */
function zoneAt(x){
  return ZONES[clamp(Math.floor(x / (ARENA.w/ZONES.length)), 0, ZONES.length-1)];
}
const cam = { x: 0, y: 0 };

/* ══════════════════════════════════════════
   INPUT
   ══════════════════════════════════════════ */
const keys = {};
addEventListener('keydown', e => {
  if (!authed) return; // don't let game hotkeys fire while typing in the login form
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (e.code === 'Space') { keys[' '] = true; e.preventDefault(); }
  // movement keys are polled continuously from `keys` regardless of repeat, but the
  // one-shot actions below (panel toggles, loadout swap, quick-slot) must fire exactly once
  // per physical press — without this, the OS's key-repeat (holding a key, or even a slightly
  // long tap) re-fires keydown many times a second, rapidly toggling a panel open/closed/open
  // and making it look like it "breaks" into a flash of nothing or the wrong menu
  if (e.repeat) return;
  if (k==='z') togglePanel('inventory');
  else if (k==='v') togglePanel('mob');
  else if (k==='b') togglePanel('petal');
  else if (k==='c') togglePanel('craft');
  else if (k==='y') openForgeMenu(null);
  else if (k==='x') togglePanel('essence');
  else if (k==='r') setActiveLoadout(1-activeLoadout);
  else if (k>='1' && k<='5') quickSwapSlot(k.charCodeAt(0) - '1'.charCodeAt(0));
  else if (k==='escape') closePanel();
});
addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.code === 'Space') keys[' '] = false;
});
let mouseDownL = false, mouseDownR = false;
// clicks/drags on UI (panels, hotbar, death screen) shouldn't be read as attack input —
// needed now that the game keeps running while panels are open
function isUiTarget(t){ return t.closest && t.closest('.panel, #loadoutBar, #dead'); }
addEventListener('mousedown', e => { if (isUiTarget(e.target)) return; if(e.button===0) mouseDownL=true; if(e.button===2) mouseDownR=true; });
addEventListener('mouseup',   e => { if(e.button===0) mouseDownL=false; if(e.button===2) mouseDownR=false; });
addEventListener('contextmenu', e => e.preventDefault());

/* ══════════════════════════════════════════
   RARITY (cosmetic, fixed per petal) & TIER (power progression, 1-6)
   — RARITIES/RARITY_INFO/PETAL_RARITY/TIERS/tier & rarity scaling all now live in balance.js
   ══════════════════════════════════════════ */
const TIER_ROMAN = ['','I','II','III','IV','V','VI'];
function toRoman(tier){ return TIER_ROMAN[tier] || String(tier); }
// Inventory sorts rarity high→low; every other petal-listing menu (Craft, Petal Gallery,
// Forge) sorts low→high instead
const RARITY_ORDER_DESC = [...RARITIES].reverse();
function byRarityThenName(a,b){
  return RARITY_ORDER_DESC.indexOf(PETAL_RARITY[a]) - RARITY_ORDER_DESC.indexOf(PETAL_RARITY[b])
    || PETAL_DEFS[a].name.localeCompare(PETAL_DEFS[b].name);
}
function byRarityThenNameAsc(a,b){
  return RARITIES.indexOf(PETAL_RARITY[a]) - RARITIES.indexOf(PETAL_RARITY[b])
    || PETAL_DEFS[a].name.localeCompare(PETAL_DEFS[b].name);
}

/* ══════════════════════════════════════════
   DROP TABLES, ZONE/HIDDEN JACKPOTS, PETAL DEFINITIONS, FORGE COST — all now live in balance.js
   ══════════════════════════════════════════ */
const ORBIT = { restR:60, expandR:118, contractR:26, rotSpeed:2.3 };
const PETAL_HIT_CD = 0.35;
const BASE_LOADOUT_SIZE = 5;
const MAX_LOADOUT_SIZE = 10;
const SLOT_UNLOCK_INTERVAL = 15; // levels between each new petal slot
const SPAWN_DUR = 0.32;   // time for a petal to emerge from the flower into orbit
const EAT_DUR = 0.38;     // time for a self-destructing petal (Rose family) to be drawn into the flower
const HP_EASE = 6;        // health-bar catch-up rate (higher = snappier)
function easeOutCubic(t){ return 1 - Math.pow(1-t, 3); }
function easeInCubic(t){ return t*t*t; }

/* ══════════════════════════════════════════
   LEVELING  ·  XP survives death; HP/slots are derived from level, not stored per-life
   ══════════════════════════════════════════ */
const BASE_MAX_HEALTH = 260;
let playerLevel = 1;
let playerXp = 0;
// HP curve is piecewise: a clean 3x/15-levels up to 45, then three steeper stages layered on
// top (5x by 60, 10x by 75, another 10x by 90) — each stage compounds smoothly within itself
// via the same exponential-interpolation shape as the base curve.
const HP_45 = BASE_MAX_HEALTH * Math.pow(3, 44/SLOT_UNLOCK_INTERVAL);
const HP_60 = HP_45 * 5;
const HP_75 = HP_60 * 10;
function maxHealthForLevel(level){
  if (level <= 45) return Math.round(BASE_MAX_HEALTH * Math.pow(3, (level-1)/SLOT_UNLOCK_INTERVAL));
  if (level <= 60) return Math.round(HP_45 * Math.pow(5, (level-45)/SLOT_UNLOCK_INTERVAL));
  if (level <= 75) return Math.round(HP_60 * Math.pow(10, (level-60)/SLOT_UNLOCK_INTERVAL));
  // 75-90 mirrors the 60-75 stage (another 10x), and keeps extending at that rate beyond 90
  return Math.round(HP_75 * Math.pow(10, (level-75)/SLOT_UNLOCK_INTERVAL));
}
function slotsForLevel(level){ return Math.min(MAX_LOADOUT_SIZE, BASE_LOADOUT_SIZE + Math.floor(level/SLOT_UNLOCK_INTERVAL)); }
// quadratic and gentle at low levels (level 1 costs almost nothing) so early leveling is fast;
// baseline tuned so total XP lands around level 15 by your first rare, 30 by epics, 45 by the
// earliest legendary, 75 by a mythic — then scaled up 2.5x across the board to make leveling
// harder overall while keeping that same relative pacing between milestones
function xpToNext(level){ return Math.max(20, Math.round(2.675 * level * level)); }
// xpForKill now lives in balance.js (needs MOB_DEFS + mobLevelScale, both defined there)
function grantXp(amount){
  if (amount<=0) return;
  playerXp += amount;
  let leveledUp = false;
  while (playerXp >= xpToNext(playerLevel)){
    playerXp -= xpToNext(playerLevel);
    playerLevel++;
    leveledUp = true;
  }
  if (!leveledUp) return;
  const newSlots = slotsForLevel(playerLevel);
  if (loadouts.length && newSlots > loadouts[0].length){
    for (let li=0; li<loadouts.length; li++){
      while (loadouts[li].length < newSlots) loadouts[li].push({ petal:BASIC_IDS.common, tier:1 });
    }
    rebuildInstances(); // also recomputes max health via applyMaxHealthChange()
  } else {
    applyMaxHealthChange();
  }
  saveProgress();
}
const NUM_SUFFIXES = ['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];
function formatNum(n){
  n = Math.max(0, n);
  if (n < 1000) return Math.floor(n).toString();
  let tier = Math.floor(Math.log10(n)/3);
  if (tier >= NUM_SUFFIXES.length) tier = NUM_SUFFIXES.length-1;
  const scaled = n / Math.pow(1000, tier);
  return scaled.toFixed(scaled < 10 ? 2 : 1) + NUM_SUFFIXES[tier];
}
function updateLevelHud(){
  const need = xpToNext(playerLevel);
  const pct = clamp(playerXp/need, 0, 1) * 100;
  document.getElementById('levelHudText').textContent =
    `${formatNum(playerXp)} / ${formatNum(need)} xp | ${formatNum(player.maxHealth)} hp`;
  document.getElementById('levelHudFill').style.width = pct + '%';
  document.getElementById('levelHudLabel').textContent = `Lvl ${playerLevel} Flower [${pct.toFixed(2)}%]`;
}

/* ══════════════════════════════════════════
   MOB DEFINITIONS — MOB_KNOCKBACK, ALL_RARITIES_DROP, and MOB_DEFS now live in balance.js
   ══════════════════════════════════════════ */
// level thresholds picked to roughly track where each rarity band starts becoming common in the drop tables
/* ══════════════════════════════════════════
   PLAYER
   ══════════════════════════════════════════ */
function makePlayer(){
  const maxHP = maxHealthForLevel(playerLevel);
  return {
    x: (ARENA.w/ZONES.length)*0.3, y: ARENA.h/2, r: 26,   // spawn well into the left of the Garden zone, away from the Desert border
    mvx:0, mvy:0, kvx:0, kvy:0,
    maxSpeed:200, accel:12, decel:10, kFriction:9, knockback:0,
    maxHealth:maxHP, health:maxHP, dispHealth:maxHP,
    iframe:0, hurtFlash:0, kbLock:0,
    petalAngle:0, orbitR: ORBIT.restR, orbitRDef: ORBIT.restR,
    instances:[],
  };
}
let player = makePlayer();
const KB_LOCK = 0.08;
function iframeFor(knockback){
  const dist = knockback / player.kFriction;
  return KB_LOCK + dist / player.maxSpeed;
}

/* ── inventory / loadout ── */
let inventory = {};              // "petal|tier" -> count
let discoveredPetals = new Set();// "petal|tier" ever obtained (set only by forging)
let killedMobs = new Set();      // "mobType|level" ever killed
let loadouts = [];               // two loadout sets — [0]=primary, [1]=secondary
let activeLoadout = 0;
function invKey(petal,tier){ return petal+'|'+tier; }
// essence: generic, rarity-only currency dropped by mobs and spent at the Forge. Keyed by
// name too (only 'base' exists for now) so multiple flavors per rarity can be added later.
let essence = {};
function essenceKey(rarity, name='base'){ return rarity+'|'+name; }
// names too long to fit one line in a slot (e.g. "Third Eye") render smaller instead of wrapping
function longNameCls(name){ return name.length > 7 ? 'long' : ''; }
// new players (and newly-unlocked slots) start equipped with real, tier-1 common Basic petals —
// pre-equipped for free exactly once, just like starting equipment, not conjured filler
function defaultLoadout(){ return Array.from({length:slotsForLevel(playerLevel)}, ()=>({petal:BASIC_IDS.common,tier:1})); }

// max flower HP = the level curve, plus a stacking bonus from any equipped Dahlia/Tulip
// (FLOWER_HP_PETALS), scaled by that petal's own tier progress
function computeMaxHealth(){
  let bonus = 0;
  if (loadouts[activeLoadout]) loadouts[activeLoadout].forEach(slot=>{
    const mult = FLOWER_HP_PETALS[slot.petal];
    if (mult) bonus += (mult-1) * tierScale(slot.petal, slot.tier);
  });
  return maxHealthForLevel(playerLevel) * (1+bonus);
}
function applyMaxHealthChange(){
  const newMax = computeMaxHealth();
  const delta = newMax - player.maxHealth;
  player.maxHealth = newMax;
  player.health = Math.min(newMax, player.health + Math.max(0, delta));
}

function rebuildInstances(){
  player.instances = [];
  loadouts[activeLoadout].forEach((slot,i)=>{
    if (slot.petal==null) return; // empty slot — contributes nothing to the ring
    const def = PETAL_DEFS[slot.petal];
    const parts = def.parts||1;
    for (let p=0;p<parts;p++){
      player.instances.push({
        slot:i, petal:slot.petal, tier:slot.tier, parts, partIndex:p,
        health: pscale(def,'health',slot.petal,slot.tier), broken:false, regenT:0, hitCd:0,
        armT: def.armTime||0, flying:false, vx:0, vy:0, life:0, x:player.x, y:player.y,
        spawnT:0, eating:false, eatT:0, eatFromX:player.x, eatFromY:player.y, pendingHeal:0, reachEase:0,
      });
    }
  });
  applyMaxHealthChange();
}
function setActiveLoadout(li){
  if (activeLoadout===li) return;
  activeLoadout = li;
  rebuildInstances();
  if (openPanelName) renderPanel();
}
// hotbar-only convenience: click a slot in either row to swap that one petal
// between the primary and secondary loadout, without a full drag
function quickSwapSlot(i){
  const bar = document.getElementById('loadoutBar');
  const rectA = slotRect(bar, 0, i), rectB = slotRect(bar, 1, i);
  const a = loadouts[0][i], b = loadouts[1][i];
  // the real slots keep showing their old contents until the flying icons actually arrive —
  // swapping the data (and thus the DOM) immediately made them look like they'd already
  // teleported before the animation caught up
  flySwapIcon(rectA, rectB, a.petal, a.tier);
  flySwapIcon(rectB, rectA, b.petal, b.tier);
  setTimeout(()=>{
    loadouts[0][i] = b;
    loadouts[1][i] = a;
    rebuildInstances();
    if (openPanelName) renderPanel();
    scheduleSave();
  }, FLY_SWAP_DELAY);
}

/* ── slot swap fly animation — the two petals slide between their old and new
     slots (which are always fixed-position boxes) instead of teleporting ── */
function slotRect(container, li, i){
  const el = container && container.querySelector(`[data-li="${li}"][data-i="${i}"]`);
  return el ? el.getBoundingClientRect() : null;
}
const FLY_SWAP_DELAY = 220; // matches flySwapIcon's position/size transition duration
function flySwapIcon(fromRect, toRect, petal, tier){
  if (!fromRect || !toRect || petal==null) return;
  const fromSize = Math.max(18, Math.min(fromRect.width, fromRect.height) - 6);
  const toSize = Math.max(18, Math.min(toRect.width, toRect.height) - 6);
  const rc = RARITY_INFO[PETAL_RARITY[petal]].color;
  // fly the whole slot container (colored box + border), not just the bare petal icon —
  // size transitions alongside position so it grows/shrinks smoothly as it moves, rather
  // than snapping to its final size only once the flight finishes
  const cv = document.createElement('div');
  cv.style.cssText = `position:fixed;left:${fromRect.left+fromRect.width/2-fromSize/2}px;top:${fromRect.top+fromRect.height/2-fromSize/2}px;
    width:${fromSize}px;height:${fromSize}px;box-sizing:border-box;z-index:200;pointer-events:none;
    background:${rc};border:${Math.max(2,Math.round(fromSize*0.09))}px solid ${shadeColor(rc,-45)};border-radius:${Math.round(fromSize*0.2)}px;
    box-shadow:0 3px 8px rgba(0,0,0,.4);
    transition:left .22s cubic-bezier(.2,.8,.3,1),top .22s cubic-bezier(.2,.8,.3,1),
      width .22s cubic-bezier(.2,.8,.3,1),height .22s cubic-bezier(.2,.8,.3,1),
      border-width .22s cubic-bezier(.2,.8,.3,1),border-radius .22s cubic-bezier(.2,.8,.3,1),
      opacity .18s ease .16s;`;
  const icon = document.createElement('canvas');
  icon.width = 40; icon.height = 40;
  icon.style.cssText = 'width:100%;height:100%;display:block;';
  drawPetalIcon(icon.getContext('2d'), petal, 20, 20, 16, tier);
  cv.appendChild(icon);
  document.body.appendChild(cv);
  requestAnimationFrame(()=>{
    cv.style.left = (toRect.left+toRect.width/2-toSize/2)+'px';
    cv.style.top = (toRect.top+toRect.height/2-toSize/2)+'px';
    cv.style.width = toSize+'px';
    cv.style.height = toSize+'px';
    cv.style.borderWidth = Math.max(2,Math.round(toSize*0.09))+'px';
    cv.style.borderRadius = Math.round(toSize*0.2)+'px';
    cv.style.opacity = '0';
  });
  setTimeout(()=>cv.remove(), 260);
}

/* ── pickups — mobs now drop essence (rarity-only), never petals directly ── */
const pickups = [];
const PICKUP_STACK_RANGE = 50; // nearby same-rarity essence drops merge into one stacked pickup instead of overlapping
function spawnEssencePickup(x,y,rarity,count,name){
  count = count||1;
  name = name||'base';
  // scatter drops around the kill point so several rarities dropping at once from the same
  // kill land visibly apart instead of stacking invisibly on the exact same spot
  const ox = x + rand(-24,24), oy = y + rand(-24,24);
  const nearby = pickups.find(p => p.rarity===rarity && p.name===name && len(p.x-ox, p.y-oy) < PICKUP_STACK_RANGE);
  if (nearby){ nearby.count += count; return; }
  pickups.push({ x:ox, y:oy, rarity, name, count, vx:rand(-40,40), vy:rand(-40,40), born:performance.now()/1000 });
}
function collectPickup(p){
  const k = essenceKey(p.rarity, p.name||'base');
  essence[k] = (essence[k]||0)+(p.count||1);
  if (openPanelName==='essence') renderPanel();
  scheduleSave();
}
function grantDevMode(){
  Object.keys(PETAL_DEFS).forEach(petal=>{
    TIERS.forEach(tier=>{
      if (tier < RARITY_START_TIER[PETAL_RARITY[petal]]) return; // petals never exist below their rarity's starting tier
      const k = invKey(petal, tier);
      inventory[k] = (inventory[k]||0) + 100;
      discoveredPetals.add(k);
    });
  });
  RARITIES.forEach(rarity=>{
    const k = essenceKey(rarity);
    essence[k] = (essence[k]||0) + 1000;
  });
  Object.keys(SIGNATURE_ESSENCES).forEach(sigId=>{
    sigEssenceRarities(sigId).forEach(rarity=>{
      const k = essenceKey(rarity, sigId);
      essence[k] = (essence[k]||0) + 1000;
    });
  });
  if (openPanelName) renderPanel();
  scheduleSave();
}
window.grantDevMode = grantDevMode;
// mirror of grantDevMode — subtracts exactly what that grants (floored at 0), so repeated
// clicks of either button can't push a count negative or over-correct
function undoDevMode(){
  Object.keys(PETAL_DEFS).forEach(petal=>{
    TIERS.forEach(tier=>{
      if (tier < RARITY_START_TIER[PETAL_RARITY[petal]]) return;
      const k = invKey(petal, tier);
      inventory[k] = Math.max(0, (inventory[k]||0) - 100);
    });
  });
  RARITIES.forEach(rarity=>{
    const k = essenceKey(rarity);
    essence[k] = Math.max(0, (essence[k]||0) - 1000);
  });
  Object.keys(SIGNATURE_ESSENCES).forEach(sigId=>{
    sigEssenceRarities(sigId).forEach(rarity=>{
      const k = essenceKey(rarity, sigId);
      essence[k] = Math.max(0, (essence[k]||0) - 1000);
    });
  });
  if (openPanelName) renderPanel();
  scheduleSave();
}
window.undoDevMode = undoDevMode;

/* ══════════════════════════════════════════
   MOB SPAWNING  ·  chunk-based density + rarity
   ══════════════════════════════════════════ */
const mobs = [];
function rockShape(){ const n=7,out=[]; for(let i=0;i<n;i++) out.push(rand(0.78,1.12)); return out; }

// MOB_LEVELS, mobLevelScale, aggroRangeScale, SIZE_BY_LEVEL, HOSTILE_ZONE_MULT,
// PASSIVE_ZONE_MULT, and zoneMobWeight now live in balance.js
function spawnMob(typeKey, level, x, y){
  const b = MOB_DEFS[typeKey], scale = mobLevelScale(level), size = SIZE_BY_LEVEL[level] || 1;
  const m = {
    type:typeKey, level, levelScale:scale, spawnZoneIdx: zoneAt(x).idx,
    x, y, vx:0, vy:0,
    r: b.r*(1+(size-1)*0.5),
    health: b.health*scale, maxHealth: b.health*scale, dispHealth: b.health*scale,
    contactDmg: b.contactDmg*scale,
    petalDmg:   b.petalDmg*scale,
    knockback:  MOB_KNOCKBACK,
    mass:       b.mass*size,
    friction:   b.friction, speed:b.speed, color:b.color,
    aggroRange: b.aggroRange!=null ? b.aggroRange*aggroRangeScale(level) : undefined,
    aggro:false, slowT:0, slowMult:1, hurtFlash:0, legPhase:0, facing:0,
    wanderAng: rand(0,TAU), wanderT: rand(0.5,2),
  };
  if (typeKey==='rock'){ m.spin=rand(0,TAU); m.verts=rockShape(); }
  mobs.push(m); return m;
}
// is (x,y) within `range` of the local player or any visible remote player?
function tooCloseToAnyPlayer(x, y, range){
  if (len(x-player.x, y-player.y) < range) return true;
  for (const id in remotePlayers){
    const rp = remotePlayers[id];
    if (rp && rp.x!=null && len(x-rp.x, y-rp.y) < range) return true;
  }
  return false;
}
// the set of zone indices that are "live" — each player's own zone plus its immediate
// neighbours. Mobs outside this set are frozen (see the main update loop).
function activeZoneSet(){
  const zones = new Set();
  const add = zi => { zones.add(zi-1); zones.add(zi); zones.add(zi+1); };
  add(zoneAt(player.x).idx);
  for (const id in remotePlayers){
    const rp = remotePlayers[id];
    if (rp && rp.x!=null) add(zoneAt(rp.x).idx);
  }
  return zones;
}
function spawnRandomMob(x,y){
  const zone  = zoneAt(x);
  const type  = pickWeighted(Object.keys(MOB_DEFS).map(k=>({ key:k, weight: zoneMobWeight(MOB_DEFS[k], zone.idx) })));
  const level = zone.levels[Math.floor(Math.random()*zone.levels.length)];
  // hostile mobs must never appear already within their aggro range of a player — that would
  // yank someone into a chase the instant the mob pops in. Skip the spawn if it would.
  const def = MOB_DEFS[type.key];
  if (def.behavior === 'hostile'){
    const range = (def.aggroRange||0) * aggroRangeScale(level);
    if (tooCloseToAnyPlayer(x, y, range)) return null;
  }
  return spawnMob(type.key, level, x, y);
}

// CHUNK_CAP is the max mobs per chunk — lowered from 3 to 2 to thin overall density (fewer
// mobs to simulate and, in multiplayer, fewer to sync across the network)
const CHUNK = 650, CHUNK_CAP = 2, SPAWN_TICK = 0.4, SPAWN_SAFE = 360;
let spawnTimer = 0;
function chunkCounts(){
  const c = {};
  for (const m of mobs){ const k = Math.floor(m.x/CHUNK)+','+Math.floor(m.y/CHUNK); c[k]=(c[k]||0)+1; }
  return c;
}
function randInChunk(cx, cy){
  return { x: clamp(cx*CHUNK + rand(50, CHUNK-50), 60, ARENA.w-60), y: clamp(cy*CHUNK + rand(50, CHUNK-50), 60, ARENA.h-60) };
}
function updateSpawns(dt){
  spawnTimer -= dt; if (spawnTimer>0) return; spawnTimer = SPAWN_TICK;
  const counts = chunkCounts();
  const cols = Math.ceil(ARENA.w/CHUNK), rows = Math.ceil(ARENA.h/CHUNK);
  for (let cx=0;cx<cols;cx++) for (let cy=0;cy<rows;cy++){
    if ((counts[cx+','+cy]||0) >= CHUNK_CAP) continue;
    if (Math.random() < 0.5){
      const p = randInChunk(cx,cy);
      if (len(p.x-player.x, p.y-player.y) < SPAWN_SAFE) continue;
      ensureNetId(spawnRandomMob(p.x, p.y));
    }
  }
}
function seedMobs(){
  mobs.length = 0;
  for (const k in mobById) delete mobById[k];
  const cols = Math.ceil(ARENA.w/CHUNK), rows = Math.ceil(ARENA.h/CHUNK);
  for (let cx=0;cx<cols;cx++) for (let cy=0;cy<rows;cy++){
    for (let n=0;n<CHUNK_CAP;n++){
      const p = randInChunk(cx,cy);
      if (len(p.x-player.x, p.y-player.y) < SPAWN_SAFE) continue;
      ensureNetId(spawnRandomMob(p.x, p.y));
    }
  }
}

/* ══════════════════════════════════════════
   COLLISION HELPERS
   ══════════════════════════════════════════ */
function resolveOverlap(a, b, aMass, bMass){
  const dx = b.x-a.x, dy = b.y-a.y;
  let d = len(dx,dy);
  const min = a.r + b.r;
  if (d >= min || d === 0) { if(d===0){ b.x+=0.1; } return null; }
  const nx = dx/d, ny = dy/d;
  const overlap = min - d;
  const total = aMass + bMass;
  a.x -= nx * overlap * (bMass/total);
  a.y -= ny * overlap * (bMass/total);
  b.x += nx * overlap * (aMass/total);
  b.y += ny * overlap * (aMass/total);
  return { nx, ny, overlap };
}
function nearestMobWithin(x,y,range){
  let best=null, bestD=range;
  for (const m of mobs){ const d=len(m.x-x,m.y-y); if(d<bestD){ bestD=d; best=m; } }
  return best;
}
const PETAL_MASS = 1;
function damageMob(m, dmg, dx, dy, d, push){
  m.health -= dmg;
  m.hurtFlash = 0.12;
  if (push){
    const nx = d?dx/d:1, ny = d?dy/d:0;
    const kb = push * (PETAL_MASS / m.mass);
    m.vx += nx*kb; m.vy += ny*kb;
  }
}

/* ══════════════════════════════════════════
   MOB AI
   ══════════════════════════════════════════ */
function wanderStep(m, dt){
  const spd = m.speed * (m.slowT>0 ? m.slowMult : 1);
  m.wanderT -= dt;
  if (m.wanderT<=0){ m.wanderAng = rand(0,TAU); m.wanderT = rand(0.8,2.4); }
  const tx = Math.cos(m.wanderAng)*spd*0.3, ty = Math.sin(m.wanderAng)*spd*0.3;
  m.vx += (tx - m.vx) * clamp(3*dt,0,1);
  m.vy += (ty - m.vy) * clamp(3*dt,0,1);
}
function chaseStep(m, dt, swerve){
  const spd = m.speed * (m.slowT>0 ? m.slowMult : 1);
  const np = nearestPlayerPos(m.x, m.y);
  const dx = np.x-m.x, dy = np.y-m.y, d = len(dx,dy)||1;
  let ang = Math.atan2(dy,dx);
  if (swerve) ang += Math.sin(performance.now()/1000*5 + m.wanderAng)*0.5;
  const tx = Math.cos(ang)*spd, ty = Math.sin(ang)*spd;
  m.vx += (tx - m.vx) * clamp(4*dt,0,1);
  m.vy += (ty - m.vy) * clamp(4*dt,0,1);
}
function updateMob(m, dt){
  const def = MOB_DEFS[m.type];
  m.dispHealth += (m.health - m.dispHealth) * clamp(HP_EASE*dt, 0, 1);
  if (m.slowT>0) m.slowT -= dt;
  if (m.hurtFlash>0) m.hurtFlash -= dt;
  if (m.type==='spider'){
    const speed = len(m.vx,m.vy);
    if (speed>8) m.facing = Math.atan2(m.vy,m.vx);
    m.legPhase += dt * (2 + speed*0.045);
  }
  switch(def.behavior){
    case 'passive': m.aggro ? chaseStep(m, dt, false) : wanderStep(m, dt); break;
    case 'stationary': break;
    case 'neutral': m.aggro ? chaseStep(m, dt, false) : wanderStep(m, dt); break;
    case 'neutral-swerve': m.aggro ? chaseStep(m, dt, true) : wanderStep(m, dt); break;
    case 'hostile': {
      const d = nearestPlayerPos(m.x, m.y).d;
      d < m.aggroRange ? chaseStep(m, dt, false) : wanderStep(m, dt);
      break;
    }
  }
  const mf = Math.exp(-m.friction*dt);
  m.vx *= mf; m.vy *= mf;
  m.x += m.vx*dt; m.y += m.vy*dt;
  m.x = clamp(m.x, m.r, ARENA.w-m.r);
  m.y = clamp(m.y, m.r, ARENA.h-m.r);
}
/* ══════════════════════════════════════════
   PETAL INSTANCES  ·  position, reload, specials
   ══════════════════════════════════════════ */
function breakInstance(inst, def){
  inst.broken = true; inst.regenT = def.reload; inst.flying = false; inst.health = 0;
  // snap back to the flower right away instead of leaving x/y at wherever it died
  // (often overlapping the mob that killed it) — otherwise it renders stuck inside
  // the mob for the whole reload period
  inst.x = player.x; inst.y = player.y;
}
function orbitTarget(inst){
  const def = PETAL_DEFS[inst.petal];
  const baseAngle = player.petalAngle + (inst.slot/loadouts[activeLoadout].length)*TAU;
  const partOffset = inst.parts>1 ? (inst.partIndex - (inst.parts-1)/2) * 0.26 : 0;
  const ang = baseAngle + partOffset;
  let radius = def.defensive ? player.orbitRDef : player.orbitR;
  if (def.reach) radius += inst.reachEase||0;
  return { x: player.x + Math.cos(ang)*radius, y: player.y + Math.sin(ang)*radius };
}
function positionInstance(inst, dt){
  if (inst.flying){ inst.x += inst.vx*dt; inst.y += inst.vy*dt; inst.life -= dt; return; }
  const t = orbitTarget(inst);
  if (inst.spawnT < 1){
    // emerging from the flower: blend from the flower's center out to the orbit spot
    const e = easeOutCubic(inst.spawnT);
    inst.x = player.x + (t.x - player.x) * e;
    inst.y = player.y + (t.y - player.y) * e;
  } else {
    inst.x = t.x; inst.y = t.y;
  }
}
function updateInstances(dt){
  // passive/secondary effects (rotation speed, range, per-second healing) come from a petal
  // just being equipped, not from it currently being "alive" — so unlike active combat, these
  // stay on even while the instance is broken/reloading. Only excluded while flying (a Web
  // projectile mid-flight), which none of these stats are ever defined on anyway.
  let rotBonus=0, rangeBonus=0, healPerSec=0;
  for (const inst of player.instances){
    const def = PETAL_DEFS[inst.petal];
    if (inst.flying) continue;
    if (def.rotBonus) rotBonus += def.rotBonus * specialTierScale(inst.petal, 'rotBonus', inst.tier);
    if (def.rangeBonus) rangeBonus += def.rangeBonus * specialTierScale(inst.petal, 'rangeBonus', inst.tier);
    if (def.healPerSec) healPerSec += pscale(def,'healPerSec',inst.petal,inst.tier);
  }
  player.auraRot = rotBonus; player.auraRange = rangeBonus;
  if (healPerSec) player.health = Math.min(player.maxHealth, player.health + healPerSec*dt);

  for (const inst of player.instances){
    const def = PETAL_DEFS[inst.petal], tier = inst.tier;
    if (inst.hitCd>0) inst.hitCd -= dt;

    // Wing's (and any other def.reach petal's) attack-range extension eases in/out at the
    // same rate as the orbit radius itself, instead of snapping instantly with mouseDownL
    if (def.reach){
      const targetReach = mouseDownL ? def.reach * specialTierScale(inst.petal, 'reach', tier) : 0;
      inst.reachEase += (targetReach - inst.reachEase) * clamp(10*dt, 0, 1);
    }

    if (inst.broken){
      inst.regenT -= dt;
      if (inst.regenT<=0){
        inst.broken=false; inst.health = pscale(def,'health',inst.petal,tier); inst.flying=false;
        // snap back to the flower immediately — otherwise inst.x/y are left wherever the
        // petal died (often right on top of the mob that killed it), and the collision
        // check later this same frame sees it as "alive" at that stale position, dealing
        // an instant hit no matter where the player currently is
        inst.x = player.x; inst.y = player.y;
        inst.spawnT = 0; inst.eating = false;
        inst.hitCd = PETAL_HIT_CD;
        if (def.armTime) inst.armT = def.armTime;
      }
      continue;
    }

    // being drawn into the flower (Rose-family self-destruct) — animate, then heal + reload
    if (inst.eating){
      inst.eatT += dt/EAT_DUR;
      if (inst.eatT >= 1){
        player.health = Math.min(player.maxHealth, player.health + inst.pendingHeal);
        inst.eating = false;
        breakInstance(inst, def);
      } else {
        const e = easeInCubic(inst.eatT);
        inst.x = inst.eatFromX + (player.x - inst.eatFromX) * e;
        inst.y = inst.eatFromY + (player.y - inst.eatFromY) * e;
      }
      continue;
    }

    if (inst.spawnT < 1) inst.spawnT = Math.min(1, inst.spawnT + dt/SPAWN_DUR);

    if (def.projectile){
      if (!inst.flying){
        const target = nearestMobWithin(inst.x, inst.y, def.fireRange);
        if (mouseDownL && target){
          const dx=target.x-inst.x, dy=target.y-inst.y, d=len(dx,dy)||1;
          inst.flying=true; inst.vx=dx/d*def.projSpeed; inst.vy=dy/d*def.projSpeed; inst.life=def.projLife;
        }
      } else if (inst.life<=0){ breakInstance(inst, def); continue; }
    }

    // healing petals (armTime + healBurst) sit charged and idle at full HP instead of
    // wasting themselves — the arm timer only ticks down once healing is actually needed
    if (def.armTime && inst.armT>0 && player.health < player.maxHealth){
      inst.armT -= dt;
      if (inst.armT<=0){
        // arm complete — get pulled into the flower instead of vanishing instantly
        inst.eating = true; inst.eatT = 0; inst.eatFromX = inst.x; inst.eatFromY = inst.y;
        inst.pendingHeal = pscale(def,'healBurst',inst.petal,tier);
        continue;
      }
    }
    positionInstance(inst, dt);
  }
}
function dealPetalDamage(inst, def, m, dx, dy, d){
  const dmg = pscale(def,'damage',inst.petal,inst.tier);
  if (dmg>0){
    if (amHost){
      // host owns the mobs — apply damage directly
      damageMob(m, dmg, dx, dy, d, def.push||0);
      if (def.slowMult){ m.slowMult=scaledSlowMult(def,inst.petal,inst.tier); m.slowT=Math.max(m.slowT, scaledSlowDur(def,inst.petal,inst.tier)); }
      if (shouldAggroOnHit(m)) m.aggro = true;
    } else if (m.netId){
      // non-host — the host is authoritative, so just report the hit and let it apply
      window.MP.sendHit(m.netId, dmg);
    }
    noteMyHit(m.netId);   // remember I damaged this mob, so I get its loot when it dies
  }
  inst.health -= m.petalDmg;
  if (inst.health<=0) breakInstance(inst, def);
}
const PICKUP_MAGNET_RANGE = 40; // barely wider than the collect radius — you have to walk into a petal, not vacuum it from afar
function updatePickups(dt){
  for (let i=pickups.length-1;i>=0;i--){
    const p = pickups[i];
    const dx=player.x-p.x, dy=player.y-p.y, d=len(dx,dy)||1;
    if (d<PICKUP_MAGNET_RANGE){
      // snap straight to a fast, always-outrunning speed instead of slowly accelerating —
      // the magnet should feel instant, not a slow drift the player can jog away from
      const pullSpeed = 300 + 900*(1 - d/PICKUP_MAGNET_RANGE);
      p.vx = dx/d*pullSpeed; p.vy = dy/d*pullSpeed;
    } else {
      p.vx*=Math.exp(-6*dt); p.vy*=Math.exp(-6*dt);
    }
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    if (d < player.r+10){ collectPickup(p); pickups.splice(i,1); }
  }
}

/* ══════════════════════════════════════════
   MAIN UPDATE
   ══════════════════════════════════════════ */
let dead = false;
const DEATH_ANIM_DUR = 0.28; // mobs pop and fade out over this long instead of vanishing instantly

// mob simulation/mirroring, spawning, and the world broadcast — this must keep running even
// while the LOCAL player is dead and waiting to respawn, since (if we're the host) every other
// player's mobs depend on us continuing to simulate and broadcast. Only the local player's own
// movement/combat pauses on death; the shared world does not.
function updateWorld(dt){
  if (amHost){
    // host simulates the mobs. Mobs more than one zone away from every player are "frozen":
    // left in place (kept for consistency) but not simulated — no AI, no physics — which cuts
    // the per-frame cost and the amount of mob state we have to broadcast.
    const activeZones = activeZoneSet();
    const active = [];
    for (const m of mobs){
      if (m.dying) continue;
      if (activeZones.has(zoneAt(m.x).idx)){ updateMob(m, dt); active.push(m); }
    }
    for (let i=0;i<active.length;i++)
      for (let j=i+1;j<active.length;j++)
        resolveOverlap(active[i], active[j], active[i].mass, active[j].mass);
  } else {
    // non-host: we don't simulate — every frame, recompute where the mob SHOULD be right now
    // (last broadcast position extrapolated forward by the estimated velocity × time actually
    // elapsed since that broadcast) and ease toward that continuously-advancing prediction.
    // A previous version dead-reckoned m.x forward each frame and then pulled it back toward
    // the stale broadcast point every frame too — those two fought each other, and since the
    // pull-back target never advanced between broadcasts, it acted as a constant drag that grew
    // with mob speed. That left fast mobs (beetles/spiders) meaningfully behind their real
    // position for non-host clients — enough that local collision math (which is what gates
    // whether a non-host's petal registers a hit at all) would intermittently miss or land late.
    for (const m of mobs){
      if (m.dying) continue;
      if (m.tx!=null){
        const elapsed = Math.min(0.5, (performance.now()-m.netSeen)/1000);
        const px = m.tx + (m.netVX||0)*elapsed, py = m.ty + (m.netVY||0)*elapsed;
        m.x += (px-m.x)*clamp(14*dt,0,1); m.y += (py-m.y)*clamp(14*dt,0,1);
        // most mob draw functions orient themselves off atan2(vy,vx) — mirrored mobs never run
        // real physics, so without this their facing angle would freeze at whatever it was when
        // first spawned. Ease the facing vector toward the actual movement direction (rather
        // than snapping to it every broadcast) so rotation turns smoothly instead of jittering.
        const mvx = m.netVX||0, mvy = m.netVY||0;
        if (len(mvx,mvy) > 1){ m.vx += (mvx-m.vx)*clamp(6*dt,0,1); m.vy += (mvy-m.vy)*clamp(6*dt,0,1); }
      }
      if (m.hurtFlash>0) m.hurtFlash -= dt;
      if (m.type==='spider') m.legPhase += dt*4;
      m.dispHealth += (m.health - m.dispHealth) * clamp(HP_EASE*dt, 0, 1);
    }
  }

  for (let i=mobs.length-1;i>=0;i--){
    const m = mobs[i];
    if (m.dying){   // death animation runs on every client (host and mirrors alike)
      m.dieT += dt;
      if (m.dieT >= DEATH_ANIM_DUR){ if (m.netId) delete mobById[m.netId]; mobs.splice(i,1); }
      continue;
    }
    if (!amHost) continue;   // only the host decides despawns and deaths
    // anti-cheese: luring a mob more than one zone away from where it spawned despawns it
    // instantly with no drops or XP, instead of letting it be dragged into an easier zone to farm
    if (Math.abs(zoneAt(m.x).idx - m.spawnZoneIdx) > 1){
      if (m.netId) delete mobById[m.netId];
      mobs.splice(i,1);
      continue;
    }
    if (m.health<=0){
      // announce the death; each client that damaged it grants ITSELF loot + XP (see handleDeaths)
      m.dying = true; m.dieT = 0;
      window.MP.publishDeath(m.netId, {ty:TYPE_IDX[m.type], lv:m.level, x:Math.round(m.x), y:Math.round(m.y)});
    }
  }
  if (amHost){
    updateSpawns(dt);
    // broadcast the mob set on a fixed cadence, independent of frame rate
    worldPubT -= dt;
    if (worldPubT <= 0){ worldPubT = WORLD_PUB_PERIOD; publishWorldMobs(); }
  }
}

function update(dt){
  if (!authed) return;
  updateWorld(dt);
  if (dead) return;

  let locked = false;
  if (player.kbLock > 0){ player.kbLock -= dt; locked = true; }

  let ix=0, iy=0;
  if (!locked){
    if (keys['w']||keys['arrowup'])    iy-=1;
    if (keys['s']||keys['arrowdown'])  iy+=1;
    if (keys['a']||keys['arrowleft'])  ix-=1;
    if (keys['d']||keys['arrowright']) ix+=1;
  }
  const il = len(ix,iy);
  if (il>0){ ix/=il; iy/=il; }
  const tvx = ix*player.maxSpeed, tvy = iy*player.maxSpeed;
  const rate = clamp((il>0 ? player.accel : player.decel) * dt, 0, 1);
  player.mvx += (tvx - player.mvx) * rate;
  player.mvy += (tvy - player.mvy) * rate;
  const kf = Math.exp(-player.kFriction*dt);
  player.kvx *= kf; player.kvy *= kf;
  player.x += (player.mvx + player.kvx)*dt;
  player.y += (player.mvy + player.kvy)*dt;
  player.x = clamp(player.x, player.r, ARENA.w-player.r);
  player.y = clamp(player.y, player.r, ARENA.h-player.r);

  if (player.iframe>0) player.iframe -= dt;
  if (player.hurtFlash>0) player.hurtFlash -= dt;
  player.dispHealth += (player.health - player.dispHealth) * clamp(HP_EASE*dt, 0, 1);

  let targetR = ORBIT.restR;
  if (mouseDownL) targetR = ORBIT.expandR * (1 + (player.auraRange||0));
  else if (mouseDownR || keys[' ']) targetR = ORBIT.contractR;
  player.orbitR += (targetR - player.orbitR) * clamp(10*dt, 0, 1);

  // defensive petals (e.g. Rose) never push out to attack range — they still pull in on contract
  const targetRDef = (mouseDownR || keys[' ']) ? ORBIT.contractR : ORBIT.restR;
  player.orbitRDef += (targetRDef - player.orbitRDef) * clamp(10*dt, 0, 1);
  player.petalAngle += (ORBIT.rotSpeed + (player.auraRot||0)) * dt;

  updateInstances(dt);

  for (const inst of player.instances){
    if (inst.broken || inst.eating) continue;
    const def = PETAL_DEFS[inst.petal];
    const rad = inst.parts>1 ? 6 : 9;
    for (const m of mobs){
      if (m.dying) continue;
      const dx=m.x-inst.x, dy=m.y-inst.y, d=len(dx,dy);
      if (d < m.r+rad){
        if (inst.flying){ dealPetalDamage(inst, def, m, dx,dy,d); break; }
        else if (inst.hitCd<=0){ inst.hitCd = PETAL_HIT_CD; dealPetalDamage(inst, def, m, dx,dy,d); }
      }
    }
  }

  for (const m of mobs){
    if (m.dying) continue;
    const dx=player.x-m.x, dy=player.y-m.y;
    const d=len(dx,dy), min=m.r+player.r;
    if (d < min){
      const nx = d?dx/d:1, ny = d?dy/d:0;
      const overlap = min - d;
      player.x += nx*overlap; player.y += ny*overlap;
      if (player.iframe<=0){
        player.health -= m.contactDmg;
        player.iframe = iframeFor(m.knockback);
        player.hurtFlash = 0.2;
        player.kbLock = KB_LOCK;
        player.mvx = 0; player.mvy = 0;
        player.kvx = nx*m.knockback; player.kvy = ny*m.knockback;
        if (player.health<=0){ player.health=0; onDeath(); }
      }
    }
  }

  updatePickups(dt);

  cam.x = clamp(player.x - W/2, 0, ARENA.w - W);
  cam.y = clamp(player.y - H/2, 0, ARENA.h - H);
  if (ARENA.w < W) cam.x = (ARENA.w - W)/2;
  if (ARENA.h < H) cam.y = (ARENA.h - H)/2;
}

function onDeath(){ dead = true; document.getElementById('dead').classList.add('show'); }
function respawn(){
  // only the player resets — mobs and ground pickups persist through death instead of the
  // whole map being wiped and reseeded. Mobs do drop their aggro though, so you don't respawn
  // straight back into a chase from whatever was hunting you when you died.
  player = makePlayer(); rebuildInstances();
  for (const m of mobs) m.aggro = false;
  dead = false; document.getElementById('dead').classList.remove('show');
}
window.respawn = respawn;

/* ══════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════ */
function draw(){
  ctx.fillStyle = '#1e8a42'; ctx.fillRect(0,0,W,H);
  ctx.save(); ctx.translate(-cam.x, -cam.y);

  // hard cut at each zone boundary — no gradient blend between zones
  const zoneW = ARENA.w/ZONES.length;
  ZONES.forEach((z,i)=>{ ctx.fillStyle = z.bg; ctx.fillRect(zoneW*i, 0, zoneW, ARENA.h); });

  ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 2;
  const grid = 60;
  for (let x=0;x<=ARENA.w;x+=grid){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,ARENA.h); ctx.stroke(); }
  for (let y=0;y<=ARENA.h;y+=grid){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(ARENA.w,y); ctx.stroke(); }
  ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 6;
  ctx.strokeRect(0,0,ARENA.w,ARENA.h);

  ctx.font = '900 34px "Segoe UI", sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ZONES.forEach((z,i)=>{
    const cx = zoneW*i + zoneW/2;
    ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.strokeText(z.name.toUpperCase()+' ZONE', cx, 16);
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.fillText(z.name.toUpperCase()+' ZONE', cx, 16);
  });

  drawPickups();
  for (const m of mobs){
    if (m.dying){ drawDyingMob(m); continue; }
    drawMob(m); drawLevelLabel(m); mobHealthBar(m);
  }
  if (!dead){
    for (const inst of player.instances) drawInstance(inst);
    drawPlayer();
  }
  drawRemotePlayers();

  ctx.restore();
  renderLoadoutBar();
  updateLevelHud();
  const avgLevel = mobs.length ? Math.round(mobs.reduce((s,m)=>s+m.level,0)/mobs.length) : 0;
  document.getElementById('stats').textContent =
    `Lv ${playerLevel} (${playerXp}/${xpToNext(playerLevel)} XP) · HP ${Math.ceil(player.health)}/${formatNum(player.maxHealth)} · ${zoneAt(player.x).name} Zone · mobs ${mobs.length} (avg lvl ${avgLevel}) · petals ${player.instances.filter(p=>!p.broken).length}/${player.instances.length} · slots ${loadouts[activeLoadout].length}/${MAX_LOADOUT_SIZE}`;
}

function drawPickups(){
  const t = performance.now()/1000;
  for (const p of pickups){
    const pulse = 1 + Math.sin(t*4 + p.born*7)*0.14;
    const cx = p.x, cy = p.y;
    // essence — a plain white blob, pulsing gently, sized by rarity instead of a colored
    // capsule holding a petal icon (essence has no petal identity)
    ctx.save();
    ctx.translate(cx, cy); ctx.scale(pulse, pulse);
    drawEssenceIcon(ctx, p.rarity, 0, 0, 9, p.name);
    ctx.restore();

    // stacked-count badge — same dark/gold "×N" look as the craft menu's batch badge,
    // drawn outside the pulse transform so the text itself never gets squished
    if (p.count>1){
      ctx.save();
      ctx.translate(cx+11, cy+11);
      ctx.font = '900 10px "Segoe UI", sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const label = '×'+p.count;
      const w = ctx.measureText(label).width + 8;
      roundRect(-w/2, -7, w, 14, 6);
      ctx.fillStyle = '#1c2410'; ctx.fill();
      ctx.lineWidth = 1.6; ctx.strokeStyle = '#7d7328'; ctx.stroke();
      ctx.fillStyle = '#ffe27a';
      ctx.fillText(label, 0, 0.5);
      ctx.restore();
    }
  }
}

function drawInstance(inst){
  const def = PETAL_DEFS[inst.petal];
  let rad = inst.parts>1 ? 6 : 9;
  if (inst.broken) return; // reloading — shown on the hotbar slot instead, nothing drawn in-world
  if (inst.flying){
    ctx.save(); ctx.translate(inst.x, inst.y); ctx.rotate(Math.atan2(inst.vy,inst.vx));
    drawPetalIcon(ctx, inst.petal, 0, 0, rad, inst.tier);
    ctx.restore();
    return;
  }
  // shrink while being eaten into the flower, grow while emerging out of it
  let scale = 1;
  if (inst.eating) scale = 1 - easeInCubic(clamp(inst.eatT,0,1));
  else if (inst.spawnT < 1) scale = easeOutCubic(clamp(inst.spawnT,0,1));
  rad *= Math.max(0.08, scale);
  drawPetalIcon(ctx, inst.petal, inst.x, inst.y, rad, inst.tier);
}

function drawPlayer(){
  const flash = player.hurtFlash>0;
  ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, TAU);
  ctx.fillStyle = flash ? '#ff8a8a' : '#ffe25a';
  if (player.iframe>0 && Math.floor(player.iframe*20)%2===0) ctx.globalAlpha = 0.5;
  ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle='#d9b400'; ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#3a2e00';
  ctx.beginPath(); ctx.arc(player.x-8, player.y-4, 3.4, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(player.x+8, player.y-4, 3.4, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.lineWidth=2.4; ctx.strokeStyle='#3a2e00';
  ctx.arc(player.x, player.y+3, 7, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  entityHealthBar(player.x, player.y - player.r - 14, player.r*2, player.dispHealth/player.maxHealth, '#67e36a');
}

// other players, drawn from the live presence data streamed through Firebase. Their petals
// arrive as pre-computed world positions (see getPresenceState), so we just paint them.
function drawRemotePlayers(){
  const r = 26;
  for (const id in remotePlayers){
    const rp = remotePlayers[id];
    if (!rp || rp.x==null || rp.d) continue;   // rp.d: dead — don't render them for anyone
    const disp = remoteDisplay[id]; if (!disp) continue;
    const dx = disp.x, dy = disp.y;
    // skip anyone well off-screen — no point drawing them
    if (dx < cam.x-120 || dx > cam.x+W+120 || dy < cam.y-120 || dy > cam.y+H+120) continue;

    if (Array.isArray(rp.pts)) rp.pts.forEach((p,i)=>{
      const dp = disp.pts[i];
      drawPetalIcon(ctx, p[2], dp?dp.x:p[0], dp?dp.y:p[1], 9, p[3]);
    });

    ctx.beginPath(); ctx.arc(dx, dy, r, 0, TAU);
    ctx.fillStyle = rp.hf ? '#ff8a8a' : '#ffe25a';
    ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#d9b400'; ctx.stroke();
    ctx.fillStyle = '#3a2e00';
    ctx.beginPath(); ctx.arc(dx-8, dy-4, 3.4, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(dx+8, dy-4, 3.4, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.lineWidth=2.4; ctx.strokeStyle='#3a2e00';
    ctx.arc(dx, dy+3, 7, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();

    if (rp.mh) entityHealthBar(dx, dy - r - 14, r*2, clamp(rp.h/rp.mh,0,1), '#67e36a');

    ctx.font = '700 13px "Segoe UI", sans-serif'; ctx.textAlign='center'; ctx.textBaseline='bottom';
    const label = `${rp.n||'Player'} · Lv ${rp.lv||1}`;
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.strokeText(label, dx, dy - r - 22);
    ctx.fillStyle = '#fff'; ctx.fillText(label, dx, dy - r - 22);
  }
}

function drawMob(m){
  switch(m.type){
    case 'ladybug': return drawLadybug(m);
    case 'rock': return drawRock(m);
    case 'ant': return drawAnt(m);
    case 'bee': return drawBee(m);
    case 'spider': return drawSpider(m);
    case 'beetle': return drawBeetle(m);
  }
}
// death burst: the corpse quickly puffs up and fades out instead of just vanishing
function drawDyingMob(m){
  const t = clamp(m.dieT / DEATH_ANIM_DUR, 0, 1);
  const scale = 1 + easeOutCubic(t)*0.4;
  ctx.save();
  ctx.globalAlpha = 1 - t;
  ctx.translate(m.x, m.y); ctx.scale(scale, scale); ctx.translate(-m.x, -m.y);
  drawMob(m);
  ctx.restore();
}
function drawLadybug(m){
  ctx.save(); ctx.translate(m.x, m.y);
  const ang = Math.atan2(m.vy, m.vx); ctx.rotate(ang);
  ctx.beginPath(); ctx.arc(0,0,m.r,0,TAU);
  ctx.fillStyle = m.hurtFlash>0 ? '#ff9a9a' : m.color; ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle='#7a1109'; ctx.stroke();
  ctx.beginPath(); ctx.arc(m.r*0.72,0,m.r*0.42,0,TAU); ctx.fillStyle='#1a1a1a'; ctx.fill();
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(-m.r*0.5,0); ctx.lineTo(m.r*0.45,0); ctx.stroke();
  ctx.fillStyle='#1a1a1a';
  const sp=[[-0.35,-0.4],[-0.35,0.4],[0.1,-0.5],[0.1,0.5],[-0.65,0]];
  for(const [sx,sy] of sp){ ctx.beginPath(); ctx.arc(sx*m.r, sy*m.r, m.r*0.16, 0, TAU); ctx.fill(); }
  ctx.restore();
}
function drawRock(m){
  ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.spin);
  ctx.beginPath();
  const n=m.verts.length;
  for(let i=0;i<=n;i++){ const a=(i%n)/n*TAU, rr=m.r*m.verts[i%n];
    const px=Math.cos(a)*rr, py=Math.sin(a)*rr;
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
  ctx.closePath();
  ctx.fillStyle = m.hurtFlash>0 ? '#b8b8b8' : m.color; ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle='#5c5c63'; ctx.stroke();
  ctx.restore();
}
function drawAnt(m){
  ctx.save(); ctx.translate(m.x,m.y);
  ctx.rotate(Math.atan2(m.vy,m.vx)||0);
  ctx.fillStyle = m.hurtFlash>0 ? '#c98a5a' : m.color; ctx.strokeStyle='#2a1808'; ctx.lineWidth=2.2;
  ctx.beginPath(); ctx.ellipse(-m.r*0.55,0,m.r*0.5,m.r*0.4,0,0,TAU); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,m.r*0.32,0,TAU); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(m.r*0.55,0,m.r*0.38,0,TAU); ctx.fill(); ctx.stroke();
  ctx.strokeStyle='#1c1206'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(m.r*0.8,-0.05*m.r); ctx.lineTo(m.r*1.25,-0.35*m.r); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(m.r*0.8, 0.05*m.r); ctx.lineTo(m.r*1.25, 0.35*m.r); ctx.stroke();
  ctx.restore();
}
function drawBee(m){
  ctx.save(); ctx.translate(m.x,m.y);
  ctx.rotate(Math.atan2(m.vy,m.vx)||0);
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.beginPath(); ctx.ellipse(-2,-m.r*0.55,m.r*0.5,m.r*0.28,0.4,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-2, m.r*0.55,m.r*0.5,m.r*0.28,-0.4,0,TAU); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,0,m.r,m.r*0.72,0,0,TAU);
  ctx.fillStyle= m.hurtFlash>0?'#fff2a0':m.color; ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle='#8a6600'; ctx.stroke();
  ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=m.r*0.28;
  [-0.5,0,0.5].forEach(t=>{ ctx.beginPath(); ctx.moveTo(t*m.r, -m.r*0.65); ctx.lineTo(t*m.r, m.r*0.65); ctx.stroke(); });
  ctx.restore();
}
function drawSpider(m){
  ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(m.facing||0);
  ctx.strokeStyle='#15151a'; ctx.lineWidth=2.4; ctx.lineCap='round';
  for (let i=0;i<8;i++){
    const side = i<4 ? 1 : -1;
    const spread4 = ((i%4) - 1.5) * 0.42;              // -0.63,-0.21,0.21,0.63 rad
    const baseA = side*(Math.PI/2) + spread4;           // clustered to the left/right sides, not front/back
    const group = i%2;
    const phase = m.legPhase + group*Math.PI;
    const swing = Math.sin(phase);                    // -1..1 stride cycle
    const lift  = Math.max(0, Math.sin(phase));        // leg lifts while swinging forward
    const reach = m.r*(1.5 + swing*0.3);
    const spread = baseA + swing*0.24;
    const hipX = Math.cos(baseA)*m.r*0.62, hipY = Math.sin(baseA)*m.r*0.62;
    const footX = Math.cos(spread)*reach, footY = Math.sin(spread)*reach;
    const kneeX = (hipX+footX)/2 + Math.cos(baseA)*m.r*0.45*lift;
    const kneeY = (hipY+footY)/2 + Math.sin(baseA)*m.r*0.45*lift;
    ctx.beginPath(); ctx.moveTo(hipX,hipY); ctx.quadraticCurveTo(kneeX,kneeY,footX,footY); ctx.stroke();
  }
  ctx.beginPath(); ctx.arc(0,0,m.r,0,TAU);
  ctx.fillStyle = m.hurtFlash>0?'#55555f':m.color; ctx.fill();
  ctx.lineWidth=2.5; ctx.strokeStyle='#0c0c0f'; ctx.stroke();
  ctx.fillStyle='#ff3b3b';
  [[0.5,-0.15],[0.5,0.15],[0.36,-0.3],[0.36,0.3]].forEach(([ex,ey])=>{ ctx.beginPath(); ctx.arc(ex*m.r,ey*m.r,m.r*0.1,0,TAU); ctx.fill(); });
  ctx.restore();
}
function drawBeetle(m){
  ctx.save(); ctx.translate(m.x,m.y); ctx.rotate(Math.atan2(m.vy,m.vx)||0);
  ctx.fillStyle = m.hurtFlash>0 ? '#9184d6' : m.color;
  ctx.strokeStyle = '#160f2e'; ctx.lineWidth = 2.4;
  ctx.beginPath(); ctx.ellipse(0,0,m.r,m.r*0.72,0,0,TAU); ctx.fill(); ctx.stroke();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(-m.r*0.8,0); ctx.lineTo(m.r*0.55,0); ctx.stroke();
  ctx.fillStyle = '#160f2e';
  ctx.beginPath(); ctx.arc(m.r*0.75,0,m.r*0.3,0,TAU); ctx.fill();
  ctx.strokeStyle = '#160f2e'; ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(m.r*0.92,-m.r*0.14); ctx.lineTo(m.r*1.25,-m.r*0.34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(m.r*0.92, m.r*0.14); ctx.lineTo(m.r*1.25, m.r*0.34); ctx.stroke();
  ctx.restore();
}
function drawLevelLabel(m){
  ctx.save();
  ctx.font = '700 11px "Segoe UI", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  const y = m.y + m.r + 5;
  const label = 'Lv ' + m.level;
  ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.strokeText(label, m.x, y);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(label, m.x, y);
  ctx.restore();
}
function mobHealthBar(m){
  if (m.dispHealth >= m.maxHealth-0.5) return;
  entityHealthBar(m.x, m.y - m.r - 12, m.r*2, m.dispHealth/m.maxHealth, '#67e36a');
}
function entityHealthBar(cx, cy, w, frac, color){
  const h=6, x=cx-w/2;
  ctx.fillStyle='rgba(0,0,0,0.45)'; roundRect(x-2,cy-2,w+4,h+4,4); ctx.fill();
  ctx.fillStyle=color; roundRect(x,cy,w*clamp(frac,0,1),h,3); ctx.fill();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
/* ══════════════════════════════════════════
   PETAL ICONS  ·  one shared vector-shape renderer
   used both in-world (canvas) and in DOM panels (offscreen canvases)
   ══════════════════════════════════════════ */
function shadeColor(hex, pct){
  const n = parseInt(hex.slice(1),16);
  const amt = Math.round(255*pct/100);
  const r = clamp((n>>16)+amt,0,255), g = clamp(((n>>8)&255)+amt,0,255), b = clamp((n&255)+amt,0,255);
  return `rgb(${r},${g},${b})`;
}
// small white blobs that grow with rarity — a shared radius multiplier used both for
// ground pickups (world-space) and DOM icon boxes, so the two contexts stay visually consistent
const ESSENCE_RARITY_SCALE = { common:0.7, unusual:0.8, rare:0.9, epic:1.0, legendary:1.15, mythic:1.35 };
function drawEssenceIcon(ctx, rarity, cx, cy, baseR, name){
  const r = baseR * (ESSENCE_RARITY_SCALE[rarity]||1);
  const rc = RARITY_INFO[rarity].color;
  // signature essences fill with their own flavor color instead of plain white, so they read
  // as a distinct essence type at a glance while still keeping the rarity-colored ring
  const sig = name && name!=='base' ? SIGNATURE_ESSENCES[name] : null;
  ctx.save(); ctx.translate(cx,cy);
  ctx.beginPath(); ctx.arc(0,0,r,0,TAU);
  ctx.fillStyle = sig ? sig.color : '#fdfdfd'; ctx.fill();
  ctx.lineWidth = Math.max(1.4, r*0.22); ctx.strokeStyle = rc; ctx.stroke();
  ctx.restore();
}
// tier 2+ petals grow a visible white/gold aura (and tier 6 gains 4 slowly-spinning sparkles),
// so a maxed-out petal reads as visibly stronger even though the container color is fixed by rarity
function drawTierAura(ctx, r, tier){
  if (!tier || tier<=1) return;
  const t = clamp((tier-1)/5, 0, 1); // 0 at tier1 .. 1 at tier6
  ctx.save();
  ctx.globalAlpha = 0.55 + t*0.45;
  ctx.lineWidth = Math.max(1, r*0.1 + r*0.18*t);
  ctx.strokeStyle = tier>=6 ? '#fff9c4' : '#ffffff';
  ctx.shadowColor = tier>=5 ? '#ffe27a' : '#ffffff';
  ctx.shadowBlur = 2 + t*9;
  ctx.beginPath(); ctx.arc(0,0, r*(1.14+t*0.12), 0, TAU); ctx.stroke();
  ctx.restore();
  if (tier>=6){
    const spin = (performance.now()/1000) * 0.6;
    ctx.save(); ctx.rotate(spin);
    ctx.fillStyle = '#fff9c4';
    for (let i=0;i<4;i++){
      const a = i/4*TAU, sx = Math.cos(a)*r*1.35, sy = Math.sin(a)*r*1.35, s = r*0.2;
      ctx.save(); ctx.translate(sx,sy);
      ctx.beginPath();
      ctx.moveTo(0,-s); ctx.lineTo(s*0.25,-s*0.25); ctx.lineTo(s,0); ctx.lineTo(s*0.25,s*0.25);
      ctx.lineTo(0,s); ctx.lineTo(-s*0.25,s*0.25); ctx.lineTo(-s,0); ctx.lineTo(-s*0.25,-s*0.25);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }
}
function drawPetalIcon(ctx, id, cx, cy, r, tier){
  if (id==null) return; // empty slot — nothing to draw
  const def = PETAL_DEFS[id];
  const shape = def.shape || 'circle';
  const col = def.color;
  ctx.save(); ctx.translate(cx,cy);
  ctx.lineWidth = Math.max(1.3, r*0.16);
  ctx.strokeStyle = shadeColor(col,-38);
  ctx.fillStyle = col;
  switch(shape){
    case 'circle':
      ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill(); ctx.stroke();
      break;
    case 'ring':
      ctx.beginPath(); ctx.arc(0,0,r*0.72,0,TAU); ctx.lineWidth=Math.max(1.6,r*0.3); ctx.stroke();
      break;
    case 'leaf':
      ctx.beginPath();
      ctx.moveTo(0,-r); ctx.quadraticCurveTo(r*0.95,0,0,r); ctx.quadraticCurveTo(-r*0.95,0,0,-r); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,-r*0.65); ctx.lineTo(0,r*0.65);
      ctx.lineWidth=Math.max(1,r*0.11); ctx.strokeStyle=shadeColor(col,-42); ctx.stroke();
      break;
    case 'triangleSide':
      // equilateral triangle pointing sideways (+x), like a stinger aimed forward
      ctx.beginPath();
      ctx.moveTo(r, 0); ctx.lineTo(-r*0.5, r*0.866); ctx.lineTo(-r*0.5, -r*0.866); ctx.closePath();
      ctx.fill(); ctx.stroke();
      break;
    case 'drop':
      ctx.beginPath();
      ctx.moveTo(0,-r);
      ctx.quadraticCurveTo(r*0.75,-r*0.3, r*0.65,r*0.35);
      ctx.quadraticCurveTo(r*0.35,r, 0,r*0.92);
      ctx.quadraticCurveTo(-r*0.35,r, -r*0.65,r*0.35);
      ctx.quadraticCurveTo(-r*0.75,-r*0.3, 0,-r);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'web':
      ctx.lineWidth=Math.max(1.2,r*0.14); ctx.strokeStyle=shadeColor(col,-15);
      for(let i=0;i<6;i++){ const a=i/6*TAU; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); ctx.stroke(); }
      for(let k=1;k<=2;k++){ ctx.beginPath(); ctx.arc(0,0,r*k/2.4,0,TAU); ctx.stroke(); }
      break;
    case 'pincer':
      ctx.lineWidth=Math.max(1.8,r*0.3); ctx.strokeStyle=col; ctx.lineCap='round';
      ctx.beginPath(); ctx.arc(-r*0.05,0,r*0.72,-0.75,0.75); ctx.stroke();
      ctx.beginPath(); ctx.arc(r*0.05,0,r*0.72,Math.PI-0.75,Math.PI+0.75); ctx.stroke();
      break;
    case 'cluster':
      [[0,-r*0.5],[r*0.48,r*0.32],[-r*0.48,r*0.32]].forEach(([ox,oy])=>{
        ctx.beginPath(); ctx.arc(ox,oy,r*0.52,0,TAU); ctx.fill(); ctx.stroke();
      });
      break;
    case 'dust':
      [[0,0,0.5],[r*0.48,-r*0.32,0.3],[-r*0.48,-r*0.18,0.28],[r*0.12,r*0.48,0.26]].forEach(([ox,oy,rr])=>{
        ctx.beginPath(); ctx.arc(ox,oy,r*rr,0,TAU); ctx.fill(); ctx.stroke();
      });
      break;
    case 'tulipflower':
      ctx.beginPath();
      ctx.moveTo(0,r);
      ctx.quadraticCurveTo(-r*0.85,r*0.05,-r*0.5,-r*0.75);
      ctx.quadraticCurveTo(-r*0.05,-r*0.4,0,-r*0.78);
      ctx.quadraticCurveTo(r*0.05,-r*0.4,r*0.5,-r*0.75);
      ctx.quadraticCurveTo(r*0.85,r*0.05,0,r);
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    case 'rock': {
      // regular pentagon
      const n=5; ctx.beginPath();
      for(let i=0;i<=n;i++){ const a=-Math.PI/2 + i*(TAU/n); const px=Math.cos(a)*r, py=Math.sin(a)*r;
        i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      break;
    }
    case 'eye':
      ctx.beginPath(); ctx.ellipse(0,0,r,r*0.6,0,0,TAU); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#241033'; ctx.beginPath(); ctx.arc(0,0,r*0.34,0,TAU); ctx.fill();
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-r*0.1,-r*0.1,r*0.1,0,TAU); ctx.fill();
      break;
    case 'crescent':
      ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill();
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath(); ctx.arc(r*0.42,-r*0.12,r*0.82,0,TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.lineWidth=Math.max(1.3,r*0.16); ctx.strokeStyle=shadeColor(col,-38); ctx.stroke();
      break;
    default:
      ctx.beginPath(); ctx.arc(0,0,r,0,TAU); ctx.fill(); ctx.stroke();
  }
  drawTierAura(ctx, r, tier);
  ctx.restore();
}
function makeIconCanvas(id, size){
  const cv = document.createElement('canvas'); cv.width=size; cv.height=size;
  drawPetalIcon(cv.getContext('2d'), id, size/2, size/2, size*0.42);
  return cv;
}
// Reuses the real mob draw functions for gallery icons by briefly redirecting the
// global `ctx` to an offscreen canvas — avoids a second, drifting copy of each mob's art.
function drawMobIcon(mobKey, targetCtx, cx, cy, r){
  const def = MOB_DEFS[mobKey];
  const fake = { x:cx, y:cy, r, vx:0.6, vy:0.25, color:def.color, hurtFlash:0, legPhase:0.8, facing:0.35 };
  if (mobKey==='rock'){ fake.spin=0.25; fake.verts=[1,0.92,1.05,0.9,1.02,0.88,1.06]; }
  const saved = ctx; ctx = targetCtx;
  switch(mobKey){
    case 'ladybug': drawLadybug(fake); break;
    case 'rock': drawRock(fake); break;
    case 'ant': drawAnt(fake); break;
    case 'bee': drawBee(fake); break;
    case 'spider': drawSpider(fake); break;
    case 'beetle': drawBeetle(fake); break;
  }
  ctx = saved;
}

const loadoutIconCache = {};
function renderLoadoutBar(){
  const bar = document.getElementById('loadoutBar');
  if (bar.dataset.built !== String(loadouts[0].length)){
    bar.innerHTML = [0,1].map(li => `
      <div class="lbrow" data-li="${li}">
        ${loadouts[li].map((_,i)=>`
          <div class="lbslot" draggable="true" data-li="${li}" data-i="${i}" onclick="quickSwapSlot(${i})"
            ondragstart="dragSlotStart(event,${li},${i})"
            ondragover="allowDrop(event)" ondragleave="dragLeaveSlot(event)" ondrop="dropOnSlot(event,${li},${i})">
            <canvas class="lbicon" width="30" height="30"></canvas><div class="lbcover"></div><div class="lbname"></div><div class="lbtier"></div>
          </div>`).join('')}
      </div>`).join('');
    bar.dataset.built = String(loadouts[0].length);
  }
  [0,1].forEach(li=>{
    const row = bar.children[li];
    row.classList.toggle('active', activeLoadout===li);
    loadouts[li].forEach((slot,i)=>{
      const el = row.children[i];
      if (slot.petal==null){
        el.style.setProperty('--rc', '#3a3a3a');
        const lbnameEl = el.querySelector('.lbname');
        lbnameEl.textContent = '';
        lbnameEl.classList.remove('long');
        el.querySelector('.lbcover').style.height = '0%';
        el.querySelector('.lbtier').textContent = '';
        const cacheKey = 'empty';
        const ck = 'li'+li+'@'+i;
        if (loadoutIconCache[ck] !== cacheKey){
          const cv = el.querySelector('.lbicon'), c = cv.getContext('2d');
          c.clearRect(0,0,30,30);
          loadoutIconCache[ck] = cacheKey;
        }
        return;
      }
      const def = PETAL_DEFS[slot.petal];
      const parts = def.parts||1;
      // slot fill = the least-ready part: reload progress while broken, current HP fraction while alive
      // (only meaningful for the currently-active loadout, since only it has live instances)
      let readiness = 1;
      if (li===activeLoadout){
        const maxH = pscale(def,'health',slot.petal,slot.tier);
        for (let p=0;p<parts;p++){
          const inst = player.instances.find(x=>x.slot===i && x.partIndex===p);
          if (!inst) continue;
          const r = inst.broken ? clamp(1 - inst.regenT/def.reload, 0, 1) : (maxH===Infinity ? 1 : maxH>0 ? clamp(inst.health/maxH, 0, 1) : 1);
          readiness = Math.min(readiness, r);
        }
      }
      const rc = RARITY_INFO[PETAL_RARITY[slot.petal]].color;
      el.style.setProperty('--rc', rc);
      const lbnameEl = el.querySelector('.lbname');
      lbnameEl.textContent = def.name;
      lbnameEl.classList.toggle('long', def.name.length > 7);
      el.querySelector('.lbcover').style.height = ((1-readiness)*100)+'%';
      el.querySelector('.lbtier').textContent = toRoman(slot.tier);
      // tier 6's aura includes a rotating sparkle, so its icon can't be cache-skipped like
      // the others or it'd freeze mid-spin — always redraw at tier 6
      const cacheKey = slot.petal+'@'+slot.tier;
      const ck = 'li'+li+'@'+i;
      if (loadoutIconCache[ck] !== cacheKey || slot.tier>=6){
        const cv = el.querySelector('.lbicon'), c = cv.getContext('2d');
        c.clearRect(0,0,30,30); drawPetalIcon(c, slot.petal, 15, 15, 11, slot.tier);
        loadoutIconCache[ck] = cacheKey;
      }
    });
  });
}

const CRAFT_SPIN_DUR = 2.2;   // seconds the pentagon spins/pulses while "attempting"

function togglePanel(name){ openPanelName===name ? closePanel() : openPanel(name); }
function openPanel(name){
  openPanelName = name; craftSelection = null; craftBulk = false; craftPhase = 'idle'; craftResult = null;
  forgeMenu = null;
  forgeSelection = null; forgeBulk = false; forgePhase = 'idle'; forgeResult = null;
  pforgeSelection = null; pforgeBulk = false; pforgePhase = 'idle'; pforgeResult = null;
  eforgeMode = 'sig'; eforgeSigId = null; eforgeFromRarity = null; eforgeToRarity = null; eforgePhase = 'idle'; eforgeResult = null;

// opens the Forge panel straight into a given sub-menu (or the hub chooser if menu is null) —
// used by the Y/C hotkeys and by every "back" link inside the sub-menus
function openForgeMenu(menu){
  if (openPanelName==='forge' && forgeMenu===menu){ closePanel(); return; }
  openPanel('forge');
  forgeMenu = menu;
  renderPanel();
}
function closePanel(){
  openPanelName = null;
  document.getElementById('panelBackdrop').classList.remove('show');
  hideTip();
}
function renderPanel(){
  const root = document.getElementById('panelRoot');
  hideTip();
  // re-rendering replaces the whole panel-body, which would otherwise reset its scroll
  // position back to the top every time — preserve it across the rebuild
  const oldBody = root.querySelector('.panel-body');
  const scrollTop = oldBody ? oldBody.scrollTop : 0;
  root.classList.remove('gallery','inventory','wide','craft','forge');
  if (openPanelName==='inventory'){ root.classList.add('inventory'); root.innerHTML = renderInventoryPanel(); }
  else if (openPanelName==='mob'){ root.classList.add('gallery','wide'); root.innerHTML = renderMobPanel(); }
  else if (openPanelName==='petal'){ root.classList.add('gallery'); root.innerHTML = renderPetalPanel(); }
  else if (openPanelName==='craft'){ root.classList.add('gallery','craft'); root.innerHTML = renderCraftPanel(); }
  else if (openPanelName==='forge'){ root.classList.add('gallery','craft','forge'); root.innerHTML = renderForgePanel(); }
  else if (openPanelName==='essence'){ root.classList.add('gallery'); root.innerHTML = renderEssencePanel(); }
  paintIcons(root);
  const newBody = root.querySelector('.panel-body');
  if (newBody && scrollTop) newBody.scrollTop = scrollTop;
}
function paintIcons(root){
  root.querySelectorAll('canvas.picn[data-petal]').forEach(cv=>{
    const ctx2 = cv.getContext('2d'), s = cv.width;
    ctx2.clearRect(0,0,s,s);

  });
  root.querySelectorAll('canvas.gicon[data-mob]').forEach(cv=>{
    const ctx2 = cv.getContext('2d'), s = cv.width;
    ctx2.clearRect(0,0,s,s);
    drawMobIcon(cv.dataset.mob, ctx2, s/2, s/2, s*0.32);

  root.querySelectorAll('canvas.eicon[data-rarity]').forEach(cv=>{
    const ctx2 = cv.getContext('2d'), s = cv.width;
    ctx2.clearRect(0,0,s,s);
    drawEssenceIcon(ctx2, cv.dataset.rarity, s/2, s/2, s*0.28, cv.dataset.name);

/* ── floating detail tooltip shared by both galleries ── */

/* ── Inventory ── */
function setInvStack(el){ invStackMode = el.checked; renderPanel(); }
function setInvSearch(el){ invSearch = el.value.toLowerCase(); renderPanel(); }
function dragPetalStart(e, petal, tier){ dragData = {type:'inv', petal, tier}; e.dataTransfer.effectAllowed = 'move'; }
function dragSlotStart(e, li, i){ dragData = {type:'slot', li, i}; e.dataTransfer.effectAllowed = 'move'; }
function allowDrop(e){ e.preventDefault(); e.currentTarget.classList.add('dragover'); }
function dragLeaveSlot(e){ e.currentTarget.classList.remove('dragover'); }
function dropOnSlot(e, li, i){
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  if (!dragData) return;
  const container = e.currentTarget.closest('#loadoutBar, .panel');
  if (dragData.type==='inv'){
    const {petal, tier} = dragData;
    dragData = null;
    const k = invKey(petal, tier);
    if (!inventory[k] || inventory[k]<=0) return;
    const old = loadouts[li][i];
    if (old.petal!=null){ const ok=invKey(old.petal,old.tier); inventory[ok]=(inventory[ok]||0)+1; }
    inventory[k]--;
    loadouts[li][i] = { petal, tier };
    if (li===activeLoadout) rebuildInstances();
    renderPanel();
    scheduleSave();
  } else if (dragData.type==='slot'){
    const {li:fli, i:fi} = dragData;
    dragData = null;
    if (fli===li && fi===i) return;
    // the real slots keep showing their old contents until the flying icons actually arrive —
    // swapping the data (and thus the DOM) immediately made them look like they'd already
    // teleported before the animation caught up
    const rectFrom = slotRect(container, fli, fi), rectTo = slotRect(container, li, i);
    const a = loadouts[li][i], b = loadouts[fli][fi];
    flySwapIcon(rectFrom, rectTo, b.petal, b.tier);
    flySwapIcon(rectTo, rectFrom, a.petal, a.tier);
    setTimeout(()=>{
      loadouts[li][i] = b;
      loadouts[fli][fi] = a;
      if (li===activeLoadout || fli===activeLoadout) rebuildInstances();
      renderPanel();
      scheduleSave();
    }, FLY_SWAP_DELAY);
  } else {
    dragData = null;
  }
}
// dragging a hotbar slot onto the inventory panel unequips it back into your inventory —
// the mirror image of dragging an inventory petal onto a hotbar slot to equip it
function dropOnInventory(e){
  e.preventDefault(); e.currentTarget.classList.remove('dragover');
  if (!dragData || dragData.type!=='slot'){ dragData = null; return; }
  const {li, i} = dragData;
  dragData = null;
  const old = loadouts[li][i];
  if (old.petal==null) return;   // already empty, nothing to unequip
  const ok = invKey(old.petal, old.tier);
  inventory[ok] = (inventory[ok]||0) + 1;
  loadouts[li][i] = { petal:null, tier:1 };
  if (li===activeLoadout) rebuildInstances();
  renderPanel();
  scheduleSave();
}
// a stray/unrecognized petal key in `inventory` (e.g. from an old save format, or a petal
// that no longer exists) used to throw partway through rendering the panel — which left the
// DOM in whatever state it was in before the crash, looking like the panel had collapsed to
// just its header bar. Every lookup below now goes through this guard instead of assuming
// PETAL_DEFS[petal] exists; unrecognized keys are dropped from inventory so this self-heals.
function validInventoryKeys(){
  return Object.keys(inventory).filter(k=>{
    if (inventory[k]<=0) return false;
    const petal = k.split('|')[0];
    if (!PETAL_DEFS[petal]){ delete inventory[k]; return false; }
    return true;
  });
}
function renderInventoryPanel(){
  const matches = petal => PETAL_DEFS[petal].name.toLowerCase().includes(invSearch);
  let body;
  if (invStackMode){
    const merged = {};
    validInventoryKeys().forEach(k=>{
      const [petal,tierStr] = k.split('|'); const tier = +tierStr;
      if (!matches(petal)) return;
      if (!merged[petal]) merged[petal] = { count:0, bestTier:tier };
      merged[petal].count += inventory[k];
      if (tier > merged[petal].bestTier) merged[petal].bestTier = tier;
    });
    const cards = Object.keys(merged).sort(byRarityThenName).map(petal=>{
      const {count,bestTier} = merged[petal], def = PETAL_DEFS[petal];
      const rc = RARITY_INFO[PETAL_RARITY[petal]].color;
      return `<div class="istack" draggable="true" ondragstart="dragPetalStart(event,'${petal}',${bestTier})" style="--rc:${rc}">
        <div class="pcount">x${count}</div>
        <div class="ptier">${toRoman(bestTier)}</div>
        <canvas class="picn" data-petal="${petal}" data-tier="${bestTier}" width="40" height="40"></canvas>
        <div class="pname ${longNameCls(def.name)}">${def.name}</div>
      </div>`;
    }).join('');
    body = `<div class="inv-grid">${cards || '<div class="inv-empty">No petals match.</div>'}</div>`;
  } else {
    const sections = [...RARITIES].reverse().map(rarity=>{
      const keys = validInventoryKeys().filter(k=>{
        const [petal] = k.split('|');
        return PETAL_RARITY[petal]===rarity && matches(petal);
      }).sort((a,b)=>{
        const [pa,ta]=a.split('|'), [pb,tb]=b.split('|');
        return pa===pb ? (+ta)-(+tb) : pa.localeCompare(pb);
      });
      if (!keys.length) return '';
      const rc = RARITY_INFO[rarity].color;
      const cards = keys.map(k=>{
        const [petal,tierStr] = k.split('|'); const tier = +tierStr; const def = PETAL_DEFS[petal];
        return `<div class="istack" draggable="true" ondragstart="dragPetalStart(event,'${petal}',${tier})" style="--rc:${rc}">
          <div class="pcount">x${inventory[k]}</div>
          <div class="ptier">${toRoman(tier)}</div>
          <canvas class="picn" data-petal="${petal}" data-tier="${tier}" width="40" height="40"></canvas>
          <div class="pname ${longNameCls(def.name)}">${def.name}</div>
        </div>`;
      }).join('');
      return `<div class="inv-section-head" style="--rc:${rc}">${RARITY_INFO[rarity].name}</div><div class="inv-grid">${cards}</div>`;
    }).join('');
    body = sections || '<div class="inv-empty">No petals collected yet — go defeat some mobs!</div>';
  }

  return `
    <div class="panel-head"><h2>Inventory</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="panel-body inv-dropzone" ondragover="allowDrop(event)" ondragleave="dragLeaveSlot(event)" ondrop="dropOnInventory(event)">
      <div class="inv-sub">Drag a petal to equip it — drag a hotbar slot here to unequip it</div>
      <div class="inv-toolbar">
        <label><input type="checkbox" ${invStackMode?'checked':''} onchange="setInvStack(this)"> Stack</label>
        <input class="inv-search" type="text" placeholder="Search petals..." value="${invSearch}" oninput="setInvSearch(this)">
      </div>
      ${body}
    </div>`;
}

/* ── Essence — read-only gallery, same grid as the Petal Gallery: one row per essence flavor
     (Base first, then each signature essence), columns = rarity common→mythic. Purely a
     display of what you're holding — you don't drag or spend from here (that's the Forge). ── */
function essenceCell(rarity, name){
  // signature essences don't exist below their startRarity — draw those columns as impossible
  if (name!=='base' && RARITIES.indexOf(rarity) < RARITIES.indexOf(SIGNATURE_ESSENCES[name].startRarity))
    return `<div class="gcell impossible"></div>`;
  const cnt = essence[essenceKey(rarity, name)]||0;
  const cntText = cnt>9999 ? (cnt/1000).toFixed(0)+'k' : cnt>999 ? (cnt/1000).toFixed(1)+'k' : cnt;
  return `<div class="gcell ${cnt?'':'short'}" style="--rc:${RARITY_INFO[rarity].color}">
    <canvas class="eicon" data-rarity="${rarity}" data-name="${name}" width="40" height="40"></canvas>
    <div class="gc-count">x${cntText}</div>
  </div>`;
}
function renderEssencePanel(){
  const flavors = ['base', ...Object.keys(SIGNATURE_ESSENCES)];
  const rows = flavors.map(name=>{
    const cells = RARITIES.map(rarity=>essenceCell(rarity, name)).join('');
    return `<div class="grow">${cells}</div>`;
  }).join('');
  return `
    <div class="panel-head"><h2>Essence</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="panel-body">${rows}</div>`;
}

/* ── Mob Gallery — grid of mob types × level columns ── */
function renderMobPanel(){
  const rows = Object.keys(MOB_DEFS).map(mobKey=>{
    const cells = MOB_LEVELS.map(lvl=>{
      if (!killedMobs.has(mobKey+'|'+lvl)) return `<div class="gcell locked">❓</div>`;
      return `<div class="gcell" style="--rc:#8d8256" onclick="showMobTip(event,'${mobKey}',${lvl})">
        <canvas class="gicon" data-mob="${mobKey}" width="40" height="40"></canvas>
      </div>`;
    }).join('');
    return `<div class="grow mobgrow">${cells}</div>`;
  }).join('');
  return `
    <div class="panel-head"><h2>Mob Gallery</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="panel-body">${rows}</div>`;
}
// has this petal been obtained at any tier? (only forging ever sets discoveredPetals now)
function petalAnyDiscovered(petal){ return TIERS.some(t=>discoveredPetals.has(invKey(petal,t))); }
// zone-jackpot rows only — the hidden jackpots (5%/1%/0.1%) are deliberately never shown here
function essenceRateCard(rarity, pct, zoneNum, subTier, name){
  const sig = name && name!=='base' ? SIGNATURE_ESSENCES[name] : null;
  const activeTiers = zoneJackpotTiers(rarity).filter(t => t.zone <= zoneNum);
  const jackpotLines = activeTiers.slice().reverse().map(t=>{
    const zonesPast = zoneNum - t.zone;
    const chance = zonesPast===0 ? MULTICOPY_CHANCE_NEW[subTier-1] : MULTICOPY_CHANCE_RISEN[subTier-1];
    return `<div class="rc-multi">×${t.mult}: ${chance}%</div>`;
  }).join('');
  return `<div class="ratecard" style="--rc:${RARITY_INFO[rarity].color}">
    <canvas class="eicon" data-rarity="${rarity}" data-name="${name||'base'}" width="30" height="30"></canvas>
    <div class="rc-name">${sig ? sig.name : 'Base'} Essence</div>
    <div class="rc-pct">${pct}%</div>
    ${jackpotLines}
  </div>`;
}
function showMobTip(e, mobKey, level){
  e.stopPropagation();
  const def = MOB_DEFS[mobKey], scale = mobLevelScale(level), table = DROP_RATE_TABLE[level] || {};
  const zt = zoneAndSubTierForLevel(level) || {zoneNum:0, subTier:1};
  // one row per essence type the mob can drop (generic rarities + its signature essences),
  // sorted low to high rarity so the row order tracks how hard each essence is to get
  const rows = [
    ...def.drops.filter(rarity => (table[rarity]||0) > 0).map(rarity => ({ rarity, pct:table[rarity], name:'base' })),
    ...(def.sigDrops||[]).flatMap(sigId => sigEssenceRarities(sigId).map(rarity =>
      ({ rarity, pct:sigEssenceDropPct(sigId, level, rarity), name:sigId })))
      .filter(row => row.pct > 0),
  ].sort((a,b) => RARITIES.indexOf(a.rarity) - RARITIES.indexOf(b.rarity));
  const cards = rows.map(row => essenceRateCard(row.rarity, row.pct, zt.zoneNum, zt.subTier, row.name)).join('');
  const html = `
    <div class="tip-name">${def.name}</div>
    <div class="tip-rar" style="color:#ffe27a">Level ${level}</div>
    <div class="tip-desc">${behaviorText(def, mobKey, level)}</div>
    <div class="tip-stats">HP ${Math.round(def.health*scale).toLocaleString()} · DMG ${Math.round(def.contactDmg*scale).toLocaleString()} · XP ${xpForKill(mobKey,level).toLocaleString()}${def.aggroRange!=null?` · Aggro ${Math.round(def.aggroRange*aggroRangeScale(level))}px`:''}</div>
    <div class="ratecard-row">${cards}</div>`;
  positionTip(e, html);
}

/* ── Petal Gallery — one cell per petal type, colored by its fixed rarity ── */
/* ── Petal Gallery — same grid format as the Mob Gallery: rows = petal type, columns = tier ── */
function renderPetalPanel(){
  const petalsSorted = Object.keys(PETAL_DEFS).filter(k=>k!=='basic').sort(byRarityThenNameAsc);
  const rows = petalsSorted.map(petalKey=>{
    const rc = RARITY_INFO[PETAL_RARITY[petalKey]].color;
    const cells = TIERS.map(tier=>{
      if (!tierPossible(petalKey, tier)) return `<div class="gcell impossible"></div>`;
      if (!discoveredPetals.has(invKey(petalKey,tier))) return `<div class="gcell locked" style="--rc:${rc}">❓</div>`;
      return `<div class="gcell" style="--rc:${rc}" onclick="showPetalTip(event,'${petalKey}',${tier})">

      </div>`;
    }).join('');
    return `<div class="grow">${cells}</div>`;

    <div class="panel-head"><h2>Petal Gallery</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="panel-body">${rows}</div>`;
