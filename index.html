<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florr Clone — Base Engine</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:#1b7a3a;font-family:'Segoe UI',system-ui,sans-serif;}
  canvas{display:block;cursor:crosshair;}
  #hud{position:fixed;top:12px;left:12px;color:#fff;font-size:13px;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.5);line-height:1.5;pointer-events:none;}
  #hud b{color:#ffe27a;}
  #devBtn{position:fixed;top:12px;right:12px;z-index:25;padding:7px 12px;border-radius:8px;border:2px solid #7a1414;
    background:#e04b4b;color:#fff;font-weight:800;font-size:12px;cursor:pointer;box-shadow:0 3px 0 #7a1414;}
  #devBtn:hover{filter:brightness(1.1);}
  #devBtn:active{transform:translateY(2px);box-shadow:none;}
  #undevBtn{position:fixed;top:76px;right:12px;z-index:25;padding:7px 12px;border-radius:8px;border:2px solid #7a1414;
    background:#6b6b6b;color:#fff;font-weight:800;font-size:12px;cursor:pointer;box-shadow:0 3px 0 #3a3a3a;}
  #undevBtn:hover{filter:brightness(1.1);}
  #undevBtn:active{transform:translateY(2px);box-shadow:none;}
  #levelHud{position:fixed;bottom:14px;right:14px;z-index:20;display:flex;flex-direction:column;align-items:flex-end;gap:5px;pointer-events:none;}
  #levelHudText{background:rgba(15,32,58,.82);color:#dfe9ff;font-size:12px;font-weight:800;padding:4px 12px;border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.35);text-shadow:0 1px 1px rgba(0,0,0,.4);}
  #levelHudBar{position:relative;width:230px;height:27px;background:#16233a;border:2px solid #0a1424;border-radius:14px;overflow:hidden;box-shadow:0 3px 8px rgba(0,0,0,.4);}
  #levelHudFill{position:absolute;left:0;top:0;bottom:0;width:0%;background:linear-gradient(#f3f79a,#d3dc4a);transition:width .3s ease;}
  #levelHudLabel{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;height:100%;
    font-size:13px;font-weight:900;color:#20260a;text-shadow:0 1px 0 rgba(255,255,255,.35);}
  #dead{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0);color:#fff;opacity:0;pointer-events:none;transition:opacity .5s ease,background .5s ease;}
  #dead.show{opacity:1;background:rgba(0,0,0,.55);pointer-events:auto;}
  #dead h1{font-size:44px;margin-bottom:14px;transform:translateY(14px) scale(.96);transition:transform .5s cubic-bezier(.2,.8,.3,1);}
  #dead.show h1{transform:translateY(0) scale(1);}
  #dead button{margin-top:10px;padding:10px 22px;border:none;border-radius:10px;background:#ffe27a;color:#222;font-weight:800;font-size:16px;cursor:pointer;opacity:0;transform:translateY(14px);transition:opacity .5s ease .15s,transform .5s cubic-bezier(.2,.8,.3,1) .15s;}
  #dead.show button{opacity:1;transform:translateY(0);}

  /* ── login/signup overlay — shown on load until authenticated ── */
  #authScreen{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(10,14,10,.88);}
  #authScreen.show{display:flex;}
  .auth-card{width:280px;background:#1c2410;border:3px solid #7d7328;border-radius:14px;padding:20px;color:#f2edcf;box-shadow:0 14px 32px rgba(0,0,0,.5);}
  .auth-card h1{font-size:20px;font-weight:900;margin-bottom:14px;text-align:center;color:#ffe27a;}
  .auth-card input{width:100%;padding:9px 10px;margin-bottom:10px;border-radius:8px;border:2px solid #5c5430;background:#2a2f18;color:#f2edcf;font-size:14px;box-sizing:border-box;}
  .auth-card input:focus{outline:none;border-color:#ffe27a;}
  .auth-actions{display:flex;gap:8px;margin-top:4px;}
  .auth-actions button{flex:1;padding:9px 0;border-radius:8px;border:2px solid #5c5430;background:#e8dc8a;color:#3a3418;font-weight:900;font-size:13px;cursor:pointer;box-shadow:0 3px 0 #5c5430;}
  .auth-actions button:hover{filter:brightness(1.08);}
  .auth-actions button:disabled{opacity:.5;cursor:default;box-shadow:none;}
  .auth-error{margin-top:10px;font-size:12px;font-weight:700;color:#ff9a9a;text-align:center;min-height:16px;}
  #logoutBtn{position:fixed;top:44px;right:12px;z-index:25;padding:6px 12px;border-radius:8px;border:2px solid #2a5c1f;
    background:#4f93d6;color:#fff;font-weight:800;font-size:12px;cursor:pointer;box-shadow:0 3px 0 #2a5c1f;}
  #logoutBtn:hover{filter:brightness(1.1);}

  /* ── loadout bar ── */
  #loadoutBar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:6px;z-index:20;}
  .lbrow{display:flex;gap:8px;align-items:center;justify-content:center;transition:opacity .15s,gap .15s;opacity:.65;}
  .lbrow.active{opacity:1;}
  .lbslot{position:relative;width:58px;height:58px;border-radius:12px;background:var(--rc,#7eef6d);border:3px solid color-mix(in srgb, var(--rc,#7eef6d) 55%, black);overflow:hidden;box-shadow:0 3px 0 rgba(0,0,0,.35);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;cursor:pointer;transition:width .15s,height .15s;}
  .lbslot.dragover{box-shadow:0 0 0 3px #ffe27a;}
  .inv-dropzone.dragover{outline:3px dashed #ffe27a; outline-offset:-3px;}
  .lbslot .lbicon{width:32px;height:32px;position:relative;z-index:2;}
  .lbslot .lbname{position:relative;z-index:2;font-size:10px;font-weight:800;color:#fff;margin-top:-2px;line-height:1;}
  .lbslot .lbcover{position:absolute;top:0;left:0;right:0;height:0%;background:rgba(4,10,18,.75);transition:height .12s linear;z-index:1;}
  /* the inactive row is the "reserve" set — shown small, click a slot to swap it with the active row */
  .lbrow:not(.active){gap:5px;}
  .lbrow:not(.active) .lbslot{width:34px;height:34px;border-radius:9px;}
  .lbrow:not(.active) .lbicon{width:19px;height:19px;}
  .lbrow:not(.active) .lbname{display:none;}
  .lbrow:not(.active) .lbtier{display:none;}

  /* ── panels · small, corner-anchored, never block the game ── */
  #panelBackdrop{position:fixed;inset:0;display:none;z-index:50;pointer-events:none;}
  #panelBackdrop.show{display:block;}
  .panel{position:fixed;top:64px;left:12px;pointer-events:auto;
    display:flex;flex-direction:column;max-height:64vh;
    border-radius:14px;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;box-shadow:0 14px 32px rgba(0,0,0,.45);}
  .panel.inventory, .panel.craft, .panel.forge{top:auto;bottom:14px;}
  .panel-head{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;padding:8px 10px;z-index:5;}
  .panel-head h2{font-size:16px;font-weight:900;color:#fff;letter-spacing:.02em;
    text-shadow:-1.5px -1.5px 0 rgba(0,0,0,.5),1.5px -1.5px 0 rgba(0,0,0,.5),-1.5px 1.5px 0 rgba(0,0,0,.5),1.5px 1.5px 0 rgba(0,0,0,.5);}
  .panel-head .x{background:#e04b4b;border:2px solid #7a1414;color:#fff;border-radius:8px;width:24px;height:24px;font-weight:900;cursor:pointer;font-size:12px;box-shadow:0 2px 0 #7a1414;}
  .panel-head .x:hover{filter:brightness(1.12);}
  .panel-body{overflow:auto;flex:1;min-height:0;padding:6px;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.4) rgba(255,255,255,.15);}
  .panel-body::-webkit-scrollbar{width:10px;}
  .panel-body::-webkit-scrollbar-track{background:rgba(0,0,0,.12);border-radius:8px;margin:2px;}
  .panel-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.4);border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
  .panel-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.58);background-clip:padding-box;}
  .craft-fixed{flex-shrink:0;padding:20px 6px 0;}

  /* ── Mob / Petal Gallery — olive, textured, tight grid, no labels ── */
  .panel.gallery.wide{
    width:496px;
  }
  .panel.gallery{
    width:376px;
    background-color:#c7ba3c;
    background-image:
      radial-gradient(circle at 12% 22%, rgba(0,0,0,.07) 0 26px, transparent 27px),
      radial-gradient(circle at 68% 55%, rgba(0,0,0,.06) 0 34px, transparent 35px),
      radial-gradient(circle at 38% 82%, rgba(0,0,0,.05) 0 22px, transparent 23px),
      radial-gradient(circle at 88% 14%, rgba(0,0,0,.05) 0 18px, transparent 19px),
      radial-gradient(circle at 6% 78%, rgba(255,255,255,.06) 0 20px, transparent 21px);
    border:5px solid #7d7328;
  }
  .panel.gallery .panel-head{background:#b3a635;border-bottom:3px solid #7d7328;}
  .grow{display:grid;grid-template-columns:repeat(6,1fr);gap:2px;margin-bottom:2px;}
  .grow.mobgrow{grid-template-columns:repeat(13,1fr);}
  .gcell{position:relative;aspect-ratio:1;border-radius:5px;border:4px solid color-mix(in srgb, var(--rc) 55%, black);background:color-mix(in srgb, var(--rc) 32%, #fffef2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .1s;}
  .gcell:hover{transform:scale(1.08);z-index:2;}
  .gcell.locked{background:color-mix(in srgb, var(--rc,#333) 32%, #14120a);border-color:color-mix(in srgb, var(--rc,#333) 45%, black);cursor:default;font-size:17px;opacity:.75;}
  .gcell.locked:hover{transform:none;}
  /* a tier this petal's rarity can never occupy — a white slash instead of a "maybe someday" ? */
  .gcell.impossible{background:rgba(0,0,0,.32);border-color:rgba(0,0,0,.45);cursor:default;
    background-image:linear-gradient(135deg, transparent calc(50% - 1.5px), rgba(255,255,255,.8) calc(50% - 1.5px), rgba(255,255,255,.8) calc(50% + 1.5px), transparent calc(50% + 1.5px));}
  .gcell.impossible:hover{transform:none;}
  .gcell.short{filter:grayscale(0.85) brightness(0.8);cursor:default;}
  .gcell.short:hover{transform:none;}
  .gcell.maxed{filter:grayscale(1) brightness(0.65);cursor:not-allowed;opacity:.7;}
  .gcell.maxed:hover{transform:none;}
  .gcell.sel{outline:3px solid #ffe27a;outline-offset:-3px;}
  .gcell .gc-count{position:absolute;bottom:1px;right:2px;font-size:8px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.65);}
  .gcell .gc-tier{position:absolute;top:1px;right:2px;font-size:7px;font-weight:900;color:#ffe27a;background:rgba(0,0,0,.6);padding:0 2px;border-radius:4px;}
  .gicon{width:70%;height:70%;}

  /* ── Craft panel ── */
  .craft-top{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-bottom:6px;}
  /* nudged left so the pentagon's visual (bounding-box) center lands on the panel's center
     line — its rotational center and its container's geometric center aren't the same point */
  .craft-pentagon{position:relative;width:160px;height:160px;flex-shrink:0;transform:translate(-5.16px, -6px);}
  .craft-arm{position:absolute;left:50%;top:50%;width:0;height:0;}
  .craft-counter{position:absolute;left:0;top:0;width:0;height:0;}
  /* the pentagon formation itself never moves or revolves — each slot just spins + bulges in place */
  .craft-radius{position:absolute;left:0;top:0;width:0;height:0;transform:translateX(54px);}
  /* rotation lives on its own wrapper, separate from the bulge — so the spin is one smooth
     accelerate/decelerate arc across the whole attempt instead of stuttering at each pulse */
  .craft-spin{position:absolute;left:0;top:0;width:0;height:0;}
  .craft-pentagon.spinning .craft-spin{animation:craftRotate 2.2s cubic-bezier(.45,0,.55,1) forwards;}
  @keyframes craftRotate{ from{transform:rotate(0deg);} to{transform:rotate(1080deg);} }
  .craftslot{position:relative;width:48px;height:48px;margin:-24px 0 0 -24px;border-radius:8px;background:rgba(0,0,0,.15);border:2px dashed rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;transition:opacity .25s;transform-origin:50% 50%;}
  .craft-slot-badge{position:absolute;bottom:-4px;right:-4px;background:#1c2410;border:2px solid #7d7328;border-radius:7px;
    color:#ffe27a;font-size:9px;font-weight:900;padding:0 4px;line-height:1.4;}
  .craftslot.filled{border-style:solid;border-color:color-mix(in srgb, var(--rc) 55%, black);background:var(--rc);animation:craftSlotAppear .22s ease-out;}
  @keyframes craftSlotAppear{ from{opacity:0;transform:scale(.4);} to{opacity:1;transform:scale(1);} }
  .craftslot.filled canvas{width:36px;height:36px;}
  .craftslot.destroyed{border-color:#7a1414;background:rgba(120,20,20,.35);}
  .craftslot.destroyed canvas{display:none;}
  .craftslot.missing{filter:grayscale(1) brightness(0.6);opacity:.65;}
  .craft-pentagon.spinning .craftslot{animation:craftBulge 2.2s ease-in-out forwards;}
  @keyframes craftBulge{
    0%,100%{transform:scale(1);}
    12.5%,37.5%,62.5%,87.5%{transform:scale(1.3);}
    25%,50%,75%{transform:scale(1);}
  }
  /* success: the 5 petals slide inward and shrink away, handing off to the center reveal */
  .craft-pentagon.result-success .craft-radius{animation:craftMergeIn .45s cubic-bezier(.5,0,.85,.6) forwards;}
  @keyframes craftMergeIn{ from{transform:translateX(54px);} to{transform:translateX(0px);} }
  .craft-pentagon.result-success .craftslot{animation:craftMergeShrink .45s ease-in forwards;}
  @keyframes craftMergeShrink{ 0%{opacity:1;transform:scale(1);} 70%{opacity:1;transform:scale(1.15);} 100%{opacity:0;transform:scale(.2);} }
  /* fail: destroyed petals pop and fade fast, echoing the mob death-burst look */
  .craft-pentagon.result-fail .craftslot.destroyed{animation:craftDestroy .32s ease-out forwards;}
  @keyframes craftDestroy{ from{transform:scale(1);opacity:1;} to{transform:scale(1.55);opacity:0;} }
  /* offset from the pentagon's rotational center to its visual (bounding-box) center — a
     5-vertex shape always has one side stick out further than the other, so they're not the same point */
  .craft-center{position:absolute;left:calc(50% + 5.16px);top:50%;width:0;height:0;display:flex;align-items:center;justify-content:center;}
  .craft-center-inner{position:absolute;left:-30px;top:-30px;width:60px;height:60px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    opacity:0;transform:scale(.3);transition:opacity .3s ease .38s,transform .4s cubic-bezier(.2,.8,.3,1.3) .38s;}
  .craft-center-inner.show{opacity:1;transform:scale(1);}
  .craft-center-inner canvas{width:42px;height:42px;}
  .craft-center-badge{position:absolute;bottom:-4px;right:-4px;background:#1c2410;border:2px solid #7d7328;border-radius:8px;
    color:#ffe27a;font-size:11px;font-weight:900;padding:1px 5px;}
  .craft-grid .grow{grid-template-columns:repeat(6, 52px);justify-content:center;gap:4px;}
  .craft-grid .gcell{border-width:3px;}
  .craft-grid .picn{width:34px;height:34px;}
  .craft-grid .gc-count{font-size:9px;}
  .craft-grid .gc-tier{font-size:7px;}
  /* fixed width so the button/text changing on craft attempt never re-centers the flex column */
  .craft-action{display:flex;flex-direction:column;align-items:center;gap:4px;width:170px;flex-shrink:0;}
  .craft-btn{padding:7px 22px;border-radius:10px;border:2px solid #5c5430;background:#e8dc8a;color:#3a3418;font-weight:900;font-size:14px;cursor:pointer;box-shadow:0 3px 0 #5c5430;}
  .craft-btn:hover:not(:disabled){filter:brightness(1.08);}
  .craft-btn:disabled{opacity:.5;cursor:default;box-shadow:none;}
  .craft-chance{font-size:11px;font-weight:800;color:#3a3418;text-shadow:0 1px 0 rgba(255,255,255,.25);width:100%;text-align:center;}
  .craft-hint{text-align:center;font-size:11px;font-weight:700;color:#3a3418;margin-bottom:8px;}
  .craft-grid.busy{pointer-events:none;}
  /* exactly 6 rows of petals visible at once — the rest scrolls */
  .panel.craft .panel-body{flex:0 0 270px;height:270px;}
  /* forge menus size to their content instead of the generic flex:1 rule (which would collapse
     to ~0 since the panel has no fixed height to grow into) */
  .panel.forge .panel-body{flex:0 0 auto;padding:2px 8px 8px;}
  .panel.forge .craft-fixed{padding:8px 8px 0;}
  .panel.forge .craft-top{margin-bottom:2px;}
  /* icon back-button that lives to the left of a sub-menu title */
  .panel-head .head-left{display:flex;align-items:center;gap:8px;}
  .backbtn{background:#b3a635;border:2px solid #7d7328;color:#3a3418;font-weight:900;font-size:15px;line-height:1;
    width:26px;height:26px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 0 #7d7328;}
  .backbtn:hover{filter:brightness(1.1);}
  /* forge hub — 2×2 grid of big icon tiles, no descriptions */
  .forge-tiles{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:2px;}
  .forge-tile{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 6px;border-radius:11px;cursor:pointer;
    background:color-mix(in srgb, var(--rc,#8d8256) 30%, #fffef2);border:4px solid color-mix(in srgb, var(--rc,#8d8256) 55%, black);transition:transform .1s;}
  .forge-tile:hover{transform:translateY(-2px);}
  .forge-tile canvas{width:46px;height:46px;}
  .forge-tile .ft-label{font-size:12px;font-weight:900;color:#3a3418;text-shadow:0 1px 0 rgba(255,255,255,.3);letter-spacing:.01em;}
  /* essence-forging mode toggle (Signature / Base) */
  .eforge-modes{display:flex;gap:6px;justify-content:center;margin-bottom:6px;}
  .eforge-mode{padding:5px 16px;border-radius:9px;border:2px solid #5c5430;background:#d0c473;color:#3a3418;font-weight:900;font-size:12px;cursor:pointer;opacity:.55;}
  .eforge-mode.on{opacity:1;background:#e8dc8a;box-shadow:0 2px 0 #5c5430;}
  /* progressive selection grids inside forge sub-menus — a little breathing room between steps */
  .forge-step{margin-top:6px;}
  .forge-step .grow{grid-template-columns:repeat(6,52px);justify-content:center;gap:4px;}
  .forge-step .gcell{border-width:3px;}
  .forge-step .eicon,.forge-step .picn{width:34px;height:34px;}

  /* click-triggered detail tooltip, shared by both galleries */
  .galtip{position:fixed;display:none;z-index:90;width:250px;background:#1c2410;border:3px solid #7d7328;border-radius:12px;padding:12px 14px;color:#f2edcf;box-shadow:0 12px 28px rgba(0,0,0,.5);}
  .galtip.show{display:block;}
  .galtip .tip-name{font-size:16px;font-weight:900;margin-bottom:2px;}
  .galtip .tip-rar{font-size:11px;font-weight:800;text-transform:uppercase;margin-bottom:8px;}
  .galtip .tip-desc{font-size:12px;color:#c9c397;margin-bottom:8px;line-height:1.4;}
  .galtip .tip-stats{font-size:12px;font-weight:800;color:#ffd24d;margin-bottom:8px;}
  .ratecard-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .ratecard{width:60px;background:var(--rc,#8d8256);border:2px solid color-mix(in srgb, var(--rc,#8d8256) 55%, black);border-radius:10px;padding:5px 3px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2px;}
  .ratecard .picn,.ratecard .gicon{width:24px;height:24px;}
  .ratecard .rc-name{font-size:9px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.45);line-height:1.1;}
  .ratecard .rc-pct{font-size:10px;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.45);}
  .ratecard .rc-multi{font-size:8px;font-weight:800;color:#ffe27a;text-shadow:0 1px 2px rgba(0,0,0,.45);}
  .ratecard.locked{background:rgba(0,0,0,.32);border-color:rgba(0,0,0,.45);font-size:16px;}
  .ratecard.mobcard{background:#8d8256;border-color:#5c5430;}

  /* ── Inventory — blue/green, drag-and-drop ── */
  .panel.inventory{width:420px;background:#4f93d6;border:5px solid #2f6b23;}
  .panel.inventory .panel-head{background:transparent;}
  .inv-sub{text-align:center;color:#eaf3ff;font-weight:800;font-size:11px;margin:-2px 0 6px;text-shadow:0 1px 2px rgba(0,0,0,.3);}
  .inv-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#3f7dbd;border-radius:8px;padding:6px 8px;}
  .inv-toolbar label{display:flex;align-items:center;gap:4px;font-weight:800;color:#fff;font-size:11px;flex-shrink:0;cursor:pointer;}
  .inv-search{flex:1;padding:5px 8px;border-radius:6px;border:2px solid #2a5c1f;font-size:12px;min-width:0;}
  .inv-section-head{color:var(--rc);font-weight:900;font-size:11px;text-align:center;margin:8px 0 4px;display:flex;align-items:center;gap:6px;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .inv-section-head::before,.inv-section-head::after{content:'';flex:1;height:2px;background:var(--rc);opacity:.7;}
  .inv-grid{display:grid;grid-template-columns:repeat(6,62px);grid-auto-rows:62px;justify-content:start;align-content:start;gap:4px;}
  .istack{width:62px;height:62px;background:var(--rc,#8d8256);border:4px solid color-mix(in srgb, var(--rc) 55%, black);border-radius:8px;padding:4px;cursor:grab;position:relative;box-sizing:border-box;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;}
  .istack:active{cursor:grabbing;}
  .istack:hover{transform:translateY(-1px);}
  .istack .picn{width:26px;height:26px;}

  .istack .pcount{position:absolute;top:2px;left:3px;font-size:9px;font-weight:900;color:#fff;background:rgba(0,0,0,.65);padding:0 3px;border-radius:6px;}

  .lbslot .lbtier{position:absolute;top:2px;right:3px;font-size:8px;font-weight:900;color:#ffe27a;background:rgba(0,0,0,.5);padding:0 3px;border-radius:6px;z-index:3;}
  .inv-empty{color:#eaf3ff;font-size:13px;grid-column:1/-1;font-weight:600;text-align:center;padding:20px;}

<body>
<canvas id="c"></canvas>
<div id="hud">
  <div>WASD move · Hold Left-Click expand/attack · Space/Right-Click contract</div>
  <div>Z inventory · X essence · V mobs · B petals · C craft · Y forge · R swap loadout · 1-5 swap slot</div>

</div>

<button id="devBtn" onclick="grantDevMode()">Dev Mode: +100 all petals, +1000 all essence</button>
<button id="undevBtn" onclick="undoDevMode()">Undo Dev Mode</button>

<div id="levelHud">
