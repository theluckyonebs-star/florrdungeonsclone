function showPetalTip(e, petalKey, tier){
  e.stopPropagation();
  tier = tier || 1;
  const def = PETAL_DEFS[petalKey], rarity = PETAL_RARITY[petalKey];
  const isBasic = Object.values(BASIC_IDS).includes(petalKey);
  const recipe = PETAL_RECIPES[petalKey];
  let forgeBlock;
  if (isBasic){
    forgeBlock = `<div class="ratecard-row"><div class="ratecard" style="--rc:${RARITY_INFO[rarity].color}">
        <canvas class="eicon" data-rarity="${rarity}" width="30" height="30"></canvas>
        <div class="rc-name">${BASIC_FORGE_COST}x ${RARITY_INFO[rarity].name} Essence</div>
      </div></div>`;
  } else if (recipe){
    const ingredientCards = Object.entries(recipe).map(([sigId,qty])=>`<div class="ratecard" style="--rc:${RARITY_INFO[rarity].color}">
        <canvas class="eicon" data-rarity="${rarity}" data-name="${sigId}" width="30" height="30"></canvas>
        <div class="rc-name">${qty}x ${SIGNATURE_ESSENCES[sigId].name}</div>
      </div>`).join('');
    forgeBlock = `<div class="tip-stats">Petal Forging — requires 1 ${RARITY_INFO[rarity].name} Basic petal, plus:</div>
      <div class="ratecard-row">${ingredientCards}</div>`;
  } else {
    forgeBlock = '';
  }
  const parts = def.parts>1 ? `<div class="tip-stats">Spawns as ${def.parts} miniature copies</div>` : '';

  // surface whatever secondary effect this petal actually has, at the clicked tier
  const extraStats = [];
  if (def.healBurst) extraStats.push(`Heals ${Math.round(pscale(def,'healBurst',petalKey,tier)).toLocaleString()} per use`);
  if (def.healPerSec) extraStats.push(`Heals ${pscale(def,'healPerSec',petalKey,tier).toFixed(1)}/s`);
  if (def.rangeBonus) extraStats.push(`+${Math.round(def.rangeBonus*specialTierScale(petalKey,'rangeBonus',tier)*100)}% range`);
  if (def.rotBonus) extraStats.push(`+${Math.round(def.rotBonus*specialTierScale(petalKey,'rotBonus',tier)*100)}% rotation speed`);
  if (def.reach) extraStats.push(`+${Math.round(def.reach*specialTierScale(petalKey,'reach',tier))}px reach`);
  if (def.slowMult!=null){
    extraStats.push(`Slows to ${Math.round(scaledSlowMult(def,petalKey,tier)*100)}% speed for ${scaledSlowDur(def,petalKey,tier).toFixed(1)}s`);
  }
  if (FLOWER_HP_PETALS[petalKey]) extraStats.push(`Grants +${Math.round((FLOWER_HP_PETALS[petalKey]-1)*tierScale(petalKey,tier)*100)}% flower HP while equipped`);
  const extraBlock = extraStats.length ? `<div class="tip-stats">${extraStats.join(' · ')}</div>` : '';

  const html = `
    <div class="tip-name">${def.name}</div>
    <div class="tip-rar" style="color:${RARITY_INFO[rarity].color}">${RARITY_INFO[rarity].name} · Tier ${tier}${rarity==='mythic' ? ' · Cannot be tiered' : ` · scales ×${tierStep(petalKey)}/tier`}</div>
    <div class="tip-desc">${def.desc}</div>
    <div class="tip-stats">HP ${Math.round(pscale(def,'health',petalKey,tier)).toLocaleString()} · DMG ${Math.round(pscale(def,'damage',petalKey,tier)).toLocaleString()} · Reload ${def.reload}s</div>
    ${extraBlock}
    ${parts}
    ${forgeBlock}`;
  positionTip(e, html);
}

/* ── Craft — combine CRAFT_COST of one petal+tier for a chance at the next tier up.
     Rendered as a pentagon of the 5 petals; attempting spins+pulses them, then either
     converges them into the upgraded petal (success) or scatters back with 1-4 destroyed (fail). ── */
// shift-click queues every full batch of CRAFT_COST you own at once instead of just one
function selectCraftItem(petal, tier, bulk){
  if (craftPhase!=='idle' || PETAL_RARITY[petal]==='mythic') return; // no mid-animation swaps, and mythics can't be crafted at all
  craftSelection = { petal, tier };
  craftBulk = !!bulk;
  renderPanel();
}
function attemptCraft(){
  if (!craftSelection || craftPhase!=='idle') return;
  const { petal, tier } = craftSelection;
  if (tier >= MAX_TIER) return; // tier 6 — nothing higher to craft into
  const k = invKey(petal, tier);
  if ((inventory[k]||0) < CRAFT_COST) return;
  const bulk = craftBulk;
  const rc = RARITY_INFO[PETAL_RARITY[petal]].color;

  craftPhase = 'spinning';
  // update the existing DOM in place instead of a full re-render — the pentagon should just
  // start spinning where it already sits, not have the whole panel flash/rebuild under it
  const root = document.getElementById('panelRoot');
  root.querySelector('.craft-pentagon')?.classList.add('spinning');
  const btn = root.querySelector('.craft-btn');
  if (btn) btn.disabled = true;
  const chanceEl = root.querySelector('.craft-chance');
  if (chanceEl) chanceEl.textContent = 'Crafting…';
  root.querySelector('.craft-grid')?.classList.add('busy');

  setTimeout(()=>{
    // a single craft is always exactly one attempt. A stack craft keeps re-attempting with
    // whatever's left — including petals refunded from a failed attempt — until fewer than
    // CRAFT_COST remain, instead of stopping after a fixed number of batches and leaving leftovers.
    let remaining = inventory[k]||0;
    let successCount = 0, failCount = 0, totalLost = 0, singleBatchDestroyedCount = 0;
    do {
      if (Math.random()*100 < CRAFT_CHANCE_BY_RARITY[PETAL_RARITY[petal]]){
        successCount++;
        remaining -= CRAFT_COST;
      } else {
        const destroyedCount = 1 + Math.floor(Math.random()*4); // 1-4, not all 5 are lost
        remaining -= destroyedCount;
        totalLost += destroyedCount;
        singleBatchDestroyedCount = destroyedCount;
        failCount++;
      }
    } while (bulk && remaining >= CRAFT_COST);
    const batches = successCount + failCount;
    inventory[k] = remaining;
    if (successCount>0){
      const nk = invKey(petal, tier+1);
      inventory[nk] = (inventory[nk]||0) + successCount;
      discoveredPetals.add(nk);
    }
    // the pentagon only has 5 slots regardless of how many attempts ran — for a single craft use
    // its own exact 1-4 roll; for a stack craft fall back to a proportional representative subset
    let destroyedSlots = new Set();
    if (failCount>0){
      const showCount = batches===1 ? singleBatchDestroyedCount
        : Math.min(4, Math.max(1, Math.round((successCount===0?4:5)*failCount/batches)));
      const idxs = [0,1,2,3,4];
      for (let x=idxs.length-1; x>0; x--){ const j=Math.floor(Math.random()*(x+1)); [idxs[x],idxs[j]]=[idxs[j],idxs[x]]; }
      destroyedSlots = new Set(idxs.slice(0, showCount));
    }
    craftResult = { success: successCount>0, petal, tier, nextTier: successCount>0?tier+1:null, destroyedSlots, successCount, failCount, batches, totalLost };
    craftPhase = 'result';
    renderPanel();
    saveProgress();

    setTimeout(()=>{
      craftPhase = 'idle';
      craftResult = null;
      renderPanel();
    }, CRAFT_RESULT_HOLD*1000);
  }, CRAFT_SPIN_DUR*1000);
}
const CRAFT_ARM_ANGLES = [0,72,144,216,288];
function renderCraftPanel(){
  const sel = craftSelection;
  const isMax = sel && sel.tier >= MAX_TIER;
  const have = sel ? (inventory[invKey(sel.petal,sel.tier)]||0) : 0;
  // an estimate only — a stack craft's real attempt count depends on how the rolls land, since
  // a failed attempt can refund petals back into the pool for another try
  const batches = craftBulk ? Math.max(1, Math.floor(have/CRAFT_COST)) : 1;
  const canCraft = !!sel && craftPhase==='idle' && !isMax && have>=CRAFT_COST;
  const res = craftResult;
  const rc = sel ? RARITY_INFO[PETAL_RARITY[sel.petal]].color : '#8d8256';
  const resRc = res ? RARITY_INFO[PETAL_RARITY[res.petal]].color : rc;

  // each pentagon slot stands in for a whole batch — e.g. 100 petals / 5 slots = ×20 each
  const qtyBadge = batches>1 ? `<div class="craft-slot-badge">×${batches}</div>` : '';
  const arms = CRAFT_ARM_ANGLES.map((ang,i)=>{
    let slotHtml;
    if (craftPhase==='result'){
      if (res.success){
        // still shown normally — the CSS merge animation is what slides & shrinks it into the center
        slotHtml = `<div class="craftslot filled" style="--rc:${resRc}"><canvas class="picn" data-petal="${res.petal}" data-tier="${res.tier}" width="44" height="44"></canvas></div>`;
      } else if (res.destroyedSlots.has(i)){
        slotHtml = `<div class="craftslot filled destroyed" style="--rc:${resRc}"><canvas class="picn" data-petal="${res.petal}" data-tier="${res.tier}" width="44" height="44"></canvas></div>`;
      } else {
        slotHtml = `<div class="craftslot filled" style="--rc:${resRc}"><canvas class="picn" data-petal="${res.petal}" data-tier="${res.tier}" width="44" height="44"></canvas></div>`;
      }
    } else if (craftPhase==='spinning'){
      slotHtml = `<div class="craftslot filled" style="--rc:${rc}"><canvas class="picn" data-petal="${sel.petal}" data-tier="${sel.tier}" width="44" height="44"></canvas>${qtyBadge}</div>`;
    } else {
      const filled = sel && i<Math.min(have, CRAFT_COST);
      slotHtml = filled
        ? `<div class="craftslot filled" style="--rc:${rc}"><canvas class="picn" data-petal="${sel.petal}" data-tier="${sel.tier}" width="44" height="44"></canvas>${qtyBadge}</div>`
        : `<div class="craftslot"></div>`;
    }
    return `<div class="craft-arm" style="transform:rotate(${ang}deg)"><div class="craft-radius"><div class="craft-counter" style="transform:rotate(${-ang}deg)"><div class="craft-spin">${slotHtml}</div></div></div></div>`;
  }).join('');

  const centerShow = craftPhase==='result' && res.success;
  const center = `<div class="craft-center"><div class="craft-center-inner ${centerShow?'show':''}" ${centerShow?`style="--rc:${resRc};background:${resRc}"`:''}>
    ${centerShow?`<canvas class="picn" data-petal="${res.petal}" data-tier="${res.nextTier}" width="60" height="60"></canvas>`:''}
    ${centerShow && res.successCount>1?`<div class="craft-center-badge">×${res.successCount}</div>`:''}
  </div></div>`;

  const pentagonState = craftPhase==='spinning' ? 'spinning'
    : craftPhase==='result' ? (res.success ? 'result-success' : 'result-fail')
    : '';

  let chanceText = 'Select a petal';
  if (craftPhase==='result'){
    const petalName = PETAL_DEFS[res.petal].name;
    if (res.successCount>0 && res.failCount===0){
      chanceText = res.successCount>1
        ? `Crafted ${res.successCount}x Tier ${res.nextTier} ${petalName}!`
        : `Crafted ${petalName} (Tier ${res.nextTier})!`;
    } else if (res.successCount>0){
      chanceText = `Crafted ${res.successCount}x Tier ${res.nextTier} ${petalName} — ${res.failCount} failed`;
    } else {
      chanceText = `Failed — lost ${res.totalLost} ${petalName}`;
    }
  } else if (craftPhase==='spinning'){
    chanceText = batches>1 ? `Crafting ${batches}x…` : 'Crafting…';
  } else if (sel){
    chanceText = isMax ? 'Already max tier' : `${CRAFT_CHANCE_BY_RARITY[PETAL_RARITY[sel.petal]]}% success chance`;
  }

  const rows = Object.keys(PETAL_DEFS).filter(k=>PETAL_RARITY[k]!=='mythic').sort(byRarityThenNameAsc).map(petalKey=>{
    const rowRc = RARITY_INFO[PETAL_RARITY[petalKey]].color;
    const cells = TIERS.map(t=>{
      const k = invKey(petalKey, t);
      const cnt = inventory[k]||0;
      if (!tierPossible(petalKey, t)) return `<div class="gcell impossible"></div>`;
      if (!discoveredPetals.has(k)) return `<div class="gcell locked" style="--rc:${rowRc}">❓</div>`;
      const isMax = t===MAX_TIER; // nothing to craft tier 6 into
      const short = cnt < CRAFT_COST;
      const disabled = isMax || short;
      const isSel = sel && sel.petal===petalKey && sel.tier===t;
      const cntText = cnt>999 ? (cnt/1000).toFixed(1)+'k' : cnt;
      return `<div class="gcell ${isMax?'maxed':short?'short':''} ${isSel?'sel':''}" style="--rc:${rowRc}" ${disabled?'':`onclick="selectCraftItem('${petalKey}',${t},event.shiftKey)" title="Shift-click to queue all ${Math.floor(cnt/CRAFT_COST)} batches"`}>
        <canvas class="picn" data-petal="${petalKey}" data-tier="${t}" width="40" height="40"></canvas>
        <div class="gc-tier">${toRoman(t)}</div>
        <div class="gc-count">x${cntText}</div>
      </div>`;
    }).join('');
    return `<div class="grow">${cells}</div>`;
  }).join('');

  return `
    <div class="panel-head"><h2>Craft</h2><button class="x" onclick="closePanel()">✕</button></div>
    <div class="craft-fixed">
      <div class="craft-top">
        <div class="craft-pentagon ${pentagonState}">${arms}${center}</div>
        <div class="craft-action">
          <button class="craft-btn" ${canCraft?'':'disabled'} onclick="attemptCraft()">Craft</button>
          <div class="craft-chance">${chanceText}</div>
        </div>
      </div>
      <div class="craft-hint">Combine ${CRAFT_COST} of the same petal+tier to craft the next tier — shift-click to queue every batch you own. Mythic petals can't be tiered.</div>
    </div>
    <div class="panel-body">
      <div class="craft-grid ${craftPhase!=='idle'?'busy':''}">${rows}</div>
    </div>`;
}

/* ── Forge hub — 4 sub-menus (Petal Tiering lives in its own separate Craft panel, hotkey C).
     renderForgePanel just dispatches on forgeMenu; each sub-menu has its own render + attempt
     function further down. ── */
function renderForgePanel(){
  if (forgeMenu==null) return renderForgeHub();
  if (forgeMenu==='basic') return renderBasicForging();
  if (forgeMenu==='petalForge') return renderPetalForging();
  if (forgeMenu==='essenceForge') return renderEssenceForging();
  if (forgeMenu==='essenceDivide') return renderEssenceDividing();
  return renderForgeHub();
}
// panel header with an optional icon back-button (‹) to its left
function forgeHead(title, onBack){
  const back = onBack ? `<button class="backbtn" onclick="${onBack}" title="Back">‹</button>` : '';
  return `<div class="panel-head"><div class="head-left">${back}<h2>${title}</h2></div><button class="x" onclick="closePanel()">✕</button></div>`;
}
// each hub tile shows a representative icon (drawn via the standard picn/eicon canvases) + a
// one-word label, no descriptive prose
const FORGE_MENU_INFO = {
  basic:         { title:'Basic',    label:'Basic',    icon:`<canvas class="picn" data-petal="${'basic'}" width="46" height="46"></canvas>`, rc:'#f2f2f2' },
  petalForge:    { title:'Petal',    label:'Petal',    icon:`<canvas class="picn" data-petal="stinger" width="46" height="46"></canvas>`, rc:'#1a1a1a' },
  essenceForge:  { title:'Essence',  label:'Forge',    icon:`<canvas class="eicon" data-rarity="rare" data-name="light" width="46" height="46"></canvas>`, rc:'#fff27a' },
  essenceDivide: { title:'Divide',   label:'Divide',   icon:`<canvas class="eicon" data-rarity="epic" data-name="multi" width="46" height="46"></canvas>`, rc:'#8a5fd6' },
};
function renderForgeHub(){

    ${forgeHead('Forge')}

/* ── Basic Forging — pick a rarity, spend BASIC_FORGE_COST base essence of it, get a fresh
     Basic petal at that rarity's starting tier. Sig essence is never accepted here. ── */
function selectBasicRarity(rarity, bulk){
  if (forgePhase!=='idle') return;
  forgeSelection = rarity;
  forgeBulk = !!bulk;
  renderPanel();
}
function attemptBasicForge(){
  if (!forgeSelection || forgePhase!=='idle') return;
  const rarity = forgeSelection;
  const k = essenceKey(rarity);
  const have = essence[k]||0;
  if (have < BASIC_FORGE_COST) return;
  const batches = forgeBulk ? Math.max(1, Math.floor(have/BASIC_FORGE_COST)) : 1;

  forgePhase = 'spinning';
  const root = document.getElementById('panelRoot');
  root.querySelector('.craft-pentagon')?.classList.add('spinning');
  const btn = root.querySelector('.craft-btn');
  if (btn) btn.disabled = true;
  const chanceEl = root.querySelector('.craft-chance');
  if (chanceEl) chanceEl.textContent = 'Forging…';

  setTimeout(()=>{
    essence[k] -= BASIC_FORGE_COST*batches;
    const tier = RARITY_START_TIER[rarity];
    const petal = BASIC_IDS[rarity];
    const nk = invKey(petal, tier);
    inventory[nk] = (inventory[nk]||0) + batches;
    discoveredPetals.add(nk);
    forgeResult = { rarity, tier, count: batches };
    forgePhase = 'result';
    renderPanel();
    saveProgress();

    setTimeout(()=>{
      forgePhase = 'idle';
      forgeResult = null;
      renderPanel();
    }, CRAFT_RESULT_HOLD*1000);
  }, CRAFT_SPIN_DUR*1000);
}
function renderBasicForging(){
  if (!forgeSelection){
    const cells = RARITIES.map(rarity=>{
      const rc = RARITY_INFO[rarity].color;
      return `<div class="gcell" style="--rc:${rc}" onclick="selectBasicRarity('${rarity}',event.shiftKey)">
        <canvas class="picn" data-petal="${BASIC_IDS[rarity]}" width="40" height="40"></canvas>
      </div>`;
    }).join('');
    return `
      ${forgeHead('Basic', "openForgeMenu(null)")}
      <div class="panel-body"><div class="grow">${cells}</div></div>`;
  }

  const rarity = forgeSelection;
  const tier = RARITY_START_TIER[rarity];
  const petal = BASIC_IDS[rarity];
  const have = essence[essenceKey(rarity)]||0;
  const canForge = forgePhase==='idle' && have>=BASIC_FORGE_COST;
  const rc = RARITY_INFO[rarity].color;
  const batches = forgeBulk ? Math.max(1, Math.floor(have/BASIC_FORGE_COST)) : 1;
  const res = forgeResult;

  const slotCount = forgePhase==='result' ? res.count : batches;
  const qtyBadge = slotCount>1 ? `<div class="craft-slot-badge">×${slotCount}</div>` : '';
  const arms = CRAFT_ARM_ANGLES.map(ang=>{
    const cls = have>=BASIC_FORGE_COST ? 'filled' : 'filled missing';
    return `<div class="craft-arm" style="transform:rotate(${ang}deg)"><div class="craft-radius"><div class="craft-counter" style="transform:rotate(${-ang}deg)"><div class="craft-spin"><div class="craftslot ${cls}" style="--rc:${rc}"><canvas class="eicon" data-rarity="${rarity}" width="44" height="44"></canvas>${qtyBadge}</div></div></div></div></div>`;
  }).join('');

  const centerShow = forgePhase==='result';
  const center = `<div class="craft-center"><div class="craft-center-inner ${centerShow?'show':''}" ${centerShow?`style="--rc:${rc};background:${rc}"`:''}>
    ${centerShow?`<canvas class="picn" data-petal="${petal}" data-tier="${tier}" width="60" height="60"></canvas>`:''}
    ${centerShow && res.count>1?`<div class="craft-center-badge">×${res.count}</div>`:''}
  </div></div>`;

  const pentagonState = forgePhase==='spinning' ? 'spinning' : forgePhase==='result' ? 'result-success' : '';

  let statusText;
  if (forgePhase==='spinning') statusText = batches>1 ? `Forging ${batches}×…` : 'Forging…';
  else if (forgePhase==='result') statusText = res.count>1 ? `Forged ${res.count}× Basic!` : `Forged Basic!`;
  else statusText = canForge ? (batches>1?`Forge ${batches}×`:'Forge') : `Need ${BASIC_FORGE_COST} Essence`;

  return `
    ${forgeHead('Basic', "selectBasicRarity(null)")}
    <div class="craft-fixed">
      <div class="craft-top">
        <div class="craft-pentagon ${pentagonState}">${arms}${center}</div>
        <div class="craft-action">
          <button class="craft-btn" ${canForge?'':'disabled'} onclick="attemptBasicForge()">Forge</button>
          <div class="craft-chance">${statusText}</div>
        </div>
      </div>
    </div>`;
}

/* ── Petal Forging — every other petal's recipe: 1 Basic of the petal's own rarity, plus the
     5 signature-essence ingredients listed in PETAL_RECIPES (also at the petal's own rarity).
     The Basic ingredient is drawn from whichever tier stack is lowest, so tiering up your Basics
     first doesn't lock them out of being spent here. ── */
function basicHaveTotal(rarity){
  return TIERS.reduce((sum,t)=> sum + (inventory[invKey(BASIC_IDS[rarity],t)]||0), 0);
}
function consumeBasic(rarity, count){
  let remaining = count;
  for (const t of TIERS){
    if (remaining<=0) break;
    const k = invKey(BASIC_IDS[rarity], t);
    const take = Math.min(remaining, inventory[k]||0);
    if (take>0){ inventory[k] -= take; remaining -= take; }
  }
}
function petalForgeBatches(petal){
  const rarity = PETAL_RARITY[petal], recipe = PETAL_RECIPES[petal];
  let max = basicHaveTotal(rarity);
  for (const sigId in recipe){
    const have = essence[essenceKey(rarity, sigId)]||0;
    max = Math.min(max, Math.floor(have/recipe[sigId]));
  }
  return Math.max(0, max);
}
function selectPetalForge(petal, bulk){
  if (pforgePhase!=='idle') return;
  pforgeSelection = petal;
  pforgeBulk = !!bulk;
  renderPanel();
}
function attemptPetalForge(){
  if (!pforgeSelection || pforgePhase!=='idle') return;
  const petal = pforgeSelection, rarity = PETAL_RARITY[petal], recipe = PETAL_RECIPES[petal];
  const maxBatches = petalForgeBatches(petal);
  if (maxBatches<1) return;
  const batches = pforgeBulk ? maxBatches : 1;

  pforgePhase = 'spinning';
  renderPanel();

  setTimeout(()=>{
    consumeBasic(rarity, batches);
    for (const sigId in recipe){
      const k = essenceKey(rarity, sigId);
      essence[k] -= recipe[sigId]*batches;
    }
    const tier = RARITY_START_TIER[rarity];
    const nk = invKey(petal, tier);
    inventory[nk] = (inventory[nk]||0) + batches;
    discoveredPetals.add(nk);
    pforgeResult = { petal, tier, count: batches };
    pforgePhase = 'result';
    renderPanel();
    saveProgress();

    setTimeout(()=>{
      pforgePhase = 'idle';
      pforgeResult = null;
      renderPanel();
    }, CRAFT_RESULT_HOLD*1000);
  }, CRAFT_SPIN_DUR*1000);
}
// flattens a recipe like {saliva:4, heavy:1} into the 5 pentagon-arm essence ids it fills,
// in a stable order — always exactly 5 since every recipe sums to 5
function recipeArms(recipe){
  const arms = [];
  for (const sigId in recipe) for (let i=0;i<recipe[sigId];i++) arms.push(sigId);
  return arms;
}

/* ── Essence Forging — two conversion directions, each spends 5-of-one-thing + 1-of-another to
     upgrade an essence stack to a higher rarity. In BOTH modes the "5x" side (the pentagon) is
     always the chosen signature essence, and the "1x" side (the satellite) is always Base —
     what differs is which side actually gets upgraded: Sig→Sig upgrades the 5x signature
     essence to the Base's rarity; Base→Base upgrades the 1x Base to the signature essence's
     (higher) rarity. ── */
function setEforgeMode(mode){ eforgeMode = mode; eforgeSigId=null; eforgeFromRarity=null; eforgeToRarity=null; renderPanel(); }
function setEforgeSigId(id){ eforgeSigId = id; eforgeFromRarity=null; eforgeToRarity=null; renderPanel(); }
function setEforgeFromRarity(r){ eforgeFromRarity = r; eforgeToRarity=null; renderPanel(); }
function setEforgeToRarity(r){ eforgeToRarity = r; renderPanel(); }
function eforgeReady(){
  if (!eforgeSigId || !eforgeFromRarity || !eforgeToRarity) return false;
  if (RARITIES.indexOf(eforgeToRarity) <= RARITIES.indexOf(eforgeFromRarity)) return false;
  if (eforgeMode==='sig'){
    return (essence[essenceKey(eforgeFromRarity,eforgeSigId)]||0) >= 5 && (essence[essenceKey(eforgeToRarity)]||0) >= 1;
  } else {
    return (essence[essenceKey(eforgeFromRarity)]||0) >= 1 && (essence[essenceKey(eforgeToRarity,eforgeSigId)]||0) >= 5;
  }
}
function attemptEssenceForge(){
  if (!eforgeReady() || eforgePhase!=='idle') return;
  eforgePhase = 'spinning';
  renderPanel();
  setTimeout(()=>{
    if (eforgeMode==='sig'){
      essence[essenceKey(eforgeFromRarity,eforgeSigId)] -= 5;
      essence[essenceKey(eforgeToRarity)] -= 1;
      const nk = essenceKey(eforgeToRarity,eforgeSigId);
      essence[nk] = (essence[nk]||0) + 1;
      eforgeResult = { isBase:false, sigId:eforgeSigId, rarity:eforgeToRarity };
    } else {
      essence[essenceKey(eforgeFromRarity)] -= 1;
      essence[essenceKey(eforgeToRarity,eforgeSigId)] -= 5;
      const nk = essenceKey(eforgeToRarity);
      essence[nk] = (essence[nk]||0) + 1;
      eforgeResult = { isBase:true, sigId:eforgeSigId, rarity:eforgeToRarity };
    }
    eforgePhase = 'result';
    renderPanel();
    saveProgress();
    setTimeout(()=>{ eforgePhase='idle'; eforgeResult=null; renderPanel(); }, CRAFT_RESULT_HOLD*1000);
  }, CRAFT_SPIN_DUR*1000);
}
function renderEssenceForging(){

  const pentaRarity = eforgeMode==='sig' ? eforgeFromRarity : eforgeToRarity;

/* ── Essence Dividing — decraft 1 essence into several of a lower rarity (ESSENCE_DIVIDE table
     in balance.js). Common can't be divided; legendary/mythic jump straight to epic. ── */
function setEdivName(name){ edivName = name; edivRarity = null; renderPanel(); }
function setEdivRarity(r){ edivRarity = r||null; renderPanel(); }
function attemptEssenceDivide(bulk){

  if (!div) return;

  const have = essence[k]||0;
  if (have<1) return;
  const batches = bulk ? have : 1;

  edivPhase = 'spinning';
  renderPanel();
  setTimeout(()=>{
    essence[k] -= batches;
    const nk = essenceKey(div.rarity, edivName);
    essence[nk] = (essence[nk]||0) + div.count*batches;
    edivResult = { rarity:div.rarity, count:div.count*batches, name: edivName==='base'?'Base':SIGNATURE_ESSENCES[edivName].name };
    edivPhase = 'result';
    renderPanel();
    saveProgress();
    setTimeout(()=>{ edivPhase='idle'; edivResult=null; renderPanel(); }, CRAFT_RESULT_HOLD*1000);
  }, CRAFT_SPIN_DUR*1000);
}

/* ══════════════════════════════════════════
   ACCOUNTS + SAVE  ·  local/dev auth — see .server.cjs for the API
   ══════════════════════════════════════════ */
/* ══════════════════════════════════════════
   MULTIPLAYER / ACCOUNTS / CLOUD SAVE
   — accounts, saves, and live presence all run through Firebase (see multiplayer.js).
     window.MP is that module's API; this block wires the game into it.
   ══════════════════════════════════════════ */
let authed = false;        // gated on Firebase login — the world stays frozen until signed in
let myName = null;         // our display username (shown to other players)
let remotePlayers = {};    // uid -> other players' live presence, refreshed by subscribePlayers

/* ── SHARED WORLD (host-authoritative mobs) ─────────────────────────────────────────────────
   The player with the lowest uid online is the "host": their browser simulates all mobs and
   broadcasts them. Everyone else mirrors that set and reports their petal hits back; the host
   applies damage and announces deaths, which each client turns into its own XP + loot (loot
   stays per-player, so nobody steals anybody's drops). If the host leaves, the next-lowest uid
   adopts the mobs it was already mirroring and takes over. */
let amHost = false;
let hostId = null;
let worldSubsAttached = false;
// smoothed on-screen position for each remote player, since presence only arrives ~9x/sec —
// drawing rp.x/rp.y directly makes other players visibly jump between updates
const remoteDisplay = {};
function updateRemoteDisplay(dt){
  const seen = new Set();
  for (const id in remotePlayers){
    const rp = remotePlayers[id];
    if (!rp || rp.x==null || rp.d) continue;   // rp.d: this player is dead, don't track/draw them
    seen.add(id);
    let disp = remoteDisplay[id];
    if (!disp){ disp = remoteDisplay[id] = { x: rp.x, y: rp.y, pts: [] }; }   // snap in on first sight
    else { disp.x += (rp.x-disp.x)*clamp(12*dt,0,1); disp.y += (rp.y-disp.y)*clamp(12*dt,0,1); }
    // smooth each orbiting petal's position the same way, matched by slot order (stable unless
    // the player's loadout size just changed, in which case snap instead of interpolating
    // between two unrelated petals)
    const rpts = rp.pts || [];
    if (disp.pts.length !== rpts.length) disp.pts = rpts.map(p => ({x:p[0], y:p[1]}));
    else for (let i=0;i<rpts.length;i++){
      const dp = disp.pts[i], p = rpts[i];
      dp.x += (p[0]-dp.x)*clamp(12*dt,0,1); dp.y += (p[1]-dp.y)*clamp(12*dt,0,1);
    }
  }
  for (const id in remoteDisplay) if (!seen.has(id)) delete remoteDisplay[id];
}
const TYPE_LIST = Object.keys(MOB_DEFS);
const TYPE_IDX = {}; TYPE_LIST.forEach((t,i)=>TYPE_IDX[t]=i);
let worldSeq = 0;                    // host's rolling mob-id counter
// a per-page-load prefix makes every mob id globally unique, so ids minted by one host session
// can never collide with ids still sitting in another client's mirror after a reload or a host
// handoff (id collisions were causing mirrored mobs to teleport, keep a stale type, and show
// wrong health)
const NET_PREFIX = 'm' + Math.random().toString(36).slice(2,8) + Math.random().toString(36).slice(2,6) + '_';
const mobById = {};                  // netId -> mob object (mirror lookup / cleanup)
// mobs I've landed a hit on, for loot attribution — no time limit, so a fight interrupted by
// dying/respawning (or just taking a while) doesn't cost you credit for damage you already
// dealt; a mob only drops out of this once it actually dies (or gets anti-cheese despawned,
// which removes it from the world for everyone, dropless, same as today)
const myHits = new Set();
const processedDeaths = new Set();   // death-event ids already handled
let worldPubT = 0;
const WORLD_PUB_PERIOD = 1/7;        // host broadcasts the mob set ~7x/sec

function ensureNetId(m){ if (m && !m.netId){ m.netId = NET_PREFIX+(worldSeq++); mobById[m.netId] = m; } }
// drop every mirrored mob — used when the host changes, so ids from the previous host's world
// can't linger and collide with the new host's broadcast
function clearMirror(){
  for (let i=mobs.length-1;i>=0;i--){ if (mobs[i].netId) mobs.splice(i,1); }
  for (const k in mobById) delete mobById[k];
}
function noteMyHit(netId){ if (netId) myHits.add(netId); }
// closest player (local or remote) to a point — so host mobs chase whoever's nearest, not just me
function nearestPlayerPos(x,y){
  let bx=player.x, by=player.y, bd=len(player.x-x, player.y-y);
  for (const id in remotePlayers){
    const rp = remotePlayers[id];
    if (rp && rp.x!=null){ const dd = len(rp.x-x, rp.y-y); if (dd<bd){ bd=dd; bx=rp.x; by=rp.y; } }
  }
  return { x:bx, y:by, d:bd };
}

// host: pack the near-player mobs into a compact broadcast (frozen/far mobs aren't synced)
function publishWorldMobs(){
  const az = activeZoneSet();
  const obj = {};
  for (const m of mobs){
    if (m.dying || !m.netId) continue;
    if (!az.has(zoneAt(m.x).idx)) continue;
    obj[m.netId] = [TYPE_IDX[m.type], m.level, Math.round(m.x), Math.round(m.y),
                    Math.round(m.health), Math.round((((m.facing||0)%TAU)+TAU)%TAU/TAU*255)];
  }
  window.MP.publishMobs(obj);
}
// non-host: fold a broadcast snapshot into the local mirror
function ingestWorldMobs(obj){
  const now = performance.now();
  const seen = new Set();
  for (const id in obj){
    const a = obj[id];
    const type=TYPE_LIST[a[0]], level=a[1], x=a[2], y=a[3], hp=a[4], f8=a[5];
    seen.add(id);
    let m = mobById[id];
    if (!m){
      m = spawnMob(type, level, x, y);   // full mob object (radius, colors, mass, rock verts…)
      m.netId = id; m.mirror = true; m.dispHealth = hp; mobById[id] = m;
      m.tx = x; m.ty = y; m.netVX = 0; m.netVY = 0;
    } else {
      // estimate a constant velocity from how far the authoritative position moved since the
      // last broadcast, so the mirror can glide continuously between updates (dead reckoning)
      // instead of visibly lurching from point to point at the broadcast rate
      const dtNet = Math.max(0.02, (now - m.netSeen)/1000);
      m.netVX = (x - m.tx) / dtNet; m.netVY = (y - m.ty) / dtNet;
      m.tx = x; m.ty = y;
    }
    m.health = hp; m.facing = f8/255*TAU; m.netSeen = now;
  }
  // drop mirrored mobs the host stopped broadcasting (unless they're mid death-animation)
  for (let i=mobs.length-1;i>=0;i--){
    const m = mobs[i];
    if (m.netId && !seen.has(m.netId) && !m.dying){ delete mobById[m.netId]; mobs.splice(i,1); }
  }
}
// host: apply queued hits from non-hosts, then clear them
function consumeHits(hits){
  const done = [];
  for (const key in hits){
    const h = hits[key]; done.push(key);
    const m = mobById[h.m];
    if (m && !m.dying){
      const src = remotePlayers[h.from];
      const dx = m.x - (src && src.x!=null ? src.x : m.x), dy = m.y - (src && src.y!=null ? src.y : m.y);
      damageMob(m, h.d, dx, dy, len(dx,dy)||1, 0);
      if (shouldAggroOnHit(m)) m.aggro = true;
    }
  }
  window.MP.clearHits(done);
}
// everyone: react to a death — grant my own loot/XP if I hit it, and (as a mirror) animate it
function handleDeaths(deaths){
  for (const id in deaths){
    if (processedDeaths.has(id)) continue;
    processedDeaths.add(id);
    const d = deaths[id];
    if (myHits.has(id)){
      myHits.delete(id);
      const type = TYPE_LIST[d.ty], level = d.lv;
      const wasNew = !killedMobs.has(type+'|'+level);
      killedMobs.add(type+'|'+level);
      rollMobDrops({ type, level, x:d.x, y:d.y });
      grantXp(xpForKill(type, level));
      if (wasNew && openPanelName==='mob') renderPanel();
    }
    if (!amHost){ const m = mobById[id]; if (m && !m.dying){ m.dying = true; m.dieT = 0; } }
  }
  if (processedDeaths.size > 400) processedDeaths.clear();
}

function attachWorldSubs(){
  if (worldSubsAttached) return; worldSubsAttached = true;
  // only mirror broadcast mobs once host-election has run (hostId set) AND we're not the host —
  // otherwise a stale world/mobs snapshot arriving before election gets adopted as our world
  window.MP.subscribeMobs(obj => { if (!amHost && hostId !== null) ingestWorldMobs(obj); });
  window.MP.subscribeHits(hits => { if (amHost) consumeHits(hits); });
  window.MP.subscribeDeaths(handleDeaths);
}
function onPlayersChanged(others, allUids){
  remotePlayers = others;
  const sorted = (allUids||[]).slice().sort();
  const newHost = sorted[0] || window.MP.uid;
  const hostChanged = newHost !== hostId;
  hostId = newHost;
  const wasHost = amHost;
  amHost = (hostId === window.MP.uid);
  if (amHost && !wasHost) becomeHost();
  // if the host identity changed and we're a mirror, wipe the old host's mobs so their ids
  // can't collide with the new host's broadcast (belt-and-suspenders alongside unique ids)
  else if (!amHost && hostChanged) clearMirror();
}
function becomeHost(){
  // adopt whatever mobs we're already mirroring under a previous host; if we have none, we're a
  // fresh/lone host — seed a new world. Either way, immediately (over)write the published set so
  // any stale world/mobs left over from a past session is replaced, not adopted by newcomers.
  if (mobs.length === 0) seedMobs();
  for (const m of mobs) ensureNetId(m);
  publishWorldMobs();
}

// only true progress is saved — not ephemeral world/session state like position, live mobs,
// pickups, or which panel is open
function buildSavePayload(){
  return {
    playerLevel, playerXp, inventory,
    discoveredPetals: Array.from(discoveredPetals),
    killedMobs: Array.from(killedMobs),
    loadouts, activeLoadout, essence,
    username: myName || null,
  };
}
function applySave(save){
  if (!save) return;
  if (save.playerLevel!=null) playerLevel = save.playerLevel;
  if (save.playerXp!=null) playerXp = save.playerXp;
  if (save.inventory) inventory = save.inventory;
  if (save.discoveredPetals) discoveredPetals = new Set(save.discoveredPetals);
  if (save.killedMobs) killedMobs = new Set(save.killedMobs);
  if (save.loadouts) loadouts = save.loadouts;
  if (save.activeLoadout!=null) activeLoadout = save.activeLoadout;
  if (save.essence) essence = save.essence;
  migrateLegacyBasic();
  player = makePlayer();
  rebuildInstances();
}
// old saves (pre-rarity-Basic) used a single 'basic' petal id — remap it to the common-rarity
// variant everywhere it could appear, so old saves don't reference a petal id that no longer exists
function migrateLegacyBasic(){
  loadouts.forEach(lo=>lo.forEach(slot=>{ if (slot.petal==='basic') slot.petal = BASIC_IDS.common; }));
  if (inventory['basic|1']){
    const nk = invKey(BASIC_IDS.common, 1);
    inventory[nk] = (inventory[nk]||0) + inventory['basic|1'];
    delete inventory['basic|1'];
  }
  if (discoveredPetals.has('basic|1')){
    discoveredPetals.delete('basic|1');
    discoveredPetals.add(invKey(BASIC_IDS.common, 1));
  }
}
function saveProgress(){
  if (!authed || !window.MP) return;
  window.MP.saveProgress(buildSavePayload());
}
// debounced save — call this after any inventory/essence-changing event (picking up essence,
// equipping/unequipping, dev-mode grants) instead of saving immediately on every single one.
// Collapses a burst of rapid changes (e.g. a killing spree dropping essence every second) into
// one write shortly after, so real progress can't be lost to a crash/forced-close without
// spamming Firebase with a write per pickup. The 15s interval, visibilitychange, and beforeunload
// hooks below remain as backstops in case this timer never gets to fire.
let saveDebounceT = null;
function scheduleSave(){
  if (saveDebounceT) clearTimeout(saveDebounceT);
  saveDebounceT = setTimeout(()=>{ saveDebounceT = null; saveProgress(); }, 1500);
}

// the compact live blob other players receive to render our flower + petals. Petals are sent
// as absolute world positions (visible ones only) so remotes don't have to replicate our orbit
// math — bulletproof, and tiny for a handful of players.
function getPresenceState(){
  // dead: broadcast just enough to say "I'm dead" — other clients hide our flower entirely
  // until we respawn, instead of leaving a corpse standing around at its last position
  if (dead) return { n: myName || 'Player', d: 1 };
  const pts = [];
  for (const inst of player.instances){
    if (inst.broken || inst.eating) continue;
    pts.push([Math.round(inst.x), Math.round(inst.y), inst.petal, inst.tier]);
  }
  return {
    n: myName || 'Player',
    x: Math.round(player.x), y: Math.round(player.y),
    lv: playerLevel,
    h: Math.round(player.health), mh: Math.round(player.maxHealth),
    hf: player.hurtFlash>0 ? 1 : 0,
    pts,
  };
}

function setAuthError(msg){ document.getElementById('authError').textContent = msg || ''; }
function enterGameUI(){
  authed = true;
  document.getElementById('authScreen').classList.remove('show');
  document.getElementById('logoutBtn').style.display = '';
}
function showLoginUI(){
  authed = false;
  document.getElementById('authScreen').classList.add('show');
  document.getElementById('logoutBtn').style.display = 'none';
}

// Firebase fires this on login, on logout, and once on page load (auto-resuming a saved session)
async function handleAuth(user){
  if (!user){ showLoginUI(); return; }
  setAuthError('');
  // on a fresh reload the module hasn't got our display name in memory yet — recover it
  myName = window.MP.username || await window.MP.loadProfileUsername() || 'Player';
  try { applySave(await window.MP.loadSave()); }
  catch(e){ /* brand-new account or transient read hiccup — just start from defaults */ }
  enterGameUI();
  attachWorldSubs();
  window.MP.startPresence(getPresenceState);
  window.MP.subscribePlayers(onPlayersChanged);
}

// turn Firebase's error codes into something readable in the login box
function friendlyAuthError(e){
  const c = (e && e.code) || '';
  if (c.includes('email-already-in-use')) return 'That username is already taken.';
  if (c.includes('invalid-credential') || c.includes('wrong-password') || c.includes('user-not-found')) return 'Wrong username or password.';
  if (c.includes('weak-password')) return 'Password must be at least 6 characters.';
  if (c.includes('network-request-failed')) return 'Network error — check your connection.';
  if (c.includes('operation-not-allowed') || c.includes('configuration-not-found')) return 'Email/Password sign-in is not enabled in Firebase yet.';
  return (e && e.message) || 'Something went wrong.';
}
function doLogin(){
  if (!window.MP){ setAuthError('Still connecting to the server…'); return; }
  const u = document.getElementById('authUser').value.trim();
  const p = document.getElementById('authPass').value;
  setAuthError('');
  if (!u || !p){ setAuthError('Enter a username and password.'); return; }
  window.MP.login(u, p).catch(e=>setAuthError(friendlyAuthError(e)));
}
function doSignup(){
  if (!window.MP){ setAuthError('Still connecting to the server…'); return; }
  const u = document.getElementById('authUser').value.trim();
  const p = document.getElementById('authPass').value;
  setAuthError('');
  if (!u || !p){ setAuthError('Enter a username and password.'); return; }
  if (p.length < 6){ setAuthError('Password must be at least 6 characters.'); return; }
  window.MP.signup(u, p).catch(e=>setAuthError(friendlyAuthError(e)));
}
function logout(){
  saveProgress();
  (window.MP ? window.MP.logout() : Promise.resolve()).finally(()=>location.reload());
}
window.doLogin = doLogin; window.doSignup = doSignup; window.logout = logout;

// wire into the Firebase module once it's initialized (it may load before or after this script)
function initMultiplayer(){ window.MP.onAuth(handleAuth); }
if (window.MP) initMultiplayer();
else window.addEventListener('mp-ready', initMultiplayer, { once:true });
// if Firebase never loads (CDN blocked / offline), tell the player instead of hanging silently
showLoginUI();
setTimeout(()=>{ if (!window.MP) setAuthError('Couldn’t reach the game server. Check your connection and refresh.'); }, 10000);

setInterval(saveProgress, 15000);
addEventListener('visibilitychange', ()=>{ if (document.visibilityState==='hidden') saveProgress(); });
addEventListener('beforeunload', saveProgress);

/* ══════════════════════════════════════════
   INIT + MAIN LOOP
   ══════════════════════════════════════════ */
loadouts = [defaultLoadout(), defaultLoadout()];
rebuildInstances();
// mobs are no longer seeded at startup — the world is shared, so whoever becomes host seeds
// (or adopts the existing mobs) once logged in; see becomeHost()

let last = performance.now();
function frameTick(skipDraw){
  const now = performance.now();
  let dt = (now - last)/1000; last = now;
  dt = Math.min(dt, 0.25);
  update(dt);
  updateRemoteDisplay(dt);
  if (!skipDraw) draw();
}
function loop(){
  frameTick(false);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
// browsers throttle requestAnimationFrame to near-zero (often fully stopping it) once a tab is
// backgrounded or minimized. Left alone, that freezes: (a) the whole shared world for everyone
// if the HOST'S tab isn't focused, since mob simulation only runs there, and (b) any non-host
// player's own presence broadcast, making them appear frozen to everyone else. A plain
// setInterval keeps getting scheduled (throttled to roughly once a second while hidden, but not
// stopped outright) so the game keeps ticking at a reduced rate instead of freezing entirely.
setInterval(()=>{ if (document.hidden) frameTick(true); }, 250);

// sign-in is disabled for now — skip showing the login screen and skip session resume/auto-save
// entirely (re-enable by restoring the block this replaced)
</script>
</body>
</html>
